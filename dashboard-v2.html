  // Contacts tab - group by tier
  function renderContactsTab(){
    const tiers=['Tier 1','Tier 2','Tier 3','Tier 4'];
    let html='<div class="bd-tab-pane" id="bd-contacts">';
    tiers.forEach(function(t){
      const group=rels.filter(function(r){return r.tier===t;});
      if(group.length===0) return;
      html+='<div class="card" style="margin-bottom:12px"><div class="card-head"><span>'+tierBadge(t)+'</span><span style="font-size:11px;color:var(--text-muted)">'+group.length+' relationships</span></div>';
      html+='<div class="card-body" style="padding:8px 12px">';
      group.forEach(function(r){
        html+='<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)">'+
          '<span style="font-weight:600;min-width:120px">'+(r.company||'&mdash;')+'</span>'+
          '<span style="font-size:12px">'+(r.contact||'')+(r.contactTitle?' <span style="color:var(--text-muted)">('+r.contactTitle+')</span>':'')+'</span>'+
          '<span style="margin-left:auto">'+typeBadge(r.type)+'</span>'+
          statusBadge(r.status)+
        '</div>';
      });
      html+='</div></div>';
    });
    html+='</div>';
    return html;
  }

  // Follow-ups tab
  function renderFollowupsTab(){
    var now=new Date();
    var sevenDaysOut=new Date(now.getTime()+7*24*60*60*1000);
    var upcoming=rels.filter(function(r){return r.nextActionDate&&new Date(r.nextActionDate)<=sevenDaysOut;}).sort(function(a,b){return new Date(a.nextActionDate)-new Date(b.nextActionDate);});
    var needsAttention=rels.filter(function(r){return daysSinceNum(r.lastTouch)>7;});
    var btnStyle='font-size:9px;padding:2px 6px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);cursor:pointer;font-family:inherit';

    var html='<div class="bd-tab-pane" id="bd-followups">';

    // Upcoming follow-ups within 7 days
    html+='<div class="card" style="margin-bottom:12px"><div class="card-head"><span>Due This Week</span><span style="font-size:11px;color:var(--text-muted)">'+upcoming.length+' scheduled</span></div>';
    html+='<div class="card-body" style="padding:8px 12px">';
    if(upcoming.length===0){
      html+='<div style="padding:20px;text-align:center;color:var(--text-muted)">No follow-ups due this week</div>';
    } else {
      upcoming.forEach(function(r){
        var d=new Date(r.nextActionDate);
        var dateStr=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
        var isPast=d<now;
        var relJson=JSON.stringify(r).replace(/\\/g,'\\\\').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
        html+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)" data-bd-row="'+r.id+'">'+
          '<span style="min-width:100px;font-size:12px;font-weight:600;color:'+(isPast?'#e84e44':'var(--gold)')+'">'+dateStr+'</span>'+
          '<span style="font-weight:600">'+(r.company||'&mdash;')+'</span>'+
          '<span style="color:var(--text-muted);font-size:12px">'+(r.contact||'')+'</span>'+
          '<span style="margin-left:auto;font-size:12px">'+(r.nextAction||'')+'</span>'+
          '<button onclick="draftBDFollowUp(JSON.parse(this.dataset.rel))" data-rel="'+relJson+'" style="'+btnStyle+'">Draft</button>'+
          '<span style="font-size:10px;color:var(--text-muted)">'+(r.owner||'')+'</span>'+
        '</div>';
      });
    }
    html+='</div></div>';

    // Needs attention
    html+='<div class="card"><div class="card-head"><span style="color:#e84e44">Needs Attention</span><span style="font-size:11px;color:var(--text-muted)">'+needsAttention.length+' relationships &gt; 7 days</span></div>';
    html+='<div class="card-body" style="padding:8px 12px">';
    if(needsAttention.length===0){
      html+='<div style="padding:20px;text-align:center;color:var(--text-muted)">All relationships touched within the last 7 days</div>';
    } else {
      needsAttention.forEach(function(r){
        var relJson=JSON.stringify(r).replace(/\\/g,'\\\\').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
        html+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)" data-bd-row="'+r.id+'">'+
          '<span style="font-weight:600;min-width:100px">'+(r.company||'&mdash;')+'</span>'+
          '<span style="color:var(--text-muted);font-size:12px">'+(r.contact||'')+'</span>'+
          '<span style="font-size:11px">'+daysSince(r.lastTouch)+'</span>'+
          '<span style="margin-left:auto">'+tierBadge(r.tier)+'</span>'+
          '<button onclick="nudgeBD(JSON.parse(this.dataset.rel))" data-rel="'+relJson+'" style="font-size:9px;padding:2px 6px;border-radius:4px;border:none;background:var(--gold);color:#000;cursor:pointer;font-weight:600;font-family:inherit">Nudge</button>'+
          '<button onclick="logBDInteraction(\''+r.id+'\')" style="'+btnStyle+'">Log</button>'+
        '</div>';
      });
    }
    html+='</div></div>';

    html+='</div>';
    return html;
  }

  // Reviews tab
  function renderReviewsTab(){
    return '<div class="bd-tab-pane" id="bd-reviews"><div class="card"><div class="card-head"><span>Weekly Reviews</span></div>'+
      '<div class="card-body" style="padding:40px;text-align:center;color:var(--text-muted)">'+
      '<div style="font-size:24px;margin-bottom:8px">&#128203;</div>'+
      '<div>Weekly relationship status digests will appear here.</div>'+
      '<div style="font-size:11px;margin-top:4px">Sophie reviews every Friday afternoon.</div>'+
      '</div></div></div>';
  }

  el.innerHTML=
    '<div style="padding:24px 28px">'+
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">'+
    '<span style="font-size:24px">&#129309;</span>'+
    '<div><h2 style="margin:0;font-size:18px;font-weight:800;letter-spacing:-.3px">'+(config.name||'BD Tracker')+'</h2>'+
    '<div style="font-size:11px;color:var(--text-muted)">'+rels.length+' relationships &middot; '+(config.slackChannel||'#enterprise')+
    ' &middot; <a href="https://www.notion.so/3321ad76fd2a8151ba70c0fcd02834e5" target="_blank" style="color:var(--gold)">Notion Sync Log</a>'+
    (config.notionHub?' &middot; <a href="'+config.notionHub+'" target="_blank" style="color:var(--gold)">Notion Hub</a>':'')+
    '</div></div></div>'+
    '<nav class="bd-nav">'+
    bdTabs.map(function(t,i){return '<button class="bd-nav-btn '+(i===0?'active':'')+'" data-bd-tab="'+t.id+'">'+t.label+'</button>';}).join('')+
    '</nav>'+
    renderActiveTab()+
    renderPipelineTab()+
    renderContactsTab()+
    renderFollowupsTab()+
    renderReviewsTab()+
    '</div>';

  // Tab switching
  el.querySelectorAll('.bd-nav-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      el.querySelectorAll('.bd-nav-btn').forEach(function(b){b.classList.remove('active');});
      el.querySelectorAll('.bd-tab-pane').forEach(function(p){p.classList.remove('active');});
      btn.classList.add('active');
      var pane=el.querySelector('#'+btn.dataset.bdTab);
      if(pane) pane.classList.add('active');
    });
  });
}

document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
