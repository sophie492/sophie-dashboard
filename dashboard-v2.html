  // Days until (derived from offsite dates)
  var offsiteDates = OFFSITE.dates || '';
  var daysUntil = 0;
  if (offsiteDates && offsiteDates !== 'TBD') {
    try {
      var dateStr = offsiteDates.includes('202') ? offsiteDates : OFFSITE.year + ' ' + offsiteDates;
      daysUntil = Math.ceil((new Date(dateStr) - new Date()) / 86400000);
    } catch(e) {}
  }

  // Count tasks across checklist
  function countChecklist(obj) {
    var total = 0, done = 0;
    function walk(v) {
      if (Array.isArray(v)) { v.forEach(function(item) { if (typeof item === 'object' && item.item !== undefined) { total++; if (item.done) done++; } else { walk(item); } }); }
      else if (typeof v === 'object' && v !== null) { Object.values(v).forEach(walk); }
    }
    walk(obj);
    return { total: total, done: done };
  }
  var taskCounts = countChecklist(checklist);
  var taskPct = taskCounts.total ? Math.round((taskCounts.done / taskCounts.total) * 100) : 0;

  // Budget estimate
  var budgetEstimate = budgetCategories.reduce(function(s,c) { return s + (c.estimated || 0); }, 0);

  // Attendees ready (both hotel + flight)
  var attendeesReady = attendees.filter(function(a) { return a.hotelConfirmed && a.flightBooked; }).length;

  // Phase colors
  function phaseColor(name) {
    if (/kickoff/i.test(name)) return { bg: 'rgba(72,187,120,.15)', fg: 'var(--green)' };
    if (/logistics/i.test(name)) return { bg: 'rgba(219,203,119,.15)', fg: 'var(--gold)' };
    if (/agenda/i.test(name)) return { bg: 'rgba(193,177,213,.15)', fg: 'var(--lavender)' };
    if (/final|comms/i.test(name)) return { bg: 'rgba(66,153,225,.15)', fg: '#4299E1' };
    if (/day/i.test(name) && !/post/i.test(name)) return { bg: 'rgba(202,152,63,.15)', fg: 'var(--orange)' };
    return { bg: 'rgba(160,174,192,.15)', fg: '#A0AEC0' };
  }

  function statusBadge(confirmed, label) {
    if (confirmed) return '<span class="badge tag-green">' + (label || 'Booked') + '</span>';
    return '<span class="badge tag-yellow">' + (label || 'Pending') + '</span>';
  }

  function statusDot(val) {
    if (val === true) return '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green)"></span>';
    if (val === false) return '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--yellow)"></span>';
    return '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--red)"></span>';
  }

  // Sub-tabs
  var offsiteTabs = [
    { id: 'offsite-overview', label: 'Overview' },
    { id: 'offsite-checklist', label: 'Checklist' },
    { id: 'offsite-attendees', label: 'Attendees' },
    { id: 'offsite-logistics', label: 'Logistics' },
    { id: 'offsite-agenda', label: 'Agenda' },
    { id: 'offsite-reviews', label: 'Reviews' }
  ];

  // ── Build checklist HTML from DATA.leadershipOffsite (for Notion sync) ──
  var o = DATA.leadershipOffsite;
  var phaseHtml = '';
  if (o && o.phases) {
    var phaseNames = ['Phase 1: Kickoff', 'Phase 2: Logistics', 'Phase 3: Agenda', 'Pre-reads sent', 'Phase 4: Final Comms', 'Day Before', 'Day 1', 'Day 2', 'Post-Offsite'];
    o.phases.forEach(function(p, pi) {
      var pDone = p.tasks.filter(function(t) { return t.done; }).length;
      var pTotal = p.tasks.length;
      var allDone = pDone === pTotal;
      var isFirst = pi === 0;
      var pc = phaseColor(p.name);
      phaseHtml += '<div class="offsite-phase' + (allDone ? ' phase-done' : '') + '" data-phase="' + pi + '">' +
        '<div class="offsite-phase-head" onclick="toggleOffsitePhase(this)" style="cursor:pointer;display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;margin-bottom:2px;background:' + pc.bg + '">' +
          '<span class="offsite-chevron" style="font-size:10px;color:var(--text-muted);transition:transform .2s;transform:rotate(' + (isFirst ? '90' : '0') + 'deg)">&#9654;</span>' +
          '<span style="font-size:11px;font-weight:700;color:' + (allDone ? 'var(--green)' : pc.fg) + ';flex:1">' + p.name + '</span>' +
          '<span style="font-size:9px;color:var(--text-muted);font-weight:600">' + (p.deadline || '') + '</span>' +
          '<span style="font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700;' + (allDone ? 'background:var(--green-soft);color:var(--green)' : 'background:var(--surface);color:var(--text-muted)') + '">' + pDone + '/' + pTotal + '</span>' +
        '</div>' +
        '<div class="offsite-phase-body" style="display:' + (isFirst ? 'block' : 'none') + ';padding:4px 0 4px 18px">';
      p.tasks.forEach(function(t, ti) {
        phaseHtml += '<div class="offsite-task' + (t.done ? ' checked' : '') + '" data-phase="' + pi + '" data-task="' + ti + '" onclick="toggleOffsiteTask(this)" style="display:flex;align-items:flex-start;gap:8px;padding:5px 4px;border-radius:5px;cursor:pointer;transition:background .15s;font-size:11px">' +
          '<div class="task-checkbox' + (t.done ? ' checked' : '') + '"></div>' +
          '<span style="color:' + (t.done ? 'var(--text-muted)' : 'var(--text-dim)') + ';' + (t.done ? 'text-decoration:line-through;opacity:.5' : '') + ';line-height:1.3">' + t.text + '</span>' +
        '</div>';
      });
      // Progress bar per phase
      var ppct = pTotal ? Math.round((pDone / pTotal) * 100) : 0;
      phaseHtml += '<div style="margin:6px 0 8px;display:flex;align-items:center;gap:8px">' +
        '<div style="flex:1;height:3px;background:var(--surface);border-radius:2px;overflow:hidden"><div style="height:100%;width:' + ppct + '%;background:' + pc.fg + ';border-radius:2px;transition:width .3s"></div></div>' +
        '<span style="font-size:9px;color:var(--text-muted)">' + ppct + '%</span></div>';
      phaseHtml += '</div></div>';
    });
  }

  // ── Overview tab ──
  function renderOverviewTab() {
    // Timeline at a Glance
    var timelineRows = phases.map(function(p) {
      var pDone = (p.tasks||[]).filter(function(t){return t.done;}).length;
      var pTotal = (p.tasks||[]).length;
      var allDone = pTotal > 0 && pDone === pTotal;
      var hasProgress = pDone > 0 && !allDone;
      var statusColor = allDone ? 'var(--green)' : hasProgress ? 'var(--gold)' : 'var(--text-muted)';
      var isNext = hasProgress;
      return '<tr style="border-bottom:1px solid var(--border);' + (isNext ? 'background:var(--glow-gold)' : '') + '">' +
        '<td style="padding:6px 8px;font-size:11px;font-weight:600;color:' + (allDone ? 'var(--green)' : 'var(--text)') + '">' + (p.name||'') + '</td>' +
        '<td style="padding:6px 8px;font-size:10px;color:var(--text-muted)">' + (p.deadline||'') + '</td>' +
        '<td style="padding:6px 8px;font-size:10px;color:var(--text-dim)">' + pDone + '/' + pTotal + ' tasks</td>' +
        '<td style="padding:6px 8px;text-align:center"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + statusColor + '"></span></td>' +
      '</tr>';
    }).join('');

    var barColor = taskPct >= 75 ? 'var(--green)' : taskPct >= 40 ? 'var(--yellow)' : 'var(--accent)';

    return '<div class="offsite-tab-pane active" id="offsite-overview">' +
      '<div style="display:grid;grid-template-columns:2fr 1fr;gap:16px">' +
        '<div>' +
          '<div class="card" style="margin-bottom:12px">' +
            '<div class="card-head"><div class="card-title">Timeline at a Glance</div></div>' +
            '<div class="card-body" style="padding:0;overflow-x:auto">' +
              '<table style="width:100%;border-collapse:collapse">' +
                '<thead><tr style="border-bottom:2px solid var(--border);font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px">' +
                  '<th style="padding:8px;text-align:left">Phase</th>' +
                  '<th style="padding:8px;text-align:left">Deadline</th>' +
                  '<th style="padding:8px;text-align:left">What</th>' +
                  '<th style="padding:8px;text-align:center">Status</th>' +
                '</tr></thead>' +
                '<tbody>' + timelineRows + '</tbody>' +
              '</table>' +
            '</div>' +
          '</div>' +
          '<div class="card">' +
            '<div class="card-head"><div class="card-title">Overall Progress</div></div>' +
            '<div class="card-body">' +
              '<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-muted);margin-bottom:4px"><span>Planning Progress</span><span>' + taskCounts.done + '/' + taskCounts.total + ' (' + taskPct + '%)</span></div>' +
              '<div style="height:6px;background:var(--surface);border-radius:3px;overflow:hidden"><div style="height:100%;width:' + taskPct + '%;background:' + barColor + ';border-radius:3px;transition:width .3s"></div></div>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div style="display:flex;flex-direction:column;gap:10px">' +
          '<div class="card" style="padding:12px">' +
            '<div class="card-head"><div class="card-title">Quick Links</div></div>' +
            '<div class="card-body compact" style="font-size:12px;line-height:2">' +
              '<div><a href="' + (config.notionHub || '#') + '" target="_blank" style="color:var(--gold)">Notion Hub &#8599;</a></div>' +
              '<div><a href="https://www.notion.so/3291ad76fd2a8104b8d6f8c8dac57f4d" target="_blank" style="color:var(--gold)">Planning Hub &#8599;</a></div>' +
              '<div><a href="#" style="color:var(--gold)">Slack #leadership &#8599;</a></div>' +
              '<div><a href="https://docs.google.com/document/d/13LCRtXHWH9v1FkeJy6AVJROfKRxTti3VRdh8xUkWUy4/edit" target="_blank" style="color:var(--gold)">Rishabh\'s Strategy Doc &#8599;</a></div>' +
              '<div><a href="#" style="color:var(--gold)">Calendar Event &#8599;</a></div>' +
            '</div>' +
          '</div>' +
          '<div class="card" style="padding:12px">' +
            '<div class="card-head"><div class="card-title">Key Dates</div></div>' +
            '<div class="card-body compact" style="font-size:12px;line-height:2;color:var(--text-dim)">' +
              '<div>Offsite: <strong style="color:var(--text)">' + (config.dates || 'April 20-21, 2026') + '</strong></div>' +
              '<div>Pre-reads due: <strong style="color:var(--text)">Mon Apr 13</strong></div>' +
              '<div>Budget: <strong style="color:var(--text)">$' + budgetEstimate.toLocaleString() + ' estimated</strong></div>' +
              '<div>Location: <strong style="color:var(--text)">' + (config.city || config.location || 'New York City') + '</strong></div>' +
            '</div>' +
          '</div>' +
          '<div class="card" style="padding:12px">' +
            '<div class="card-head"><div class="card-title">Coordination Contacts</div></div>' +
            '<div class="card-body compact" style="font-size:12px;color:var(--text-dim)">' +
              contacts.map(function(c) {
                return '<div style="padding:4px 0;border-bottom:1px solid var(--border)">' +
                  '<strong style="color:var(--text)">' + c.name + '</strong> <span style="font-size:10px;color:var(--text-muted)">(' + c.role + ')</span>' +
                  '<div style="font-size:10px;color:var(--text-muted)">' + c.reachOutFor + '</div>' +
                '</div>';
              }).join('') +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }

  // ── Checklist tab ──
  function renderChecklistTab() {
    return '<div class="offsite-tab-pane" id="offsite-checklist">' +
      '<div class="card">' +
        '<div class="card-head">' +
          '<div class="card-title">&#9992;&#65039; Planning Checklist</div>' +
          '<div class="card-badges">' +
            '<span class="badge ' + (taskPct >= 100 ? 'tag-green' : 'tag-yellow') + '">' + taskCounts.done + '/' + taskCounts.total + ' done</span>' +
            '<button onclick="syncOffsiteToNotion()" style="font-size:9px;padding:2px 8px;border-radius:5px;border:1px solid var(--leaf);background:var(--green-soft);color:var(--green);font-family:inherit;font-weight:700;cursor:pointer;transition:all .15s" onmouseover="this.style.background=\'var(--green)\';this.style.color=\'var(--bg)\'" onmouseout="this.style.background=\'var(--green-soft)\';this.style.color=\'var(--green)\'" id="offsite-sync-btn">Sync to Notion</button>' +
          '</div>' +
        '</div>' +
        '<div class="card-body" style="padding:10px 14px">' +
          phaseHtml +
        '</div>' +
      '</div>' +
    '</div>';

  // ── Attendees tab ──
  function renderAttendeesTab() {
    var travelers = attendees.filter(function(a) { return a.needsHotel !== false; });
    var confirmed = travelers.filter(function(a) { return a.hotelConfirmed && a.flightBooked; }).length;
    var locals = attendees.filter(function(a) { return a.needsHotel === false; }).length;
    function attendeeToggle(a, field) {
      var isLocal = a.needsHotel === false || a.needsFlight === false;
      if (isLocal && (field === 'hotelConfirmed' || field === 'flightBooked' || field === 'travelCardIssued')) {
        return '<span style="font-size:10px;color:var(--text-muted);font-style:italic">N/A</span>';
      }
      var val = a[field];
      return '<button class="offsite-status-toggle" onclick="toggleAttendeeStatus(\'' + a.name.replace(/'/g, "\\'") + '\',\'' + field + '\')" style="background:' + (val ? 'var(--green-soft)' : 'var(--surface)') + ';color:' + (val ? 'var(--green)' : 'var(--text-muted)') + ';border:1px solid ' + (val ? 'var(--green)' : 'var(--border)') + ';padding:2px 8px;border-radius:4px;font-size:10px;cursor:pointer;font-family:inherit">' + (val ? '\u2713' : '\u2014') + '</button>';
    }
    var attendeeRows = attendees.map(function(a, ai) {
      var locationTag = a.location ? '<div style="font-size:9px;color:var(--text-muted);margin-top:1px">' + a.location + '</div>' : '';
      var travelTag = a.travelNotes ? '<div style="font-size:9px;color:' + (a.needsFlight === false ? 'var(--green)' : 'var(--text-muted)') + ';margin-top:1px">' + a.travelNotes + '</div>' : '';
      return '<tr style="border-bottom:1px solid var(--border);font-size:11px">' +
        '<td style="padding:6px 8px;font-weight:600;color:var(--text)">' + a.name + (a.title ? '<div style="font-size:9px;color:var(--text-dim)">' + a.title + '</div>' : '') + locationTag + '</td>' +
        '<td style="padding:6px 8px;color:var(--text-muted);font-size:10px">' + (a.email || '') + '</td>' +
        '<td style="padding:6px 8px;color:var(--text-muted);font-family:monospace;font-size:10px">' + (a.marriottNum || '<span style="color:var(--red)">missing</span>') + '</td>' +
        '<td style="padding:6px 8px;text-align:center">' + attendeeToggle(a, 'hotelConfirmed') + '</td>' +
        '<td style="padding:6px 8px;text-align:center">' + attendeeToggle(a, 'flightBooked') + '</td>' +
        '<td style="padding:6px 8px;text-align:center">' + attendeeToggle(a, 'travelCardIssued') + '</td>' +
        '<td style="padding:6px 8px;color:var(--text-muted);font-size:10px">' + travelTag + '</td>' +
      '</tr>';
    }).join('');

    return '<div class="offsite-tab-pane" id="offsite-attendees">' +
      '<div style="display:flex;align-items:center;gap:16px;margin-bottom:12px">' +
        '<div style="font-size:13px;font-weight:700;color:var(--text)">' + confirmed + '/' + travelers.length + ' travelers confirmed' + (locals > 0 ? ' <span style="font-size:10px;color:var(--text-muted);font-weight:500">(' + locals + ' local — N/A)</span>' : '') + '</div>' +
        '<div style="flex:1;height:6px;background:var(--surface);border-radius:3px;overflow:hidden;max-width:300px"><div style="height:100%;width:' + (attendees.length ? Math.round(confirmed/attendees.length*100) : 0) + '%;background:var(--green);border-radius:3px;transition:width .3s"></div></div>' +
      '</div>' +
      '<div class="card">' +
        '<div class="card-head"><div class="card-title">Attendees (' + attendees.length + ')</div></div>' +

        '<span>' + statusDot(false) + ' Pending</span>' +
        '<span style="color:var(--red)">missing = Not provided</span>' +
      '</div>' +
    '</div>';
  }

  // ── Logistics tab ──
  function renderLogisticsTab() {
    var meals = logistics.meals || { day1Lunch: { link: '', notes: '' }, day2Lunch: { link: '', notes: '' } };

    // Status dropdown helper
    function statusDropdown(category, currentStatus) {
      var statuses = ['Not Started', 'Researching', 'Decided', 'Booked'];
      var colors = { 'Not Started': 'var(--text-muted)', 'Researching': 'var(--yellow)', 'Decided': 'var(--blue)', 'Booked': 'var(--green)' };
      var opts = statuses.map(function(s) { return '<option value="' + s + '"' + (s === currentStatus ? ' selected' : '') + '>' + s + '</option>'; }).join('');
      return '<select style="font-size:10px;padding:2px 6px;border-radius:5px;border:1px solid var(--border-light);background:var(--surface);color:' + (colors[currentStatus] || 'var(--text)') + ';font-family:inherit;font-weight:600;cursor:pointer" onchange="updateLogisticsStatus(\'' + category + '\',this.value)">' + opts + '</select>';
    }

    // Render a single option card
    function renderOptionCard(opt, idx, category, isSelected, isCollapsed) {
      var borderColor = isSelected ? 'var(--green)' : 'var(--border-light)';
      var bgColor = isSelected ? 'rgba(72,187,120,.06)' : 'transparent';
      var nameField = opt.name || '';
      var details = [];
      if (opt.pricePerNight) details.push(opt.pricePerNight);
      if (opt.location) details.push(opt.location);
      if (opt.pros) details.push(opt.pros);
      if (opt.cuisine) details.push(opt.cuisine);
      if (opt.privateDining) details.push('Private dining: ' + opt.privateDining);
      if (opt.vegetarianOptions) details.push('Veg: ' + opt.vegetarianOptions);
      if (opt.type) details.push(opt.type);
      if (opt.groupSize) details.push('Group: ' + opt.groupSize);
      if (opt.estimatedCost) details.push(opt.estimatedCost);
      if (opt.why) details.push(opt.why);
      if (opt.bestPairedWith) details.push('Paired with: ' + opt.bestPairedWith);
      var detailsHtml = details.map(function(d) { return '<span style="font-size:10px;color:var(--text-muted)">' + d + '</span>'; }).join(' &middot; ');
      var selectBtn = isSelected ? '' : '<button style="font-size:10px;padding:3px 10px;border-radius:5px;border:1px solid var(--green);background:var(--green-soft);color:var(--green);font-family:inherit;font-weight:600;cursor:pointer;margin-top:6px" onclick="selectLogisticsOption(\'' + category + '\',' + idx + ')">This one &#10003;</button>';
      return '<div style="border:1px solid ' + borderColor + ';border-radius:8px;padding:10px 14px;margin-bottom:8px;background:' + bgColor + '">' +
        '<div style="font-size:12px;font-weight:700;color:' + (isSelected ? 'var(--green)' : 'var(--text)') + '">' + nameField + '</div>' +
        '<div style="margin-top:4px;line-height:1.6">' + detailsHtml + '</div>' +
        selectBtn +
      '</div>';
    }

    // Build a logistics category card
    function renderCategoryCard(icon, label, category, catData, options) {
      var catStatus = (catData && catData.status) || 'Not Started';
      var selectedIdx = (catData && catData.selectedOption !== undefined && catData.selectedOption !== null) ? catData.selectedOption : null;
      var confDetails = (catData && catData.confirmationDetails) || '';
      var isBooked = catStatus === 'Booked' || catStatus === 'Decided';

      var confirmedHtml = '';
      var otherOptionsHtml = '';

      if (selectedIdx !== null && options[selectedIdx]) {
        confirmedHtml = '<div style="margin-bottom:8px">' +
          '<div style="font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">&#10003; CONFIRMED</div>' +
          renderOptionCard(options[selectedIdx], selectedIdx, category, true, false) +
          '<div style="margin-top:4px"><input class="offsite-budget-input" style="width:100%" value="' + confDetails.replace(/"/g, '&quot;') + '" placeholder="Confirmation #, reservation time, etc." onblur="updateLogisticsConfirmation(\'' + category + '\',this.value)"></div>' +
        '</div>';
        // Collapsible other options
        var others = options.map(function(o, i) { return i !== selectedIdx ? renderOptionCard(o, i, category, false, true) : ''; }).join('');
        if (others.replace(/<[^>]*>/g, '').trim()) {
          otherOptionsHtml = '<details style="margin-top:8px"><summary style="font-size:11px;color:var(--text-muted);cursor:pointer;font-weight:600">Other options considered</summary><div style="margin-top:8px">' + others + '</div></details>';
        }
      } else {
        // No selection yet -- show all options
        confirmedHtml = options.map(function(o, i) { return renderOptionCard(o, i, category, false, false); }).join('');
      }

      return '<div class="card offsite-logistics-card" id="logistics-card-' + category + '" style="margin-bottom:14px">' +
        '<div class="card-head"><div class="card-title">' + icon + ' ' + label + '</div>' + statusDropdown(category, catStatus) + '</div>' +
        '<div class="card-body" style="padding:12px 14px">' + confirmedHtml + otherOptionsHtml + '</div>' +
        (catData && catData.contactPerson ? '<div class="card-foot"><strong>Contact:</strong> ' + catData.contactPerson +
          (aliceCorr.summary ? '<div style="margin-top:6px;font-size:10px;color:var(--text-dim);line-height:1.4"><strong>Latest:</strong> ' + aliceCorr.summary + '</div>' : '') +
          (aliceCorr.nextStep ? '<div style="margin-top:4px;font-size:10px;color:var(--gold)"><strong>Next step:</strong> ' + aliceCorr.nextStep + '</div>' : '') +
        '</div>' : '') +
      '</div>';

// Toggle attendee status (multi-quarter aware)
function toggleAttendeeStatus(name, field) {
  if (!_offsiteApiData || !_activeOffsiteId) return;
  var offsite = getOffsiteById(_activeOffsiteId);
  if (!offsite || !offsite.attendees) return;
  var attendee = offsite.attendees.find(function(a) { return a.name === name; });
  if (!attendee) return;
  attendee[field] = !attendee[field];
  var val = attendee[field];

  // Update DOM in place — stay on Attendees tab
  // Find the button that was clicked by matching onclick text
  var allBtns = document.querySelectorAll('.offsite-status-toggle');
  var btn = null;
  allBtns.forEach(function(b) {
    var onclick = b.getAttribute('onclick') || '';
    if (onclick.includes(name) && onclick.includes(field)) btn = b;
  });
  if (btn) {
    btn.style.background = val ? 'var(--green-soft)' : 'var(--surface)';
    btn.style.color = val ? 'var(--green)' : 'var(--text-muted)';
    btn.style.borderColor = val ? 'var(--green)' : 'var(--border)';
    btn.textContent = val ? '\u2713' : '\u2014';
  }

  // Save to server (fire and forget — no re-render)
  fetch('/api/offsite', {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer sophie-dashboard-secret-change-me'},
    body: JSON.stringify(_offsiteApiData)
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.ok) console.log('[Offsite] ' + name + ' ' + field + ' \u2192 ' + val);
  }).catch(function(e) { console.error('[Offsite] Toggle failed:', e); });
}

// Update budget line items (multi-quarter aware)
function updateOffsiteBudget(category, field, value) {
  if (!_offsiteApiData || !_activeOffsiteId) return;
  var offsite = getOffsiteById(_activeOffsiteId);
  if (!offsite || !offsite.logistics || !offsite.logistics.budget) return;
  var cat = offsite.logistics.budget.categories.find(function(c) { return c.category === category; });
  if (!cat) return;
  cat[field] = parseFloat(value) || null;
  fetch('/api/offsite', {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer sophie-dashboard-secret-change-me'},
    body: JSON.stringify(_offsiteApiData)
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.ok) console.log('[Offsite] Budget updated: ' + category + ' ' + field + ' = ' + value);
  }).catch(function(e) { console.error('[Offsite] Budget update failed:', e); });
}

function toggleHWPhase(el) {
  const body = el.nextElementSibling;
  const chevron = el.querySelector('.hw-chevron');
  const open = body.style.display === 'none';
  body.style.display = open ? 'block' : 'none';
  chevron.style.transform = open ? 'rotate(90deg)' : 'rotate(0deg)';
}

function toggleHWTask(el) {
  const pi = +el.dataset.hwphase;
  const ti = +el.dataset.hwtask;
  const task = DATA.hackWeek.phases[pi].tasks[ti];
  task.done = !task.done;
  const isChecked = task.done;

  const doneKeys = loadHackWeekDone();
  const key = pi + '-' + ti;
  if(isChecked) {
    if(!doneKeys.includes(key)) doneKeys.push(key);
  } else {
    const idx = doneKeys.indexOf(key);
    if(idx >= 0) doneKeys.splice(idx, 1);
  }
  saveHackWeekDone(doneKeys);
  syncCheckbox('hackweek-'+pi+'-'+ti, isChecked, DATA.hackWeek?.notionPageId, task.text);

  const cb = el.querySelector('.task-checkbox');
  const label = el.querySelector('span:last-child');
  if(isChecked) {
    el.classList.add('checked');
    cb.classList.add('checked');
    label.style.textDecoration = 'line-through';
    label.style.opacity = '.5';
    label.style.color = 'var(--text-muted)';
  } else {
    el.classList.remove('checked');
    cb.classList.remove('checked');
    label.style.textDecoration = '';
    label.style.opacity = '';
    label.style.color = 'var(--text-dim)';
  }

  const pTasks = DATA.hackWeek.phases[pi].tasks;
  const pDone = pTasks.filter(t=>t.done).length;
  const pTotal = pTasks.length;
  const phaseEl = el.closest('[data-hwphase]');
  const counter = phaseEl.querySelector('.hw-phase-head span:last-child');
  if(counter) counter.textContent = pDone + '/' + pTotal;

  const allPhases = DATA.hackWeek.phases;
  const totalDone = allPhases.reduce((s,p) => s + p.tasks.filter(t=>t.done).length, 0);
  const totalAll = allPhases.reduce((s,p) => s + p.tasks.length, 0);
  const newPct = totalAll ? Math.round((totalDone/totalAll)*100) : 0;
  const card = el.closest('.card');
  const pctLabel = card.querySelector('.card-body > div:first-child > span:last-child');
  if(pctLabel) pctLabel.textContent = totalDone + '/' + totalAll + ' tasks (' + newPct + '%)';
  const bar = card.querySelector('.card-body > div:nth-child(2) > div');
  if(bar) {
    bar.style.width = newPct + '%';
    bar.style.background = newPct >= 75 ? 'var(--green)' : newPct >= 40 ? 'var(--yellow)' : 'var(--accent)';
  }
}

function toggleGPTask(el) {
  const key = el.dataset.gpkey;
  const pi = +el.dataset.gpphase;
  const ti = +el.dataset.gptask;
  const dataMap = {bd:'bdOwnership',marketing:'marketingReporting',linkedin:'linkedinPipeline'};
  const proj = DATA[dataMap[key]];
  if(!proj) return;
  const task = proj.phases[pi].tasks[ti];
  task.done = !task.done;

  // Persist to localStorage
  const doneKeys = loadGPDone(key);
  const doneKey = pi + '-' + ti;
  if(task.done) {
    if(!doneKeys.includes(doneKey)) doneKeys.push(doneKey);
  } else {
    const idx = doneKeys.indexOf(doneKey);
    if(idx >= 0) doneKeys.splice(idx, 1);
  }
  saveGPDone(key, doneKeys);

  const cb = el.querySelector('.task-checkbox');
  const label = el.querySelector('span:last-child');
  if(task.done) {
    el.classList.add('checked');
    cb.classList.add('checked');
    label.style.textDecoration = 'line-through';
    label.style.opacity = '.5';
    label.style.color = 'var(--text-muted)';
  } else {
    el.classList.remove('checked');
    cb.classList.remove('checked');
    label.style.textDecoration = '';
    label.style.opacity = '';
    label.style.color = 'var(--text-dim)';
  }

  const phaseEl = el.closest('.gp-phase');
  const pTasks = proj.phases[pi].tasks;
  const pDone = pTasks.filter(t=>t.done).length;
  const pTotal = pTasks.length;
  const counter = phaseEl.querySelector('.gp-phase-head span:last-child');
  if(counter) counter.textContent = pDone+'/'+pTotal;

  const allPhases = proj.phases;
  const totalDone = allPhases.reduce((s,p) => s + p.tasks.filter(t=>t.done).length, 0);
  const totalAll = allPhases.reduce((s,p) => s + p.tasks.length, 0);
  const newPct = totalAll ? Math.round((totalDone/totalAll)*100) : 0;
  const card = el.closest('.card');
  const pctLabel = card.querySelector('.card-body > div:first-child > span:last-child');
  if(pctLabel) pctLabel.textContent = totalDone + '/' + totalAll + ' tasks (' + newPct + '%)';
  const bar = card.querySelector('.card-body > div:nth-child(2) > div');
  if(bar) {
    bar.style.width = newPct + '%';
    bar.style.background = newPct >= 75 ? 'var(--green)' : newPct >= 40 ? 'var(--yellow)' : 'var(--accent)';
  }
}

function renderEventHealth(){
  const todayISO=new Date().toISOString().slice(0,10);
  const upcoming=MKT_EVENTS.filter(e=>e.endDate>=todayISO).sort((a,b)=>a.startDate.localeCompare(b.startDate));

  // Check for issues — use server-verified data if available, fall back to static flags
  const issues=[];
  const serverIssues=DATA.eventHealthIssues||[];
  if(serverIssues.length>0){
    serverIssues.forEach(i=>issues.push(i));
  } else {
    // Fallback: flag execs as needing calendar verification
    upcoming.forEach(ev=>{
      if(ev.rishabh){
        issues.push({event:ev.shortName, issue:`Rishabh attending — needs calendar verification`, severity:'yellow', dates:ev.dates});
      }
      if(ev.shreyas){
        issues.push({event:ev.shortName, issue:`Shreyas attending — needs calendar verification`, severity:'yellow', dates:ev.dates});
      }
    });
  }
  upcoming.forEach(ev=>{
    // Events with no Notion link
    if(!ev.notionLink){
      issues.push({event:ev.shortName, issue:'No Notion page linked', severity:'gray', dates:ev.dates});
    }
    // Events with TBD venue
    if(ev.venue==='TBD'){
      const daysUntil=Math.ceil((new Date(ev.startDate)-new Date())/86400000);
      if(daysUntil<30){
        issues.push({event:ev.shortName, issue:`Venue TBD — ${daysUntil} days away`, severity:'red', dates:ev.dates});
      }
    }
  });

  const calChecks=issues.filter(i=>i.severity==='yellow').length;
  const urgent=issues.filter(i=>i.severity==='red').length;

  return `
  <div class="card">
    <div class="card-head">
      <div class="card-title">&#127915; Event Health</div>
      <div class="card-badges">
        ${urgent>0?`<span class="badge tag-red">${urgent} urgent</span>`:''}
        ${calChecks>0?`<span class="badge tag-yellow">${calChecks} cal checks</span>`:''}

    </div>

      ${issues.length===0?'<div style="font-size:11px;color:var(--green);padding:8px 0">All events healthy</div>':''}

        <div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px;align-items:flex-start">
          <span class="ai-dot red" style="margin-top:4px"></span>

        </div>

          <span class="ai-dot yellow" style="margin-top:4px"></span>

        </div>
      `).join('')}
      ${issues.filter(i=>i.severity==='gray').map(i=>`
        <div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px;align-items:flex-start">

  .catch(()=>{})
  .then(()=>{
    // Then try live auth endpoint for freshest data (may fail if session expired)
    return fetch('/api/calendar?days=14',{credentials:'include',redirect:'error'})
    .then(r=>{
      if(!r.ok)throw new Error('not ok');
      var ct=r.headers.get('content-type')||'';
      if(!ct.includes('json'))throw new Error('not json');
      return r.json();
    })
    .then(data=>{
      if(!data||!Array.isArray(data.calendarDays)||data.calendarDays.length===0)return;
      // Only override if live has MORE data than cache
      if(data.calendarDays.length>(DATA.calendarDays||[]).length){

        renderPersonPage('Rishabh');
        renderPersonPage('Shreyas');
        console.log('[Calendar] Live update:',data.calendarDays.length,'days');
      }
    })
    .catch(()=>{});
  });
}

const FPPC_API_URL='/api/fppc-votes';

async function fetchLiveFPPC(){
  try{
    const res=await fetch(FPPC_API_URL);
    const data=await res.json();
    if(!data.events||data.events.length===0)return; // Don't overwrite with empty data
    // Replace upcoming events with live data from the FPPC API
    // Parse human-readable dates to ISO for filtering
    function parseFppcDate(dateStr){
      if(!dateStr)return '';
      // Handle "Mar 28", "Mar 28–29", "Apr 11–12" etc
      const months={Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
      const m=dateStr.match(/(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+(\d+)/);
      if(!m)return '';
      return '2026-'+months[m[1]]+'-'+m[2].padStart(2,'0');
    }

function applyDoneStatesAndMergeManual(tasks){
  // 1. Apply localStorage done states ONLY for recent checks (< 3 min)
  // Notion is the source of truth. localStorage is just an optimistic cache
  // to prevent the UI from flickering between check and next live refresh.
  const doneIds=new Set(loadDoneIds());
  const doneTitles=new Set(loadDoneTitles());
  const now=Date.now();
  tasks.forEach(t=>{
    // If Notion says done, trust it
    if(t.done) return;
    // If localStorage says done, only trust it if the check was recent (< 3 min)
    const checkTime=localStorage.getItem('sophie-dash-last-check-'+t.id);
    if(checkTime && (now - new Date(checkTime).getTime()) < 180000) {
      if(doneIds.has(t.id)||doneTitles.has(normalizeTitle(t.title))) t.done=true;
    }
    if(t.notionPageId) {
      const checkTime2=localStorage.getItem('sophie-dash-last-check-'+t.notionPageId);
      if(checkTime2 && (now - new Date(checkTime2).getTime()) < 180000) {
        if(doneIds.has(t.notionPageId)) t.done=true;
      }
    }
  });
  // 2. Re-merge manual tasks — ONLY if they synced to Notion (have notionPageId)
  // Tasks without notionPageId are ghosts that never made it to Notion
  const manual=loadManualTasks();
  const existingIds=new Set(tasks.map(t=>t.id));
  const existingTitles=new Set(tasks.map(t=>normalizeTitle(t.title)));
  const validManual=[];
  manual.forEach(m=>{
    // Skip if already in the live task list
    if(existingIds.has(m.id))return;
    if(m.notionPageId&&existingIds.has(m.notionPageId))return;
    if(existingTitles.has(normalizeTitle(m.title)))return;
    // Only keep if it has a Notion page ID (successfully synced) OR was just created (< 2 min ago)
    const ageMs=Date.now()-new Date(m.addedAt||0).getTime();
    if(m.notionPageId||m.notionSynced||ageMs<120000){
      if(doneIds.has(m.id)||doneTitles.has(normalizeTitle(m.title)))m.done=true;
      tasks.unshift(m);
      validManual.push(m);
    }
  });
  // Clean up localStorage — remove ghost tasks
  if(validManual.length<manual.length){
    saveManualTasks(validManual);
    console.log('[Cleanup] Removed',manual.length-validManual.length,'ghost tasks from localStorage');
  }
  // 3. Process retry queue — re-send failed completion calls
  const retryQueue=JSON.parse(localStorage.getItem('sophie-dash-retry-queue')||'[]');
  if(retryQueue.length>0){
    localStorage.setItem('sophie-dash-retry-queue','[]');
    retryQueue.forEach(r=>{
      fetch('/api/tasks/complete',{
        method:'POST',headers:{'Content-Type':'application/json'},
        credentials:'include',redirect:'error',
        body:JSON.stringify(r)
      }).catch(()=>{});
    });
  }
  return tasks;
}

async function fetchLiveTasks(){
  try{
    const res=await fetch('/api/tasks/deduped',{credentials:'include',redirect:'error'});
    if(!res.ok){
      const fallback=await fetch('/api/tasks/live',{credentials:'include',redirect:'error'});
      if(!fallback.ok)return;
      const ct=fallback.headers.get('content-type')||'';
      if(!ct.includes('json'))return; // Auth redirect — don't overwrite with HTML
      const data=await fallback.json();
      if(data.tasks){
        DATA.myTasks=applyDoneStatesAndMergeManual(data.tasks);
      }
      renderTasksPage();renderOverview();renderSidebar();
      return;
    }
    const ct=res.headers.get('content-type')||'';
    if(!ct.includes('json'))return; // Auth redirect protection
    const data=await res.json();
    if(!data.tasks||data.tasks.length===0)return;

    DATA.myTasks=applyDoneStatesAndMergeManual(data.tasks);
    if(data.duplicatesFound&&data.duplicatesFound.length>0){
      console.log('[Dedup] Duplicates resolved:',data.duplicatesFound);
    }
    renderTasksPage();renderOverview();renderSidebar();
    const activePage=loadActivePage();
    if(activePage&&activePage!=='overview')navigateTo(activePage);
    console.log('[Live] Tasks updated (deduped):',DATA.myTasks.length,'tasks');
  }catch(e){console.warn('[Live] Task fetch failed:',e.message);}
}

async function fetchLiveEvents(){
  try{

    if(!res.ok)return;
    const data=await res.json();

// ── Reconciliation ──

async function reconcileTasks(){
  try{
    // Build local task state
    const localTasks=DATA.myTasks.map(t=>({
      id:t.id,
      notionPageId:t.notionPageId,
      title:t.title,
      done:t.done,
      lastModifiedAt:localStorage.getItem('sophie-dash-last-check-'+t.id)||t.lastModifiedAt||null
    }));
    const res=await fetch('/api/tasks/reconcile',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({localTasks})
    });
    if(!res.ok)return;
    const data=await res.json();
    // Apply local updates from reconciliation
    if(data.actions){
      data.actions.filter(a=>a.action==='update-local').forEach(a=>{
        const task=DATA.myTasks.find(t=>t.id===a.taskId);
        if(task)task.done=a.done;
      });
    }
    if(data.resolved>0){
      console.log('[Reconcile] Resolved',data.resolved,'conflicts');
      renderTasksPage();
    }
  }catch(e){console.warn('[Reconcile] Failed:',e.message);}
}

    }).catch(e => console.warn('[Notion] Checkbox sync failed:', e.message));
  }

// Load server checkbox states on startup and apply
async function loadServerCheckboxStates() {
  try {
    const res = await fetch('/api/checkbox-states');
    if (!res.ok) return;
    const states = await res.json();
    // Apply to offsite tasks (check both legacy and offsite-ID-specific keys)
    if (DATA.leadershipOffsite) {
      const offsiteIdForServer = _activeOffsiteId || '2026-Q2';
      DATA.leadershipOffsite.phases.forEach((p, pi) => {
        p.tasks.forEach((t, ti) => {
          const s = states['offsite-' + offsiteIdForServer + '-' + pi + '-' + ti] || states['offsite-' + pi + '-' + ti];
          if (s) t.done = s.checked;
        });
      });
    }
    // Apply to hack week tasks
    if (DATA.hackWeek) {
      DATA.hackWeek.phases.forEach((p, pi) => {
        p.tasks.forEach((t, ti) => {
          const s = states['hackweek-' + pi + '-' + ti];
          if (s) t.done = s.checked;
        });
      });
    }
    // Apply to marketing event todos
    MKT_EVENTS.forEach(ev => {
      ev.todos.forEach((t, ti) => {
        const s = states['mkt-' + ev.id + '-' + ti];
        if (s) t.done = s.checked;
      });
    });
    console.log('[Checkbox] Server states loaded:', Object.keys(states).length, 'keys');
  } catch (e) { console.warn('[Checkbox] Load failed:', e.message); }
}

        const taskRealId = ep.todos[todoIdx].id || ('t' + (todoIdx + 1));
        fetch('/api/podcast/episodes/' + epId + '/todos/' + taskRealId, {
          method: 'PATCH',
          headers: {'Content-Type': 'application/json'},
          credentials: 'include',
          body: JSON.stringify({status: isChecked ? 'Done' : 'To Do'})
        }).then(r=>r.json()).then(d=>{
          if(d.ok) console.log('[Podcast] Todo updated:', taskRealId);
          else console.error('[Podcast] Todo update failed:', d.error);
        }).catch(err => console.error('Failed to update episode todo:', err));
      }
      updatePodEpProgress(epId);
    });
  });

  // Wire launch todo checkboxes
  document.querySelectorAll('.pod-launch-todo .task-checkbox').forEach(cb => {
    cb.addEventListener('click', (e) => {
      e.stopPropagation();
      const item = cb.closest('.task-check-item');
      const isChecked = item.classList.toggle('checked');
      cb.classList.toggle('checked');
      if(isChecked) { item.style.opacity='0.45'; } else { item.style.opacity=''; }
      const todoIdx = parseInt(item.dataset.launchIdx);
      if (!isNaN(todoIdx) && PODCAST_LAUNCH_TASKS[todoIdx]) {
        PODCAST_LAUNCH_TASKS[todoIdx]._done = isChecked;
        const taskRealId = PODCAST_LAUNCH_TASKS[todoIdx].id || ('lt' + (todoIdx + 1));
        fetch('/api/podcast/launch-tasks/' + taskRealId, {
          method: 'PATCH',
          headers: {'Content-Type': 'application/json'},
          credentials: 'include',
          body: JSON.stringify({status: isChecked ? 'Done' : 'Not Started'})
        }).then(r=>r.json()).then(d=>{
          if(d.ok) console.log('[Podcast] Launch task updated:', taskRealId);
          else console.error('[Podcast] Launch task update failed:', d.error);
        }).catch(err => console.error('Failed to update launch todo:', err));
      }
      updatePodLaunchProgress();
    });
  });

        return '<div class="card" style="margin-bottom:12px;overflow:hidden">' +
          '<div style="padding:12px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:var(--surface)" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\';this.querySelector(\'.pod-chevron\').textContent=this.nextElementSibling.style.display===\'none\'?\'&#9654;\':\'&#9660;\'">' +

          '</div>' +
        '</div>';

    '</div>';

  function renderPodDistribution() {
    var statusColors = {
      'Not Started':['rgba(160,174,192,.12)','#A0AEC0'],
      'Draft':['rgba(236,201,75,.15)','#ECC94B'],
      'Review':['rgba(237,137,54,.15)','#ED8936'],
      'Scheduled':['rgba(66,153,225,.15)','#4299E1'],
      'Published':['rgba(72,187,120,.15)','var(--green)']
    };
    var channelIcons = {
      'LinkedIn':'&#128101;','Email':'&#9993;','Slack':'&#128172;',
      'Blog':'&#128196;','Social Pilot':'&#127916;','Google Ads':'&#128200;'
    };
    var statuses = ['Not Started','Draft','Review','Scheduled','Published'];

    if (PODCAST_DISTRIBUTION.length === 0) {
      var firstEp = PODCAST_EPISODES.length > 0 ? PODCAST_EPISODES[0] : null;
      return '<div class="pod-tab-pane" id="pod-distribution">' +
        '<div class="card"><div class="card-head"><span class="card-title">Content Distribution Tracker</span></div>' +
        '<div class="card-body" style="padding:40px;text-align:center;color:var(--text-muted)">' +
        '<div style="font-size:24px;margin-bottom:8px">&#128225;</div>' +
        '<div>Distribution tracking starts when episodes reach Promotion phase.</div>' +
        '<div style="font-size:11px;margin-top:8px">Each episode generates 8 channel items: LinkedIn (3), Email, Slack, Blog, Social Pilot, Google Ads.</div>' +
        '<div style="font-size:11px;margin-top:4px">Status flow: <span style="color:#A0AEC0">Not Started</span> &#8594; <span style="color:#ECC94B">Draft</span> &#8594; <span style="color:#ED8936">Review</span> &#8594; <span style="color:#4299E1">Scheduled</span> &#8594; <span style="color:var(--green)">Published</span></div>' +
        (firstEp ? '<div style="margin-top:16px"><button onclick="generateDistribution(\''+firstEp.id+'\')" style="padding:6px 16px;background:var(--gold);color:#000;border:none;border-radius:6px;font-weight:700;font-size:11px;cursor:pointer">Generate for Episode 1</button></div>' : '') +
        '</div></div></div>';
    }

    // Overall stats
    var totalChannels = 0, publishedCount = 0, inProgressCount = 0;
    PODCAST_DISTRIBUTION.forEach(function(ep) {
      ep.channels.forEach(function(ch) {
        totalChannels++;
        if (ch.status === 'Published') publishedCount++;
        else if (ch.status !== 'Not Started') inProgressCount++;
      });
    });

    var html = '<div class="pod-tab-pane" id="pod-distribution">';

    // Stats bar
    html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">' +
      '<div class="card" style="padding:8px 12px;border-left:3px solid var(--lavender)">' +
        '<div style="font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);font-weight:700">Total Channels</div>' +
        '<div style="font-size:18px;font-weight:800;color:var(--lavender);margin-top:2px">'+totalChannels+'</div>' +
      '</div>' +
      '<div class="card" style="padding:8px 12px;border-left:3px solid var(--green)">' +
        '<div style="font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);font-weight:700">Published</div>' +
        '<div style="font-size:18px;font-weight:800;color:var(--green);margin-top:2px">'+publishedCount+'</div>' +
      '</div>' +
      '<div class="card" style="padding:8px 12px;border-left:3px solid #4299E1">' +
        '<div style="font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);font-weight:700">In Progress</div>' +
        '<div style="font-size:18px;font-weight:800;color:#4299E1;margin-top:2px">'+inProgressCount+'</div>' +
      '</div>' +
    '</div>';

    // Per-episode distribution
    PODCAST_DISTRIBUTION.forEach(function(epDist) {
      var doneCount = epDist.channels.filter(function(c){return c.status==='Published';}).length;
      var total = epDist.channels.length;
      var pct = total ? Math.round(doneCount/total*100) : 0;

      html += '<div class="card" style="margin-bottom:12px"><div class="card-head">' +
        '<span class="card-title">'+epDist.episodeTitle+'</span>' +
        '<span style="font-size:11px;color:var(--text-muted)">'+doneCount+'/'+total+' channels done</span>' +
      '</div>';

      // Progress bar
      html += '<div style="padding:0 14px 10px 14px">' +
        '<div style="height:6px;background:var(--bg-card);border-radius:3px;overflow:hidden">' +
          '<div style="height:100%;width:'+pct+'%;background:'+(pct>=75?'var(--green)':pct>=25?'#4299E1':'var(--text-muted)')+';border-radius:3px;transition:width .3s"></div>' +
        '</div>' +
      '</div>';

      // Channel cards grid
      html += '<div class="card-body" style="padding:10px 14px">' +
        '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px">';

      epDist.channels.forEach(function(ch) {
        var sc = statusColors[ch.status] || statusColors['Not Started'];
        var icon = channelIcons[ch.channel] || '&#128196;';

        html += '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;border-left:3px solid '+sc[1]+'">' +
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">' +
            '<span style="font-size:12px;font-weight:700;color:var(--text)">'+icon+' '+ch.channel+'</span>' +
            podOwnerBadge(ch.owner) +
          '</div>' +
          '<div style="font-size:11px;color:var(--text-dim);margin-bottom:8px">'+ch.type+'</div>' +
          '<select onchange="updateDistributionStatus(\''+ch.id+'\',this.value)" style="width:100%;padding:4px 6px;font-size:10px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;cursor:pointer">';

        statuses.forEach(function(s) {
          html += '<option value="'+s+'"'+(ch.status===s?' selected':'')+'>'+s+'</option>';
        });

        html += '</select>';

        // Show scheduled date or published URL if present
        if (ch.scheduledDate) {
          html += '<div style="font-size:9px;color:var(--text-muted);margin-top:4px">Scheduled: '+ch.scheduledDate+'</div>';
        }
        if (ch.publishedUrl) {
          html += '<div style="margin-top:4px"><a href="'+ch.publishedUrl+'" target="_blank" style="font-size:9px;color:var(--gold);text-decoration:none">View published &#8599;</a></div>';
        }

        html += '</div>';
      });

      html += '</div></div></div>';
    });

    html += '</div>';
    return html;
  }

  function updateDistributionStatus(channelId, status) {
    fetch('/api/podcast/content-distribution/' + channelId, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      credentials: 'include',
      body: JSON.stringify({ status: status })
    }).then(function(r){return r.json();}).then(function(d){
      if(d.ok) console.log('[Distribution] Updated:', channelId, status);
    });
  }

  function generateDistribution(episodeId) {
    fetch('/api/podcast/content-distribution/generate', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      credentials: 'include',
      body: JSON.stringify({ episodeId: episodeId })
    }).then(function(r){return r.json();}).then(function(d){
      if(d.ok) renderPodcastPage();
    });
  }

  function updatePodEpProgress(epId) {
    const ep = PODCAST_EPISODES.find(function(e){return e.id===epId;});
    if (!ep) return;
    const done = ep.todos.filter(function(t){return t.done;}).length;
    const total = ep.todos.length;
    const pct = total ? Math.round(done/total*100) : 0;
    const pctEl = document.getElementById('pod-ep-pct-'+epId);
    const barEl = document.getElementById('pod-ep-bar-'+epId);
    const countEl = document.getElementById('pod-ep-count-'+epId);
    if (pctEl) pctEl.textContent = pct+'%';
    if (barEl) { barEl.style.width = pct+'%'; barEl.style.background = pct>=75?'var(--green)':pct>=40?'var(--yellow)':'var(--red)'; }
    if (countEl) countEl.textContent = done+' of '+total+' tasks done';
  }

  function updatePodLaunchProgress() {
    const done = PODCAST_LAUNCH_TASKS.filter(function(t){return t._done;}).length;
    const total = PODCAST_LAUNCH_TASKS.length;
    const pct = total ? Math.round(done/total*100) : 0;
    const pctEl = document.getElementById('pod-launch-pct');
    const barEl = document.getElementById('pod-launch-bar');
    const countEl = document.getElementById('pod-launch-count');
    if (pctEl) pctEl.textContent = pct+'%';
    if (barEl) { barEl.style.width = pct+'%'; barEl.style.background = pct>=75?'var(--green)':pct>=40?'var(--yellow)':'var(--red)'; }
    if (countEl) countEl.textContent = done+' of '+total+' tasks done';
  }
}

// ── Marketing Reporting Hub ──
function addCampaign() {
  var name = prompt('Campaign name:');
  if (!name) return;
  var owner = prompt('Owner (e.g. Jennifer, Saunder, Maya):') || '';
  fetch('/api/marketing/campaigns', {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer sophie-dashboard-secret-change-me'},
    body:JSON.stringify({action:'add', campaign:{name:name, status:'Planning', owner:owner}})
  }).then(function(r){return r.json();}).then(function(d){if(d.ok)renderMarketingHubPage();});
}

function updateCampaignStatus(id, status) {
  fetch('/api/marketing/campaigns', {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer sophie-dashboard-secret-change-me'},
    body:JSON.stringify({action:'update', campaign:{id:id, status:status}})
  }).then(function(r){return r.json();}).then(function(d){if(d.ok)console.log('[Marketing] Campaign updated');});
}

function toggleStandupBrief(idx) {
  var el = document.getElementById('standup-brief-'+idx);
  if (!el) return;
  if (el.style.display === 'none') { el.style.display = 'block'; } else { el.style.display = 'none'; }
}

async function renderMarketingHubPage(){
  var el=document.getElementById('page-marketing-hub');
  if(!el) return;
  var mkt;
  try {
    var resp=await fetch('/api/marketing');
    mkt=await resp.json();
  } catch(e) {
    mkt={config:{},standups:[],campaigns:[],reviews:[]};
  }
  var config=mkt.config||{};
  var ownerIcons={'Saunder':'&#128640;','Jennifer':'&#9999;&#65039;','Maya':'&#127881;'};
  var standups=mkt.standups||[];
  var campaigns=mkt.campaigns||[];
  var reviews=mkt.reviews||[];
  var schedule=config.standupSchedule||{};
  var owners={
    monday: typeof schedule.monday==='object'?(schedule.monday.owner||'Saunder'):(schedule.monday||'Saunder'),
    wednesday: typeof schedule.wednesday==='object'?(schedule.wednesday.owner||'Jennifer'):(schedule.wednesday||'Jennifer'),
    friday: typeof schedule.friday==='object'?(schedule.friday.owner||'Maya'):(schedule.friday||'Maya')
  };
  // Clean owner names (strip descriptions)
  Object.keys(owners).forEach(function(k){if(typeof owners[k]==='string')owners[k]=owners[k].split('(')[0].trim().split(' ')[0];});

  // Determine next standup
  const dayNames=['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  const standupDays={monday:1,wednesday:3,friday:5};
  const today=new Date();
  const todayDow=today.getDay();
  let nextDay=null;let nextOwner='';let daysAway=7;
  Object.entries(standupDays).forEach(function(entry){
    var diff=entry[1]-todayDow;
    if(diff<=0)diff+=7;
    if(diff<daysAway||(diff===daysAway&&!nextDay)){daysAway=diff;nextDay=entry[0];nextOwner=schedule[entry[0]]||'';}
  });
  // If today is a standup day, highlight it
  if(standupDays[dayNames[todayDow]]!==undefined){nextDay=dayNames[todayDow];nextOwner=schedule[nextDay]||'';daysAway=0;}
  const nextDate=new Date(today);nextDate.setDate(nextDate.getDate()+daysAway);
  const nextDateStr=nextDate.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});

  const mktTabs=[
    {id:'mkt-current',label:'Current Week'},
    {id:'mkt-archive',label:'Standup Archive'},
    {id:'mkt-campaigns',label:'Campaigns'},
    {id:'mkt-calendar',label:'Content Calendar'},
    {id:'mkt-reviews',label:'Reviews'}
  ];

  // ── Current Week: action items from latest standup ──
  var latestStandup=standups.length>0?standups[0]:null;
  var actionItemsHtml='';
  if(latestStandup && latestStandup.actionItems && latestStandup.actionItems.length>0){
    actionItemsHtml='<div class="card" style="padding:14px;margin-top:12px;border-left:3px solid var(--green)">'+
      '<div style="font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);font-weight:700;margin-bottom:8px">Action Items from Latest Standup ('+(latestStandup.date||'')+' &mdash; '+(latestStandup.owner||'')+')</div>'+
      latestStandup.actionItems.map(function(item){
        return '<div style="font-size:11px;color:var(--text);padding:3px 0;display:flex;gap:6px;align-items:baseline"><span style="color:var(--gold)">&#8226;</span><span>'+item+'</span></div>';
      }).join('')+
      '</div>';
  } else if(latestStandup && latestStandup.brief){
    actionItemsHtml='<div class="card" style="padding:14px;margin-top:12px;border-left:3px solid var(--surface)">'+
      '<div style="font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);font-weight:700;margin-bottom:4px">Latest Brief ('+(latestStandup.date||'')+' &mdash; '+(latestStandup.owner||'')+')</div>'+
      '<div style="font-size:11px;color:var(--text-dim);white-space:pre-wrap;max-height:120px;overflow-y:auto">'+latestStandup.brief.substring(0,500)+(latestStandup.brief.length>500?'...':'')+'</div></div>';
  }

  // ── Standup archive ──
  var archiveHtml='';
  if(standups.length>0){
    archiveHtml=standups.map(function(s,idx){
      var aiList='';
      if(s.actionItems&&s.actionItems.length>0){
        aiList='<div style="margin-top:6px">'+s.actionItems.map(function(a){return '<div style="font-size:10px;color:var(--text);padding:1px 0"><span style="color:var(--gold)">&#8226;</span> '+a+'</div>';}).join('')+'</div>';
      }
      var decList='';
      if(s.decisions&&s.decisions.length>0){
        decList='<div style="margin-top:6px">'+s.decisions.map(function(d){return '<div style="font-size:10px;color:var(--text);padding:1px 0"><span style="color:var(--lavender)">&#9670;</span> '+d+'</div>';}).join('')+'</div>';
      }
      return '<div class="card" style="margin-bottom:8px;padding:12px 14px;cursor:pointer" onclick="toggleStandupBrief('+idx+')">'+
        '<div style="display:flex;justify-content:space-between;align-items:center">'+
        '<div style="display:flex;gap:8px;align-items:center">'+
        '<span style="font-size:14px">'+(ownerIcons[s.owner]||'&#128203;')+'</span>'+
        '<div><div style="font-weight:700;font-size:12px;color:var(--text)">'+(s.date||'Unknown date')+'</div>'+
        '<div style="font-size:10px;color:var(--text-muted)">'+(s.owner||'')+(s.day?' &mdash; '+s.day:'')+'</div></div></div>'+
        '<span style="font-size:10px;color:var(--text-muted)">&#9660; expand</span></div>'+
        '<div id="standup-brief-'+idx+'" style="display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">'+
        (s.brief?'<div style="font-size:11px;color:var(--text-dim);white-space:pre-wrap">'+s.brief+'</div>':'')+
        aiList+decList+
        '</div></div>';
    }).join('');
  } else {
    archiveHtml='<div style="padding:40px;text-align:center;color:var(--text-muted)"><div style="font-size:24px;margin-bottom:8px">&#128220;</div><div>Archive will populate as standup prep briefs run.</div><div style="font-size:11px;margin-top:4px">Briefs are saved automatically after posting to #marketing-agendas.</div></div>';
  }

  // ── Campaigns ──
  var mktStatusColors={Planning:'var(--lavender)',Active:'var(--green)',Paused:'var(--yellow)',Complete:'var(--text-muted)'};

    campaignHtml=campaigns.map(function(c){
      var statusOpts=['Planning','Active','Paused','Complete'];
      var selectHtml='<select onchange="updateCampaignStatus(\''+c.id+'\',this.value)" style="font-size:10px;padding:2px 6px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer">';
      statusOpts.forEach(function(st){
        selectHtml+='<option value="'+st+'"'+(c.status===st?' selected':'')+'>'+st+'</option>';

        '<div><span style="font-weight:700;font-size:12px;color:var(--text)">'+c.name+'</span>'+
        (c.owner?'<span style="font-size:10px;color:var(--text-muted);margin-left:8px">'+c.owner+'</span>':'')+

        '<div style="display:flex;gap:6px;align-items:center">'+
        '<span style="width:6px;height:6px;border-radius:50%;background:'+(mktStatusColors[c.status]||'var(--text-muted)')+'"></span>'+
        selectHtml+
        '</div></div></div>';
    }).join('');
  } else {
    campaignHtml='<div style="padding:40px;text-align:center;color:var(--text-muted)"><div style="font-size:24px;margin-bottom:8px">&#128640;</div><div>No active campaigns tracked yet.</div><div style="font-size:11px;margin-top:4px">Add your first campaign below.</div></div>';
  }

  // ── Reviews ──

  if(reviews.length>0){
    reviewHtml=reviews.map(function(r){
      return '<div class="card" style="margin-bottom:8px;padding:10px 14px"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:700;font-size:12px;color:var(--text)">'+r.title+'</span><span style="font-size:10px;color:var(--text-muted)">'+r.date+'</span></div>'+(r.summary?'<div style="font-size:11px;color:var(--text-dim);margin-top:4px">'+r.summary+'</div>':'')+'</div>';
    }).join('');
  } else {
    reviewHtml='<div style="padding:40px;text-align:center;color:var(--text-muted)"><div style="font-size:24px;margin-bottom:8px">&#128203;</div><div>No weekly rollups yet.</div><div style="font-size:11px;margin-top:4px">Weekly marketing rollups will appear here.</div></div>';

    '<div style="font-size:11px;color:var(--text-muted)">'+(config.slackChannel||'#marketing-agendas')+
    (config.notionHub?' &middot; <a href="'+config.notionHub+'" target="_blank" style="color:var(--gold)">Notion Hub</a>':'')+

// ── BD Helper Functions ──
function updateBDStatus(id, status) {
  fetch('/api/bd/relationships/'+id, {
    method:'PATCH',
    headers:{'Content-Type':'application/json','Authorization':'Bearer sophie-dashboard-secret-change-me'},
    body:JSON.stringify({status:status})
  }).then(function(r){return r.json();}).then(function(d){if(d.ok){console.log('[BD] Status updated');renderBDPage();}});
}

function logBDInteraction(id) {
  var note = prompt('Log interaction (call, email, meeting):');
  if (!note) return;
  fetch('/api/bd/relationships/log', {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer sophie-dashboard-secret-change-me'},
    body:JSON.stringify({id:id, type:'note', note:note})
  }).then(function(r){return r.json();}).then(function(d){
    if(d.ok){ console.log('[BD] Logged'); renderBDPage(); }
  });
}

function archiveBDRelationship(id) {
  if (!confirm('Archive this relationship?')) return;
  fetch('/api/bd/relationships/archive', {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer sophie-dashboard-secret-change-me'},
    body:JSON.stringify({id:id})
  }).then(function(r){return r.json();}).then(function(d){
    if(d.ok){ console.log('[BD] Archived'); renderBDPage(); }
  });
}

function addBDRelationship() {
  var company = document.getElementById('bd-new-company');
  var contact = document.getElementById('bd-new-contact');
  if ((!company||!company.value.trim()) && (!contact||!contact.value.trim())) return;
  var data = {
    company: company?company.value.trim():'',
    contact: contact?contact.value.trim():'',
    contactTitle: (document.getElementById('bd-new-title')||{}).value||'',
    type: (document.getElementById('bd-new-type')||{}).value||'prospect',
    tier: (document.getElementById('bd-new-tier')||{}).value||'Tier 3',
    owner: (document.getElementById('bd-new-owner')||{}).value||'Sophie',
    notes: ''
  };
  fetch('/api/bd/relationships/add', {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer sophie-dashboard-secret-change-me'},
    body:JSON.stringify(data)
  }).then(function(r){return r.json();}).then(function(d){
    if(d.ok){ console.log('[BD] Added'); renderBDPage(); }
  });
}

function draftBDFollowUp(rel) {
  var area = document.getElementById('bd-draft-area-'+rel.id);
  if (area) { area.parentNode.removeChild(area); return; }
  var tr = document.querySelector('[data-bd-row="'+rel.id+'"]');
  if (!tr) return;
  var div = document.createElement('tr');
  div.id = 'bd-draft-area-'+rel.id;
  var firstName = rel.contact ? rel.contact.split(' ')[0] : 'there';
  div.innerHTML = '<td colspan="10" style="padding:8px 12px;background:var(--surface)">'+
    '<div style="font-size:11px;font-weight:600;margin-bottom:4px;color:var(--gold)">Draft Follow-up for '+((rel.company||'')+(rel.contact?' / '+rel.contact:''))+'</div>'+
    '<textarea id="bd-draft-text-'+rel.id+'" style="width:100%;min-height:80px;font-size:12px;font-family:inherit;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);resize:vertical" placeholder="Draft your follow-up message here...">Hi '+firstName+',\n\nJust wanted to follow up on our conversation'+(rel.nextAction?' regarding '+rel.nextAction:'')+'. Would love to find a time to reconnect.\n\nBest,\nSophie</textarea>'+
    '<div style="display:flex;gap:6px;margin-top:6px">'+
    '<button onclick="navigator.clipboard.writeText(document.getElementById(\'bd-draft-text-'+rel.id+'\').value);this.textContent=\'Copied!\';var b=this;setTimeout(function(){b.textContent=\'Copy\';},1500)" style="font-size:10px;padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:var(--gold);color:#000;cursor:pointer;font-weight:600">Copy</button>'+

async function renderBDPage(){
  const el=document.getElementById('page-bd');
  if(!el) return;
  let bd;
  try {
    const resp=await fetch('/api/bd');
    bd=await resp.json();
  } catch(e) {
    bd={config:{},relationships:[],followUps:[],reviews:[]};
  }
  const allRels=bd.relationships||[];
  const rels=allRels.filter(function(r){return r.status!=='Archived';});
  const config=bd.config||{};

  const bdTabs=[
    {id:'bd-active',label:'Active Relationships'},
    {id:'bd-pipeline',label:'Pipeline'},
    {id:'bd-contacts',label:'Contacts'},
    {id:'bd-followups',label:'Follow-ups'},
    {id:'bd-reviews',label:'Reviews'}
  ];

  function tierColor(tier){
    if(tier==='Tier 1') return '#d4af37';
    if(tier==='Tier 2') return '#7c8cf8';
    if(tier==='Tier 3') return '#4ecdc4';
    return '#666';
  }
  function tierBadge(tier){
    return '<span style="font-size:9px;padding:2px 8px;border-radius:4px;font-weight:700;background:'+tierColor(tier)+'22;color:'+tierColor(tier)+'">'+tier+'</span>';
  }
  function statusBadge(status){
    const colors={'Active Conversation':'#d4af37','Active':'#4ecdc4','New Intro':'#7c8cf8','Nurturing':'#a78bfa','Dormant':'#666','New':'#4ecdc4'};
    const c=colors[status]||'#888';
    return '<span style="font-size:9px;padding:2px 8px;border-radius:4px;font-weight:700;background:'+c+'22;color:'+c+'">'+status+'</span>';
  }
  function typeBadge(type){
    const colors={partner:'#d4af37',customer:'#4ecdc4',investor:'#7c8cf8',prospect:'#a78bfa',advisor:'#f472b6'};
    const c=colors[type]||'#888';
    return '<span style="font-size:9px;padding:2px 8px;border-radius:4px;font-weight:700;background:'+c+'22;color:'+c+'">'+type+'</span>';
  }
  function daysSinceNum(dateStr){
    if(!dateStr) return 999;
    return Math.floor((new Date()-new Date(dateStr))/(1000*60*60*24));
  }
  function daysSince(dateStr){
    if(!dateStr) return '<span style="color:#888">&mdash;</span>';
    var diff=daysSinceNum(dateStr);
    var color=diff<3?'#4ecdc4':diff<=7?'#d4af37':'#e84e44';
    if(diff===0) return '<span style="color:'+color+';font-weight:600">Today</span>';
    if(diff===1) return '<span style="color:'+color+';font-weight:600">1d ago</span>';
    return '<span style="color:'+color+';font-weight:600">'+diff+'d ago</span>';
  }

  // Active Relationships tab
  function renderActiveTab(){
    var btnStyle='font-size:9px;padding:2px 6px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);cursor:pointer;font-family:inherit';
    var btnGold='font-size:9px;padding:2px 6px;border-radius:4px;border:1px solid var(--border);background:var(--gold);color:#000;cursor:pointer;font-weight:600;font-family:inherit';
    var btnRed='font-size:9px;padding:2px 6px;border-radius:4px;border:1px solid #e84e44;background:transparent;color:#e84e44;cursor:pointer;font-family:inherit';
    var rows=rels.map(function(r){
      var ds=daysSinceNum(r.lastTouch);
      var needsNudge=ds>7;
      var statusSelect='<select onchange="updateBDStatus(\''+r.id+'\', this.value)" style="font-size:10px;padding:2px 4px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit">'+
        '<option value="Active Conversation" '+(r.status==='Active Conversation'?'selected':'')+'>Active</option>'+
        '<option value="New Intro" '+(r.status==='New Intro'?'selected':'')+'>New Intro</option>'+
        '<option value="Nurturing" '+(r.status==='Nurturing'?'selected':'')+'>Nurturing</option>'+
        '<option value="Dormant" '+(r.status==='Dormant'?'selected':'')+'>Dormant</option>'+
        '<option value="New" '+(r.status==='New'?'selected':'')+'>New</option>'+
        '</select>';
      var relJson=JSON.stringify(r).replace(/\\/g,'\\\\').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
      var actions='<div style="display:flex;gap:4px;flex-wrap:wrap">'+
        '<button onclick="logBDInteraction(\''+r.id+'\')" style="'+btnStyle+'" title="Log a call, email, or meeting">Quick Log</button>'+
        '<button onclick="draftBDFollowUp(JSON.parse(this.dataset.rel))" data-rel="'+relJson+'" style="'+btnStyle+'" title="Draft a follow-up message">Draft</button>'+
        (needsNudge?'<button onclick="nudgeBD(JSON.parse(this.dataset.rel))" data-rel="'+relJson+'" style="'+btnGold+'" title="Generate a check-in nudge">Nudge</button>':'')+
        '<button onclick="archiveBDRelationship(\''+r.id+'\')" style="'+btnRed+'" title="Archive this relationship">&times;</button>'+
        '</div>';
      return '<tr data-bd-row="'+r.id+'">'+
        '<td style="font-weight:600">'+(r.company||'&mdash;')+'</td>'+
        '<td>'+(r.contact||'')+'</td>'+
        '<td>'+typeBadge(r.type)+'</td>'+
        '<td>'+statusSelect+'</td>'+
        '<td style="font-size:11px">'+daysSince(r.lastTouch)+'</td>'+
        '<td style="font-size:11px">'+(r.nextAction||'&mdash;')+'</td>'+
        '<td>'+tierBadge(r.tier)+'</td>'+

        '<td>'+actions+'</td>'+
      '</tr>';
    }).join('');

    var addForm='<div class="card" style="margin-top:12px"><div class="card-head"><span>Add New Relationship</span></div>'+
      '<div class="card-body" style="padding:12px">'+
      '<div style="display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end">'+
      '<div style="flex:1;min-width:120px"><label style="font-size:10px;color:var(--text-muted);display:block;margin-bottom:2px">Company</label><input id="bd-new-company" placeholder="Company name" style="width:100%;font-size:12px;padding:6px 8px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:inherit"></div>'+
      '<div style="flex:1;min-width:120px"><label style="font-size:10px;color:var(--text-muted);display:block;margin-bottom:2px">Contact</label><input id="bd-new-contact" placeholder="Contact name" style="width:100%;font-size:12px;padding:6px 8px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:inherit"></div>'+
      '<div style="flex:1;min-width:100px"><label style="font-size:10px;color:var(--text-muted);display:block;margin-bottom:2px">Title</label><input id="bd-new-title" placeholder="Title" style="width:100%;font-size:12px;padding:6px 8px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:inherit"></div>'+
      '<div style="min-width:90px"><label style="font-size:10px;color:var(--text-muted);display:block;margin-bottom:2px">Type</label><select id="bd-new-type" style="width:100%;font-size:12px;padding:6px 4px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:inherit"><option value="prospect">Prospect</option><option value="partner">Partner</option><option value="customer">Customer</option><option value="investor">Investor</option><option value="advisor">Advisor</option></select></div>'+
      '<div style="min-width:80px"><label style="font-size:10px;color:var(--text-muted);display:block;margin-bottom:2px">Tier</label><select id="bd-new-tier" style="width:100%;font-size:12px;padding:6px 4px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:inherit"><option value="Tier 1">Tier 1</option><option value="Tier 2">Tier 2</option><option value="Tier 3" selected>Tier 3</option></select></div>'+
      '<div style="min-width:80px"><label style="font-size:10px;color:var(--text-muted);display:block;margin-bottom:2px">Owner</label><input id="bd-new-owner" value="Sophie" style="width:100%;font-size:12px;padding:6px 8px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:inherit"></div>'+
      '<button onclick="addBDRelationship()" style="padding:6px 16px;border-radius:4px;border:none;background:var(--gold);color:#000;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;height:32px">Add</button>'+
      '</div></div></div>';

    return '<div class="bd-tab-pane active" id="bd-active">'+
      '<div class="card"><div class="card-head"><span>All Relationships</span><span style="font-size:11px;color:var(--text-muted)">'+rels.length+' active</span></div>'+
      '<div class="card-body" style="overflow-x:auto;padding:0">'+
      '<table style="width:100%;border-collapse:collapse;font-size:12px">'+

  // Pipeline tab - group by status
  function renderPipelineTab(){
    const statuses=['Active Conversation','New Intro','Active','Nurturing','Dormant','New'];
    let html='<div class="bd-tab-pane" id="bd-pipeline">';
    statuses.forEach(function(s){
      const group=rels.filter(function(r){return r.status===s;});
      if(group.length===0) return;
      html+='<div class="card" style="margin-bottom:12px"><div class="card-head"><span>'+statusBadge(s)+'</span><span style="font-size:11px;color:var(--text-muted)">'+group.length+'</span></div>';

        html+='<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)">'+
          '<span style="font-weight:600;min-width:100px">'+(r.company||'&mdash;')+'</span>'+
          '<span style="color:var(--text-muted);font-size:12px">'+(r.contact||'')+'</span>'+
          '<span style="margin-left:auto;font-size:11px">'+(r.nextAction||'&mdash;')+'</span>'+
