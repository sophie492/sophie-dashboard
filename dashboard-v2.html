<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sophie's Dashboard v2 — Fermat</title>
<meta http-equiv="refresh" content="300">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💎</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --forest:#294339;--leaf:#566146;--creme:#D1CFC1;--gold:#DBCB77;
  --lavender:#C1B1D5;--cherry:#6C2B2F;--apple:#A4251D;--ochre:#CA983F;
  --bg:#060d0a;--surface:#0c1610;--card:#111d16;--card-hover:#172419;
  --accent:#C1B1D5;--accent-dim:#9b86b8;--accent-soft:rgba(193,177,213,.12);
  --green:#48BB78;--green-soft:rgba(72,187,120,.12);
  --yellow:#ED8936;--yellow-soft:rgba(237,137,54,.12);
  --red:#E53E3E;--red-soft:rgba(229,62,62,.12);
  --blue:#4299E1;--blue-soft:rgba(66,153,225,.12);
  --orange:#CA983F;--orange-soft:rgba(202,152,63,.12);
  --gray:#7a8b7e;--gray-soft:rgba(86,97,70,.1);
  --gold-soft:rgba(219,203,119,.12);
  --text:#D1CFC1;--text-dim:#9fa89a;--text-muted:#5c6b5e;
  --border:#1a2b22;--border-light:#243830;
  --glow-gold:rgba(219,203,119,.06);
  --glow-green:rgba(72,187,120,.04);
  --sidebar-w:200px;
}
body{font-family:'Hanken Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5;display:flex}
a{color:var(--accent);text-decoration:none}

/* -- Scrollbar -- */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px}

/* -- Sidebar -- */
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:100;transition:width .2s}
.sidebar-logo{padding:16px 16px 20px}
.sidebar-logo h1{font-size:16px;font-weight:800;letter-spacing:-.3px}
.sidebar-logo h1 .hi{color:var(--gold)}
.sidebar-logo .freshness{font-size:11px;color:var(--text-muted);margin-top:4px;display:flex;align-items:center;gap:5px}
.sidebar-logo .freshness-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.sidebar-logo .freshness-dot.stale{background:var(--yellow)}
.sidebar-logo .freshness-dot.dead{background:var(--red)}
.sidebar-nav{flex:1;overflow-y:auto;padding:0 0 8px}
.sidebar-group{padding:6px 16px 2px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-top:10px}
.sidebar-item{display:flex;align-items:center;gap:8px;padding:7px 16px;font-size:12px;color:var(--text-dim);cursor:pointer;transition:all .15s;border-right:2px solid transparent}
.sidebar-item:hover{color:var(--text);background:rgba(255,255,255,.02)}
.sidebar-item.active{color:var(--gold);background:rgba(219,203,119,.06);border-right-color:var(--gold)}
.sidebar-item .si-icon{font-size:14px;width:20px;text-align:center;flex-shrink:0}
.sidebar-item .si-label{flex:1}
.sidebar-item .si-badge{font-size:9px;padding:1px 6px;border-radius:8px;font-weight:700;flex-shrink:0}
.sidebar-item .si-badge.red{background:var(--red-soft);color:var(--red)}
.sidebar-item .si-badge.gold{background:var(--gold-soft);color:var(--gold)}
.sidebar-item .si-badge.gray{background:var(--gray-soft);color:var(--gray)}
.sidebar-item .si-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sidebar-item .si-dot.lavender{background:var(--lavender)}
.sidebar-item .si-dot.gold{background:var(--gold)}
.sidebar-status{padding:12px 16px;border-top:1px solid var(--border)}
.sidebar-status .ss-row{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text-muted)}
.sidebar-status .ss-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.sidebar-status .ss-time{font-size:9px;color:var(--text-muted);margin-top:4px}
.si-parent{cursor:pointer}
.si-child{padding-left:28px;font-size:11px}
.si-children{overflow:hidden}
.si-badge.blue{background:var(--blue-soft);color:var(--blue)}

/* -- Main content, pages, cards, section dividers -- */
.main{margin-left:var(--sidebar-w);flex:1;min-height:100vh;overflow-y:auto}
.page{display:none;padding:24px 32px 60px;max-width:1320px;margin:0 auto}
.page.active{display:block}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.page-title{font-size:20px;font-weight:800;letter-spacing:-.5px}
.page-kpis{display:flex;gap:16px;align-items:center}
.kpi{text-align:center}
.kpi .num{font-size:22px;font-weight:800;letter-spacing:-1px}
.kpi .lbl{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted)}
.kpi.green .num{color:var(--green)}
.kpi.gold .num{color:var(--gold)}
.kpi.red .num{color:var(--red)}
.kpi.blue .num{color:var(--blue)}
.kpi-divider{width:1px;height:24px;background:var(--border)}

.section-divider{display:flex;align-items:center;gap:8px;padding:16px 0 8px}
.section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap}
.section-label.rishabh{color:var(--lavender)}
.section-label.shreyas{color:var(--gold)}
.section-label.mywork{color:var(--green)}
.section-label.projects{color:var(--text-muted)}
.section-line{flex:1;height:1px;background:var(--border)}

.card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;transition:border-color .2s,box-shadow .2s}
.card:hover{border-color:var(--border-light);box-shadow:0 0 20px rgba(219,203,119,.04)}
.card.person-rishabh{border-left:3px solid var(--lavender)}
.card.person-shreyas{border-left:3px solid var(--gold)}
.card.featured{border-color:rgba(219,203,119,.2);background:linear-gradient(165deg,var(--card) 0%,rgba(219,203,119,.03) 100%)}
.card-head{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0}
.card-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px}
.card-badges{display:flex;gap:6px;align-items:center}
.badge{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600}
.card-body{padding:14px 18px;flex:1;overflow-y:auto;min-height:0}
.card-body.compact{padding:10px 14px}
.card-foot{padding:10px 18px;border-top:1px solid var(--border);font-size:11px;color:var(--text-muted);flex-shrink:0}

.tag-red{background:var(--red-soft);color:var(--red)}
.tag-yellow{background:var(--yellow-soft);color:var(--yellow)}
.tag-green{background:var(--green-soft);color:var(--green)}
.tag-blue{background:var(--blue-soft);color:var(--blue)}
.tag-accent{background:var(--gold-soft);color:var(--gold)}
.tag-gray{background:var(--gray-soft);color:var(--gray)}

.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:900px){.grid-3,.grid-2{grid-template-columns:1fr}}

/* -- Task Checklist -- */
.task-checklist{list-style:none}
.task-check-item{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border-radius:8px;margin-bottom:3px;transition:all .2s;cursor:pointer;user-select:none}
.task-check-item:hover{background:var(--surface)}
.task-check-item.checked{opacity:.45}
.task-check-item.checked .task-check-text{text-decoration:line-through;color:var(--text-muted)}
.task-checkbox{width:16px;height:16px;border-radius:5px;border:1.5px solid var(--border-light);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .2s;cursor:pointer;background:transparent}
.task-checkbox:hover{border-color:var(--leaf);background:rgba(86,97,70,.08)}
.task-checkbox.checked{background:var(--forest);border-color:var(--leaf)}
.task-checkbox.checked::after{content:'';width:5px;height:8px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-1px}
.task-check-text{font-size:12px;flex:1;line-height:1.4}
.task-check-meta{display:flex;gap:5px;margin-top:3px;align-items:center;flex-wrap:wrap}
.task-due{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600;cursor:pointer;transition:all .15s}
.task-due:hover{filter:brightness(1.2);outline:1px dashed currentColor;outline-offset:1px}
.task-due.overdue{background:var(--red-soft);color:var(--red)}
.task-due.today{background:var(--orange-soft);color:var(--orange)}
.task-due.upcoming{background:var(--blue-soft);color:var(--blue)}
.task-due.none{background:var(--gray-soft);color:var(--gray)}
.task-due-add{font-size:9px;padding:1px 5px;border-radius:3px;color:var(--text-muted);cursor:pointer;border:1px dashed var(--border-light);opacity:0;transition:opacity .15s}
.task-check-item:hover .task-due-add{opacity:1}
.task-due-add:hover{border-color:var(--gold);color:var(--gold)}
.task-due-input{font-size:9px;padding:1px 3px;border-radius:3px;border:1px solid var(--gold);background:var(--surface);color:var(--text);font-family:inherit;outline:none}
.task-add-row{display:flex;gap:5px;padding:8px 0 4px;border-top:1px solid var(--border);margin-top:4px;align-items:center}
.task-add-input{flex:1;font-size:11px;padding:5px 8px;border-radius:5px;border:1px solid var(--border-light);background:var(--surface);color:var(--text);font-family:inherit;outline:none;transition:border-color .15s}
.task-add-input:focus{border-color:var(--gold)}
.task-add-input::placeholder{color:var(--text-muted)}
.task-add-priority{font-size:10px;padding:4px 4px;border-radius:5px;border:1px solid var(--border-light);background:var(--surface);color:var(--text-dim);font-family:inherit;outline:none;cursor:pointer}
.task-add-btn{font-size:10px;padding:4px 10px;border-radius:5px;border:1px solid var(--gold);background:var(--gold-soft);color:var(--gold);font-family:inherit;font-weight:600;cursor:pointer;transition:all .15s}
.task-add-btn:hover{background:var(--gold);color:var(--bg)}
.task-done-divider{display:flex;align-items:center;gap:8px;padding:6px 0 4px;margin:4px 0 2px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted)}
.task-done-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.item-dismiss{font-size:10px;color:var(--text-muted);cursor:pointer;opacity:0;transition:all .15s;padding:2px 5px;border-radius:3px;flex-shrink:0;border:none;background:none;font-family:inherit}
.ai-row:hover .item-dismiss,.loop-row:hover .item-dismiss{opacity:1}
.item-dismiss:hover{color:var(--red);background:var(--red-soft)}
.item-add-row{display:flex;gap:5px;padding:8px 0 4px;border-top:1px solid var(--border);margin-top:4px;align-items:center}
.item-add-input{flex:1;font-size:11px;padding:5px 8px;border-radius:5px;border:1px solid var(--border-light);background:var(--surface);color:var(--text);font-family:inherit;outline:none;transition:border-color .15s}
.item-add-input:focus{border-color:var(--gold)}
.item-add-input::placeholder{color:var(--text-muted)}
.item-add-select{font-size:10px;padding:4px 4px;border-radius:5px;border:1px solid var(--border-light);background:var(--surface);color:var(--text-dim);font-family:inherit;outline:none;cursor:pointer}
.item-add-btn{font-size:10px;padding:4px 10px;border-radius:5px;border:1px solid var(--gold);background:var(--gold-soft);color:var(--gold);font-family:inherit;font-weight:600;cursor:pointer;transition:all .15s}
.item-add-btn:hover{background:var(--gold);color:var(--bg)}
.task-priority-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.task-owner{font-size:9px;color:var(--text-muted);background:var(--gray-soft);padding:1px 5px;border-radius:3px}
.notion-link{font-size:10px;color:var(--gold);text-decoration:none;opacity:0;transition:opacity .15s;margin-left:auto;flex-shrink:0;padding:2px 4px}
.task-check-item:hover .notion-link{opacity:1}

/* Date picker popup */
.date-picker-popup{position:absolute;z-index:100;background:var(--card);border:1px solid var(--border-light);border-radius:10px;padding:10px;box-shadow:0 8px 24px rgba(0,0,0,.4);display:flex;flex-direction:column;gap:6px;min-width:180px}
.date-picker-popup .dp-quick{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.date-picker-popup .dp-btn{font-size:11px;padding:6px 8px;border-radius:6px;border:1px solid var(--border-light);background:var(--surface);color:var(--text);font-family:inherit;cursor:pointer;transition:all .15s;text-align:left}
.date-picker-popup .dp-btn:hover{background:var(--gold-soft);border-color:var(--gold);color:var(--gold)}
.date-picker-popup .dp-btn.today{border-color:var(--gold);color:var(--gold)}
.date-picker-popup .dp-divider{height:1px;background:var(--border);margin:2px 0}
.date-picker-popup .dp-custom{display:flex;gap:4px;align-items:center}
.date-picker-popup .dp-custom input[type="date"]{flex:1;font-size:11px;padding:5px 6px;border-radius:6px;border:1px solid var(--border-light);background:var(--surface);color:var(--text);font-family:inherit;outline:none}
.date-picker-popup .dp-custom input[type="date"]:focus{border-color:var(--gold)}
.date-picker-popup .dp-clear{font-size:10px;color:var(--text-muted);cursor:pointer;text-align:center;padding:4px;border-radius:4px;transition:all .15s}
.date-picker-popup .dp-clear:hover{color:var(--red);background:var(--red-soft)}

/* Filter bar */
.filter-bar{display:flex;gap:5px;padding:0 0 10px;border-bottom:1px solid var(--border);margin-bottom:6px;flex-wrap:wrap}
.filter-btn{font-size:10px;padding:3px 8px;border-radius:5px;background:var(--surface);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;transition:all .15s;font-weight:600;font-family:inherit}
.filter-btn.active{background:var(--gold-soft);border-color:var(--gold);color:var(--gold)}
.filter-btn:hover{border-color:var(--gold)}
.task-counter{font-size:11px;color:var(--text-muted);padding:6px 0;text-align:right}

/* -- Calendar -- */
.cal-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:700px){.cal-grid{grid-template-columns:1fr}}
.cal-col-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;padding:6px 0 8px;border-bottom:1px solid var(--border);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.cal-col-head .cc-sub{font-size:9px;font-weight:600;color:var(--text-muted);text-transform:none;letter-spacing:0}
.cal-ev{display:flex;gap:7px;padding:4px 6px;border-radius:5px;margin-bottom:2px;font-size:11px;align-items:flex-start;transition:background .15s;text-decoration:none;color:inherit}
.cal-ev:hover{background:rgba(255,255,255,.05);cursor:pointer}
a.cal-ev:hover .cn{color:var(--gold)}
.cal-ev .ct{color:var(--text-muted);min-width:56px;flex-shrink:0;font-variant-numeric:tabular-nums;font-size:10px;line-height:1.6}
.cal-ev .cd{width:4px;height:4px;border-radius:50%;margin-top:5px;flex-shrink:0}
.cal-ev .cd.external{background:var(--red)}
.cal-ev .cd.internal{background:var(--leaf)}
.cal-ev .cd.one-on-one{background:var(--lavender)}
.cal-ev .cn{flex:1;color:var(--text-dim);line-height:1.35}
.cal-ev.tentative .cn{opacity:.6;font-style:italic}
.cal-ev.conflict{background:rgba(229,62,62,.06);border:1px solid rgba(229,62,62,.15)}

/* -- Action Items -- */
.ai-row{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;align-items:flex-start}
.ai-row:last-child{border-bottom:none}
.ai-dot{width:7px;height:7px;border-radius:50%;margin-top:4px;flex-shrink:0}
.ai-dot.red{background:var(--red)}.ai-dot.yellow{background:var(--yellow)}.ai-dot.green{background:var(--green)}

/* -- Spam -- */
.spam-row{display:flex;gap:6px;padding:6px 0;border-bottom:1px solid var(--border);font-size:11px;align-items:center}
.spam-row:last-child{border-bottom:none}
.spam-who{font-weight:600;color:var(--text);min-width:100px;font-size:11px}
.spam-why{color:var(--text-muted);flex:1;font-size:11px}
.spam-when{font-size:10px;color:var(--text-muted);white-space:nowrap}

/* -- Mini Stats -- */
.mstat{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.mstat:last-child{border-bottom:none}
.mstat .ml{color:var(--text-dim)}
.mstat .mv{font-weight:700}

/* -- Task Health Grid -- */
.health-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.health-pill{font-size:10px;padding:5px 8px;border-radius:6px;background:var(--surface);border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:3px}
.health-pill .hp-name{color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.health-pill .hp-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.hp-dot.ok{background:var(--green)}.hp-dot.warn{background:var(--yellow)}.hp-dot.err{background:var(--red)}.hp-dot.off{background:var(--gray)}

/* -- FPPC -- */
.fppc-ev{display:flex;gap:10px;padding:10px;border-radius:7px;background:var(--surface);border:1px solid var(--border);margin-bottom:6px;transition:all .2s;align-items:flex-start}
.fppc-ev:last-child{margin-bottom:0}
.fppc-ev:hover{border-color:var(--border-light);background:var(--card-hover)}
.fppc-ev .fv{font-size:18px;font-weight:800;color:var(--gold);min-width:32px;text-align:center;line-height:1}
.fppc-ev .fv small{font-size:8px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-top:2px}
.fppc-ev .fi{flex:1}
.fppc-ev .fn{font-size:12px;font-weight:600;color:var(--text)}
.fppc-ev .fm{font-size:10px;color:var(--text-muted);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap}
.fppc-ev .ft{font-size:9px;padding:2px 5px;border-radius:3px;font-weight:600;background:rgba(219,203,119,.1);color:var(--gold)}
.fppc-empty{text-align:center;padding:20px 12px;color:var(--text-muted);font-size:11px;line-height:1.6}

/* Legend dots */
.legend{display:flex;gap:10px;align-items:center;font-size:10px;color:var(--text-muted)}
.legend .ld{width:5px;height:5px;border-radius:50%;display:inline-block;margin-right:3px}

/* Delivery row */
.del-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.del-row:last-child{border-bottom:none}
.del-icon{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.del-icon.on{background:var(--green-soft);color:var(--green)}
.del-icon.off{background:var(--gray-soft);color:var(--gray)}
.del-info{flex:1;min-width:0}
.del-name{font-size:12px;font-weight:600;color:var(--text)}
.del-sub{font-size:10px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.del-time{font-size:10px;color:var(--text-muted);text-align:right;flex-shrink:0}

/* Section tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border)}
.tab{padding:8px 14px;font-size:11px;font-weight:600;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab:hover{color:var(--text)}
.tab-pane{display:none}.tab-pane.active{display:block}

/* -- Marketing Tab -- */
.mkt-nav{display:flex;gap:8px;border-bottom:1px solid var(--border);margin-bottom:16px;flex-wrap:wrap}
.mkt-nav-btn{padding:10px 20px;font-size:13px;font-weight:700;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:-.2px;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.mkt-nav-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.mkt-nav-btn:hover{color:var(--text)}
.mkt-event-pane{display:none}
.mkt-event-pane.active{display:block}
.mkt-overview{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:900px){.mkt-overview{grid-template-columns:1fr}}
.mkt-detail{font-size:12px;color:var(--text-dim);line-height:1.6}
.mkt-detail strong{color:var(--text);font-weight:600}

const STORAGE_KEY_MANUAL = 'sophie-dash-manual-tasks';
const STORAGE_KEY_DONE = 'sophie-dash-done-ids';
const STORAGE_KEY_DONE_TITLES = 'sophie-dash-done-titles';
const STORAGE_KEY_OFFSITE = 'sophie-dash-offsite-done';
const STORAGE_KEY_MKT_TODOS = 'sophie-dash-mkt-event-todos';
const STORAGE_KEY_HACKWEEK = 'sophie-dash-hackweek-done';
const STORAGE_KEY_PAGE = 'sophie-dash-active-page';
const STORAGE_KEY_BD = 'sophie-dash-bd-done';
const STORAGE_KEY_MKT_RPT = 'sophie-dash-marketing-rpt-done';
const STORAGE_KEY_LINKEDIN = 'sophie-dash-linkedin-done';

function loadManualTasks(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY_MANUAL))||[];}catch(e){return[];}}
function saveManualTasks(tasks){try{localStorage.setItem(STORAGE_KEY_MANUAL,JSON.stringify(tasks));}catch(e){}}
function loadDoneIds(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY_DONE))||[];}catch(e){return[];}}
function saveDoneIds(ids){try{localStorage.setItem(STORAGE_KEY_DONE,JSON.stringify(ids));}catch(e){}}
function loadDoneTitles(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY_DONE_TITLES))||[];}catch(e){return[];}}
function saveDoneTitles(titles){try{localStorage.setItem(STORAGE_KEY_DONE_TITLES,JSON.stringify(titles));}catch(e){}}
function loadOffsiteDone(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY_OFFSITE))||[];}catch(e){return[];}}
function saveOffsiteDone(keys){try{localStorage.setItem(STORAGE_KEY_OFFSITE,JSON.stringify(keys));}catch(e){}}
function loadMktEventTodos(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY_MKT_TODOS))||{};}catch(e){return{};}}
function saveMktEventTodos(data){try{localStorage.setItem(STORAGE_KEY_MKT_TODOS,JSON.stringify(data));}catch(e){}}
function loadHackWeekDone(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY_HACKWEEK))||[];}catch(e){return[];}}
function saveHackWeekDone(keys){try{localStorage.setItem(STORAGE_KEY_HACKWEEK,JSON.stringify(keys));}catch(e){}}
function loadActivePage(){try{return localStorage.getItem(STORAGE_KEY_PAGE)||'overview';}catch(e){return 'overview';}}
function saveActivePage(page){try{localStorage.setItem(STORAGE_KEY_PAGE,page);}catch(e){}}
const GP_STORAGE_KEYS={bd:STORAGE_KEY_BD,marketing:STORAGE_KEY_MKT_RPT,linkedin:STORAGE_KEY_LINKEDIN};
function loadGPDone(key){try{return JSON.parse(localStorage.getItem(GP_STORAGE_KEYS[key]))||[];}catch(e){return[];}}
function saveGPDone(key,keys){try{localStorage.setItem(GP_STORAGE_KEYS[key],JSON.stringify(keys));}catch(e){}}

function normalizeTitle(t){
  return t.toLowerCase().replace(/\[.*?\]/g,'').replace(/\u2014/g,' ').replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ').trim();
}

// ============================================================
// Merge persisted state into DATA before rendering
// ============================================================
function applyPersistedState() {
  // 1. Add manual tasks that aren't already in DATA (match by ID and by title)
  const manual = loadManualTasks();
  const existingIds = new Set(DATA.myTasks.map(t => t.id));
  const existingNorm = new Set(DATA.myTasks.map(t => normalizeTitle(t.title)));
  manual.forEach(t => {
    if (!existingIds.has(t.id) && !existingNorm.has(normalizeTitle(t.title))) {
      DATA.myTasks.unshift(t);
    }
  });

  // 2. Apply done-state overrides
  // Notion-synced tasks: server done state is AUTHORITATIVE (don't let localStorage un-check them)
  // Manual/local tasks: localStorage done state applies as before
  const doneIds = loadDoneIds();
  const doneTitles = loadDoneTitles();
  const doneIdSet = new Set(doneIds);
  const doneTitleSet = new Set(doneTitles);
  DATA.myTasks.forEach(t => {
    const hasNotionId = t.notionPageId || (t.id && !t.id.startsWith('manual-'));
    if (hasNotionId && t.done) {
      // Notion says done — keep it done regardless of localStorage
      // Also sync to localStorage so UI stays consistent
      if (!doneIdSet.has(t.id)) { doneIds.push(t.id); doneIdSet.add(t.id); }
      const norm = normalizeTitle(t.title);
      if (norm && !doneTitleSet.has(norm)) { doneTitles.push(norm); doneTitleSet.add(norm); }
    } else if (doneIdSet.has(t.id) || doneTitleSet.has(normalizeTitle(t.title))) {
      // localStorage says done — apply (this covers manual tasks and optimistic UI)
      t.done = true;
    }
  });
  saveDoneIds(doneIds);
  saveDoneTitles(doneTitles);

  // 3. Apply marketing event todo done-states
  const mktTodoState = loadMktEventTodos();
  MKT_EVENTS.forEach(ev => {
    if (mktTodoState[ev.id]) {
      ev.todos.forEach((t, ti) => {
        if (mktTodoState[ev.id][ti] !== undefined) t.done = mktTodoState[ev.id][ti];
      });
    }
  });

  // 4. Apply offsite task done-states (offsite-ID-specific keys)
  if (DATA.leadershipOffsite) {
    // Use the active offsite ID or default to 2026-Q2 for the overview card
    const offsiteIdForState = _activeOffsiteId || '2026-Q2';
    const offsiteStorageKey = 'sophie-dash-offsite-done-' + offsiteIdForState;
    let offsiteDoneArr = [];
    try { offsiteDoneArr = JSON.parse(localStorage.getItem(offsiteStorageKey)) || []; } catch(e) {}
    // Also migrate legacy keys (one-time): if old global key has data but new key doesn't, copy to 2026-Q2
    if (offsiteDoneArr.length === 0) {
      const legacyDone = loadOffsiteDone();
      if (legacyDone.length > 0 && offsiteIdForState === '2026-Q2') {
        offsiteDoneArr = legacyDone;
        try { localStorage.setItem(offsiteStorageKey, JSON.stringify(offsiteDoneArr)); } catch(e) {}
      }
    }
    const offsiteDone = new Set(offsiteDoneArr);
    DATA.leadershipOffsite.phases.forEach((p, pi) => {
      p.tasks.forEach((t, ti) => {
        const key = pi + '-' + ti;
        if (offsiteDone.has(key)) t.done = true;
      });
    });
  }
  if (DATA.hackWeek) {
    const hwDone = new Set(loadHackWeekDone());
    DATA.hackWeek.phases.forEach((p, pi) => {
      p.tasks.forEach((t, ti) => {
        const key = pi + '-' + ti;
        if (hwDone.has(key)) t.done = true;
      });
    });
  }

  // 5. Apply project done-states for BD, Marketing, LinkedIn
  const gpProjects = {bd:'bdOwnership', marketing:'marketingReporting', linkedin:'linkedinPipeline'};
  Object.entries(gpProjects).forEach(([key, dataKey]) => {
    if (DATA[dataKey]) {
      const done = new Set(loadGPDone(key));
      DATA[dataKey].phases.forEach((p, pi) => {
        p.tasks.forEach((t, ti) => {
          const k = pi + '-' + ti;
          if (done.has(k)) t.done = true;
        });
      });
    }
  });
}

  if(page.startsWith('project-')){
    const projectKey=page.replace('project-','');

    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));

    document.querySelectorAll('.project-pane').forEach(p=>p.classList.remove('active'));
    document.getElementById('pane-'+projectKey)?.classList.add('active');

  }

  if(page.startsWith('event-')){

function updateFreshness(){
  const refreshed=DATA.refreshedAt?new Date(DATA.refreshedAt):null;
  const now=new Date();
  const dot=document.getElementById('freshness-dot');
  const text=document.getElementById('freshness-text');
  const statusTime=document.getElementById('status-time');
  if(!refreshed){text.textContent='No data';return;}
  const mins=Math.floor((now-refreshed)/60000);
  const timeStr=refreshed.toLocaleString('en-US',{timeZone:'America/Los_Angeles',hour:'numeric',minute:'2-digit',hour12:true});
  if(mins<5){dot.className='freshness-dot';text.textContent='Updated just now';}
  else if(mins<10){dot.className='freshness-dot';text.textContent=`Updated ${mins}m ago`;}
  else if(mins<30){dot.className='freshness-dot stale';text.textContent=`Updated ${mins}m ago`;}
  else{dot.className='freshness-dot dead';text.textContent=`Stale \u2014 ${timeStr}`;}
  if(statusTime)statusTime.textContent='Updated '+timeStr;
}

// -- Person filtering helpers --
function getPersonActionItems(person){
  const items=DATA.actionItems?.items||[];
  const regex=new RegExp(person,'i');
  const isRishabh=person.toLowerCase()==='rishabh';
  const isSreyas=person.toLowerCase()==='shreyas';
  return items.filter(i=>{
    // Explicit owner match
    if(i.owner&&i.owner.toLowerCase()===person.toLowerCase()) return true;
    // Text mentions the person by name
    if(regex.test(i.text)) return true;
    // For Rishabh: items without an owner OR owned by "CEO" are his
    // Also items about decisions, strategy, partnerships, investors
    if(isRishabh){
      if(!i.owner) return true;
      if(/ceo|leadership|executive/i.test(i.owner)) return true;
    }
    // For Shreyas: items about engineering, video, product
    if(isSreyas){
      if(/shreyas|video quality|away.*blurry|rajat|ranjit|engineering|product/i.test(i.text)) return true;
    }
    return false;
  });
}
function getPersonWaitingOn(person){
  const stalePatterns=/stale|no action|hasn't replied|pending|no reply|no decision|waiting|unanswered/i;
  const personItems=getPersonActionItems(person);
  return personItems.filter(i=>{
    const isRelevant=true; // already filtered to this person
    const isWaiting=i.category==='waiting-on'||stalePatterns.test(i.text);
    return isRelevant&&isWaiting;
  });
}
function getPersonCalendar(person){
  const days=DATA.calendarDays||[];
  const todayStr=new Date(new Date().toLocaleString('en-US',{timeZone:'America/Los_Angeles'})).toISOString().slice(0,10);
  const todayData=days.find(d=>d.date>=todayStr)||days[0];
  if(!todayData)return[];
  return todayData[person.toLowerCase()]||[];
}
function getPersonLoops(person){
  const regex=new RegExp(person,'i');
  return(DATA.openLoops||[]).filter(l=>regex.test(l.owner)||regex.test(l.text));
}

// -- Calendar helpers --
function calToMin(t){const m=t.match(/(\d+):(\d+)\s*(AM|PM)/i);if(!m)return 0;let h=parseInt(m[1]);const mn=parseInt(m[2]),ap=m[3].toUpperCase();if(ap==='PM'&&h!==12)h+=12;if(ap==='AM'&&h===12)h=0;return h*60+mn;}
const CAL_SKIP=/sitter|gym|standup/i,CAL_OPT=/\[optional\]/i;
function calSkip(e){return CAL_SKIP.test(e.title)||CAL_OPT.test(e.title)||e.rsvp==='declined';}
function findConflicts(events){const s=new Set();for(let i=0;i<events.length;i++){if(calSkip(events[i]))continue;for(let j=i+1;j<events.length;j++){if(calSkip(events[j]))continue;if(calToMin(events[i].time)<calToMin(events[j].end)&&calToMin(events[j].time)<calToMin(events[i].end)){s.add(i);s.add(j);}}}return s;}

function renderMyTasks() {
  const prioOrder = {High:0, Medium:1, Low:2};
  const tasks = DATA.myTasks.slice().sort((a,b) => {
    if(a.done !== b.done) return a.done ? 1 : -1;
    const pa = prioOrder[a.priority] ?? 1, pb = prioOrder[b.priority] ?? 1;
    if(pa !== pb) return pa - pb;
    if(a.due && b.due) return a.due.localeCompare(b.due);
    if(a.due) return -1;
    if(b.due) return 1;
    return 0;
  });
  const open = tasks.filter(t=>!t.done);
  const high = open.filter(t=>t.priority==='High');
  const done = tasks.filter(t=>t.done);

  return `
  <div class="card featured">
    <div class="card-head">
      <div class="card-title" style="color:var(--gold)">&#128142; My Tasks</div>
      <div class="card-badges">
        <span class="badge tag-red">${high.length} urgent</span>
        <span class="badge tag-accent">${open.length} open</span>
        ${done.length > 0 ? `<span class="badge tag-green">${done.length} done</span>` : ''}
        <a href="https://notion.so/ec04c3e35f534ee487592c1fb304991e" target="_blank" style="font-size:10px;color:var(--gold)">Notion &#8599;</a>
      </div>
    </div>
    <div class="card-body" style="padding:10px 14px 6px">
      <div class="filter-bar">
        <button class="filter-btn active" onclick="filterMyTasks('all',this)">All (${open.length})</button>
        <button class="filter-btn" onclick="filterMyTasks('high',this)">&#128308; Urgent (${high.length})</button>
        <button class="filter-btn" onclick="filterMyTasks('due',this)">&#128197; Has due</button>
        <button class="filter-btn" onclick="filterMyTasks('done',this)">&#9989; Done (${done.length})</button>
      </div>
      <div>
        <ul class="task-checklist" id="my-task-list">
          ${open.map(t => renderTaskItem(t, 'my')).join('')}
        </ul>
        <ul class="task-checklist" id="my-done-list" style="display:none">
          ${done.map(t => renderTaskItem(t, 'my')).join('')}
        </ul>
      </div>
      <div class="task-counter" id="my-task-counter">${open.length} open &middot; ${done.length} done</div>
    </div>
    <div class="card-foot" style="padding:8px 14px;border-top:1px solid var(--border)">
      <div class="task-add-row" style="margin-top:0;border-top:none;padding-top:0">
        <input type="text" id="new-task-input" class="task-add-input" placeholder="+ Add a task..." onkeydown="if(event.key==='Enter')addMyTask()">
        <select id="new-task-priority" class="task-add-priority">
          <option value="Medium">Med</option>
          <option value="High">High</option>
          <option value="Low">Low</option>
        </select>
        <button class="task-add-btn" onclick="addMyTask()">Add</button>
      </div>
    </div>
  </div>`;
}

function renderTaskItem(t, section) {
  const dueClass = !t.due ? 'none' : t.due < today ? 'overdue' : t.due === today ? 'today' : 'upcoming';
  const dueLabel = !t.due ? '' : t.due < today ? 'Overdue' : t.due === today ? 'Due today' : 'Due ' + new Date(t.due+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const prioColor = t.priority==='High' ? 'var(--red)' : t.priority==='Medium' ? 'var(--yellow)' : 'var(--green)';
  const ctx = t.context ? `<div style="font-size:10px;color:var(--text-muted);margin-top:2px;line-height:1.3">${t.context}</div>` : '';
  const ownerHtml = t.owner ? `<span class="task-owner">${t.owner}</span>` : '';
  const onclick = section === 'my' ? 'toggleMyTask(this)' : 'toggleMyTask(this)';

  return `
    <li class="task-check-item ${t.done?'checked':''}" data-id="${t.id}" data-priority="${t.priority}" data-has-due="${t.due?'yes':'no'}" data-section="${section}" onclick="${onclick}">
      <div class="task-checkbox ${t.done?'checked':''}"></div>
      <div style="flex:1">
        <div class="task-check-text">${t.title}</div>
        <div class="task-check-meta">
          <span class="task-priority-dot" style="background:${prioColor}"></span>
          ${t.due ? `<span class="task-due ${dueClass}" data-due="${t.due}" onclick="event.stopPropagation();editDueDate(this)">${dueLabel}</span>` : `<span class="task-due-add" onclick="event.stopPropagation();editDueDate(this)">+ date</span>`}
          ${ownerHtml}
        </div>
        ${ctx}
      </div>
      ${t.sourceLink ? `<a class="source-link" href="${t.sourceLink}" target="_blank" onclick="event.stopPropagation()" title="View original source" style="font-size:10px;color:var(--text-muted);margin-right:6px;text-decoration:none;opacity:0.6">src</a>` : ''}
      <a class="notion-link" href="https://notion.so/${t.id.replace(/-/g,'')}" target="_blank" onclick="event.stopPropagation()">Open &#8599;</a>
    </li>`;
}

function toggleMyTask(el) {
  const isChecked = el.classList.toggle('checked');
  el.querySelector('.task-checkbox').classList.toggle('checked');
  const taskId = el.dataset.id;
  const doneIds = loadDoneIds();
  const doneTitles = loadDoneTitles();
  const titleText = el.querySelector('.task-check-text')?.textContent || '';
  const normTitle = normalizeTitle(titleText);
  if(isChecked) {
    if(!doneIds.includes(taskId)) doneIds.push(taskId);
    if(normTitle && !doneTitles.includes(normTitle)) doneTitles.push(normTitle);
  } else {
    const idx = doneIds.indexOf(taskId); if(idx>=0) doneIds.splice(idx,1);
    const tidx = doneTitles.indexOf(normTitle); if(tidx>=0) doneTitles.splice(tidx,1);
  }
  saveDoneIds(doneIds);
  saveDoneTitles(doneTitles);
  localStorage.setItem('sophie-dash-last-check-'+taskId, new Date().toISOString());
  // Use direct Notion endpoint (no session auth needed — uses API key)
  const isNotionId=/^[0-9a-f]{8}-[0-9a-f]{4}-/i.test(taskId);
  if(isNotionId){
    fetch('/api/notion/toggle-task',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer sophie-dashboard-secret-change-me'},
      body:JSON.stringify({pageId:taskId,done:isChecked})
    }).then(r=>r.json()).then(d=>{
      if(d.ok) console.log('[Sync] Task',isChecked?'checked':'unchecked','→ Notion updated directly');
      else console.error('[Sync] Notion direct failed:',d.error);
    }).catch(e=>console.error('[Sync] Notion direct failed:',e.message));
  }
  // Also try the session-auth endpoint as backup (updates server-side tasks.json)
  fetch('/api/tasks/complete',{
    method:'POST',headers:{'Content-Type':'application/json'},
    credentials:'include',
    body:JSON.stringify({taskId,title:titleText,done:isChecked})
  }).catch(()=>{});

  const openList = document.getElementById('my-task-list');
  const doneList = document.getElementById('my-done-list');
  if(isChecked){
    el.style.transition='opacity .3s,transform .3s';el.style.opacity='0.3';el.style.transform='translateX(8px)';
    setTimeout(()=>{doneList.prepend(el);el.style.opacity='';el.style.transform='';updateMyTaskCounts();},300);
  } else {
    el.style.transition='opacity .3s,transform .3s';el.style.opacity='0.3';
    setTimeout(()=>{openList.prepend(el);el.style.opacity='';updateMyTaskCounts();},300);
  }
}

function updateMyTaskCounts(){
  const openList = document.getElementById('my-task-list');
  const doneList = document.getElementById('my-done-list');
  if(!openList || !doneList) return;
  const openC = openList.querySelectorAll('.task-check-item').length;
  const doneC = doneList.querySelectorAll('.task-check-item').length;
  const counter = document.getElementById('my-task-counter');
  if(counter) counter.textContent = openC+' open \u00b7 '+doneC+' done';
  const filterBar = document.querySelector('.filter-bar');
  if(filterBar){
    const btns = filterBar.querySelectorAll('.filter-btn');
    if(btns[0]) btns[0].textContent = 'All ('+(openC)+')';
    if(btns[3]) btns[3].textContent = '\u2705 Done ('+doneC+')';
  }
}

function filterMyTasks(filter, btn) {
  btn.parentElement.querySelectorAll('.filter-btn').forEach(f=>f.classList.remove('active'));
  btn.classList.add('active');
  const openList = document.getElementById('my-task-list');
  const doneList = document.getElementById('my-done-list');
  if(filter==='done'){
    openList.style.display='none';
    doneList.style.display='';
    doneList.querySelectorAll('.task-check-item').forEach(i=>i.style.display='');
  } else {
    openList.style.display='';
    doneList.style.display='none';
    openList.querySelectorAll('.task-check-item').forEach(item => {
      let show = true;
      if(filter==='all') show = true; // Show all open tasks — reset any previous filter
      else if(filter==='high') show = item.dataset.priority==='High';
      else if(filter==='due') show = item.dataset.hasDue==='yes';
      item.style.display = show ? '' : 'none';
    });
  }
}

function editDueDate(span) {
  const existing = document.querySelector('.date-picker-popup');
  if(existing) existing.remove();

  const li = span.closest('.task-check-item');
  const taskId = li.dataset.id;
  const currentDue = span.dataset && span.dataset.due ? span.dataset.due : '';

  function offsetDate(days) {
    const d = new Date(); d.setDate(d.getDate() + days);
    return d.toISOString().slice(0,10);
  }
  function nextWeekday(dow) {
    const d = new Date(); const curr = d.getDay();
    const diff = ((dow - curr) + 7) % 7 || 7;
    d.setDate(d.getDate() + diff);
    return d.toISOString().slice(0,10);
  }
  function friendlyLabel(dateStr) {
    return new Date(dateStr+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  }

  const popup = document.createElement('div');
  popup.className = 'date-picker-popup';
  popup.onclick = function(e) { e.stopPropagation(); };

  const todayStr = offsetDate(0);
  const tomorrowStr = offsetDate(1);
  const nextMonStr = nextWeekday(1);
  const nextFriStr = nextWeekday(5);
  const nextWeekStr = offsetDate(7);

  popup.innerHTML = `
    <div class="dp-quick">
      <button class="dp-btn today" data-val="${todayStr}">Today</button>
      <button class="dp-btn" data-val="${tomorrowStr}">Tomorrow</button>
      <button class="dp-btn" data-val="${nextMonStr}">Next Mon <span style="color:var(--text-muted);font-size:9px">${friendlyLabel(nextMonStr)}</span></button>
      <button class="dp-btn" data-val="${nextFriStr}">Next Fri <span style="color:var(--text-muted);font-size:9px">${friendlyLabel(nextFriStr)}</span></button>
      <button class="dp-btn" data-val="${nextWeekStr}">+1 week <span style="color:var(--text-muted);font-size:9px">${friendlyLabel(nextWeekStr)}</span></button>
      <button class="dp-btn" data-val="${offsetDate(14)}">+2 weeks <span style="color:var(--text-muted);font-size:9px">${friendlyLabel(offsetDate(14))}</span></button>
    </div>
    <div class="dp-divider"></div>
    <div class="dp-custom">
      <input type="date" value="${currentDue}">
      <button class="dp-btn" style="flex-shrink:0;text-align:center" id="dp-apply">Set</button>
    </div>
    ${currentDue ? '<div class="dp-clear" id="dp-clear">Remove date</div>' : ''}
  `;

  const meta = span.closest('.task-check-meta') || span.parentElement;
  meta.style.position = 'relative';
  popup.style.position = 'absolute';
  popup.style.left = '0';
  popup.style.top = '100%';
  popup.style.marginTop = '4px';
  meta.appendChild(popup);

  function applyVal(val) {
    popup.remove();
    const task = DATA.myTasks.find(t => t.id === taskId);
    if (task) task.due = val || null;
    const todayISO = new Date().toISOString().slice(0,10);
    if (!val) {
      const addSpan = document.createElement('span');
      addSpan.className = 'task-due-add';
      addSpan.textContent = '+ date';
      addSpan.onclick = function(e) { e.stopPropagation(); editDueDate(addSpan); };
      span.replaceWith(addSpan);
      li.dataset.hasDue = 'no';
      return;
    }
    let dueClass, dueLabel;
    if (val < todayISO) { dueClass = 'overdue'; dueLabel = 'Overdue'; }
    else if (val === todayISO) { dueClass = 'today'; dueLabel = 'Due today'; }
    else { dueClass = 'upcoming'; dueLabel = 'Due ' + new Date(val+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
    const newSpan = document.createElement('span');
    newSpan.className = 'task-due ' + dueClass;
    newSpan.dataset.due = val;
    newSpan.textContent = dueLabel;
    newSpan.onclick = function(e) { e.stopPropagation(); editDueDate(newSpan); };
    span.replaceWith(newSpan);
    li.dataset.hasDue = 'yes';
  }

  popup.querySelectorAll('.dp-quick .dp-btn').forEach(btn => {
    btn.addEventListener('click', function(e) { e.stopPropagation(); applyVal(this.dataset.val); });
  });
  popup.querySelector('#dp-apply').addEventListener('click', function(e) {
    e.stopPropagation();
    applyVal(popup.querySelector('input[type="date"]').value);
  });
  const clearBtn = popup.querySelector('#dp-clear');
  if(clearBtn) clearBtn.addEventListener('click', function(e) { e.stopPropagation(); applyVal(''); });

  setTimeout(() => {
    function closePopup(e) {
      if(!popup.contains(e.target)) { popup.remove(); document.removeEventListener('click', closePopup, true); }
    }
    document.addEventListener('click', closePopup, true);
  }, 10);
}

function findSimilarTask(newTitle) {
  const norm = normalizeTitle(newTitle);
  const words = norm.split(' ').filter(w => w.length > 2);
  const actionVerbs = ['schedule','follow','reply','send','confirm','coordinate','reach','draft','check','fix','set','book','cancel','reschedule','prepare','review','update','create','organize','plan'];
  const newVerb = actionVerbs.find(v => norm.includes(v)) || '';
  for (const t of DATA.myTasks) {
    if (t.done) continue;
    const existNorm = normalizeTitle(t.title);
    if (existNorm === norm) return t;
    const existWords = existNorm.split(' ').filter(w => w.length > 2);
    const shared = words.filter(w => existWords.includes(w));
    if (shared.length >= 3) return t;
    const existVerb = actionVerbs.find(v => existNorm.includes(v)) || '';
    if (newVerb && existVerb && shared.length >= 1) {
      const verbMatch = newVerb === existVerb || (newVerb === 'follow' && existVerb === 'reply') || (newVerb === 'reply' && existVerb === 'follow') || (newVerb === 'schedule' && existVerb === 'book') || (newVerb === 'book' && existVerb === 'schedule');
      if (verbMatch && shared.length >= 2) return t;
    }
  }
  return null;
}

function addMyTask(forceAdd) {
  const input = document.getElementById('new-task-input');
  const prioSelect = document.getElementById('new-task-priority');
  const title = input.value.trim();
  if (!title) return;
  if (!forceAdd) {
    const similar = findSimilarTask(title);
    if (similar) {
      const existingSnippet = similar.title.length > 60 ? similar.title.slice(0,57)+'...' : similar.title;
      const msg = `Similar task already exists:\n\n"${existingSnippet}"\n\nAdd anyway?`;
      if (!confirm(msg)) { input.focus(); return; }
    }
  }
  const priority = prioSelect.value;
  const id = 'manual-' + crypto.randomUUID();
  const task = {id, title, done:false, priority, due:null, context:'Added manually'};
  DATA.myTasks.unshift(task);
  const manual = loadManualTasks();
  manual.unshift(task);
  saveManualTasks(manual);
  // Create in Notion directly (bypasses session auth)
  fetch('/api/notion/create-task', {
    method: 'POST',
    headers: {'Content-Type':'application/json','Authorization':'Bearer sophie-dashboard-secret-change-me'},
    body: JSON.stringify({ title, priority })
  }).then(r=>r.json()).then(d=>{
    if(d.ok&&d.notionPageId){
      console.log('[Sync] Task created in Notion:',d.notionPageId);
      task.notionPageId=d.notionPageId;
      task.notionSynced=true;
      // Update localStorage with the Notion ID
      const m=loadManualTasks();
      const mt=m.find(t=>t.id===task.id);
      if(mt){mt.notionPageId=d.notionPageId;mt.notionSynced=true;saveManualTasks(m);}
    } else console.warn('[Sync] Task creation issue:',d.error||'no pageId');
  }).catch(e=>console.error('[Sync] Task creation failed:',e.message));
  // Also try session-auth endpoint as backup
  fetch('/api/tasks/add',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({title,priority})}).catch(()=>{});
  const list = document.getElementById('my-task-list');
  const li = document.createElement('div');
  li.innerHTML = renderTaskItem(task, 'my');
  const newLi = li.firstElementChild;
  list.prepend(newLi);
  const all = document.querySelectorAll('#my-task-list .task-check-item');
  const doneC = document.querySelectorAll('#my-task-list .task-check-item.checked').length;
  document.getElementById('my-task-counter').textContent = (all.length-doneC)+' open \u00b7 '+doneC+' done';
  input.value = '';
  prioSelect.value = 'Medium';
  newLi.style.transition = 'background .3s';
  newLi.style.background = 'rgba(212,175,55,0.1)';
  setTimeout(() => { newLi.style.background = ''; }, 600);
}

// -- Events: Update field to server + Notion --
function updateEventField(eventId, field, value) {
  fetch('/api/events/update', {
    method: 'POST',
    headers: {'Content-Type':'application/json', 'Authorization':'Bearer sophie-dashboard-secret-change-me'},
    body: JSON.stringify({ eventId, field, value })
  }).then(r=>r.json()).then(d=>{
    if(d.ok) console.log('[Events] Updated:', eventId, field);
  }).catch(e=>console.error('[Events] Update failed:', e.message));
}

function updateTodoProgress(evId) {
  const pane = document.getElementById('mkt-' + evId);
  if(!pane) return;
  const items = pane.querySelectorAll('.mkt-todo-item');
  const total = items.length;
  const done = pane.querySelectorAll('.mkt-todo-item.checked').length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;

  const bar = pane.querySelector('[style*="height:6px"]');
  if(bar) {
    const fill = bar.querySelector('div');
    fill.style.width = pct + '%';
    fill.style.background = pct >= 75 ? 'var(--green)' : pct >= 40 ? 'var(--yellow)' : 'var(--red)';
  }

  const progBadge = pane.querySelector('.card-head .badge[class*="tag-"]');

  const counter = pane.querySelector('[style*="font-size:11px"][style*="color:var(--text-muted)"]');
  if(counter && counter.textContent.includes('of')) {
    counter.textContent = done + ' of ' + total + ' tasks done';
  }

  const todoCard = pane.querySelector('.task-checklist').closest('.card');
  const todoBadge = todoCard ? todoCard.querySelector('.badge') : null;
  if(todoBadge) {
    todoBadge.textContent = done + '/' + total;
    todoBadge.className = 'badge ' + (done === total ? 'tag-green' : 'tag-yellow');
  }
}

async function renderEventsPage(){
  const el=document.getElementById('page-events');

  // Load event overrides from server and merge
  let eventOverrides = {};
  try {
    const ovRes = await fetch('/api/events/overrides');
    eventOverrides = await ovRes.json();
  } catch(e) {}
  MKT_EVENTS.forEach(ev => {
    if (eventOverrides[ev.id]) {
      const ov = eventOverrides[ev.id];
      if (ov.name !== undefined) ev.name = ov.name;
      if (ov.dates !== undefined) ev.dates = ov.dates;
      if (ov.location !== undefined) ev.location = ov.location;
      if (ov.venue !== undefined) ev.venue = ov.venue;
      if (ov.status !== undefined) ev.status = ov.status;
      if (ov.description !== undefined) ev.description = ov.description;
      if (ov.rishabh !== undefined) ev.rishabh = ov.rishabh === true || ov.rishabh === 'true';
      if (ov.shreyas !== undefined) ev.shreyas = ov.shreyas === true || ov.shreyas === 'true';
      if (ov.addTeamMember !== undefined && !ev.team.includes(ov.addTeamMember)) ev.team.push(ov.addTeamMember);

  const totalTodos = visibleEvents.reduce((s,e) => s + e.todos.length, 0);
  const doneTodos = visibleEvents.reduce((s,e) => s + e.todos.filter(t=>t.done).length, 0);

  const nextEvent = visibleEvents[0];

  el.innerHTML = `

        ${renderEventPane(ev)}
      </div>

  // Marketing todo: checkbox toggle

    cb.addEventListener('click', (e) => {
      e.stopPropagation();
      const item = cb.closest('.task-check-item');
      const isChecked = item.classList.toggle('checked');
      cb.classList.toggle('checked');
      const input = item.querySelector('.todo-text-edit');
      if(isChecked) {
        item.style.opacity = '0.45';
        input.style.textDecoration = 'line-through';
        input.style.color = 'var(--text-muted)';
      } else {
        item.style.opacity = '';
        input.style.textDecoration = '';
        input.style.color = '';
      }
      const evId = item.closest('[data-event-id]').dataset.eventId;
      const todoIdx = parseInt(item.dataset.todoIdx);
      const ev = MKT_EVENTS.find(e => e.id === evId);
      if (ev && !isNaN(todoIdx) && ev.todos[todoIdx]) {
        ev.todos[todoIdx].done = isChecked;
        const state = loadMktEventTodos();
        if (!state[evId]) state[evId] = {};
        state[evId][todoIdx] = isChecked;
        saveMktEventTodos(state);
        syncCheckbox('mkt-'+evId+'-'+todoIdx, isChecked);
      }
      updateTodoProgress(evId);
    });
  });

  // Marketing todo: delete
  document.querySelectorAll('.todo-delete').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const item = btn.closest('.task-check-item');
      const evId = item.closest('[data-event-id]').dataset.eventId;
      item.style.transition = 'opacity .2s, height .2s';
      item.style.opacity = '0';
      item.style.height = '0';
      item.style.overflow = 'hidden';
      item.style.padding = '0';
      item.style.margin = '0';
      setTimeout(() => { item.remove(); updateTodoProgress(evId); }, 200);
    });
  });

  // Marketing todo: add new
  document.querySelectorAll('.todo-add-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const evId = btn.dataset.eventId;
      const list = btn.previousElementSibling;
      const li = document.createElement('li');
      li.className = 'task-check-item mkt-todo-item';
      li.innerHTML = `
        <div class="task-checkbox"></div>
        <div style="flex:1">
          <input class="todo-text-edit" placeholder="New task..." value="" />
        </div>
        <button class="todo-delete" title="Remove">&times;</button>
      `;
      list.appendChild(li);

      const newTodoIdx = list.querySelectorAll('.mkt-todo-item').length - 1;
      li.dataset.todoIdx = newTodoIdx;
      const ev = MKT_EVENTS.find(e => e.id === evId);
      if (ev) ev.todos.push({text: '', done: false});
      li.querySelector('.task-checkbox').addEventListener('click', (e) => {
        e.stopPropagation();
        const isChecked = li.classList.toggle('checked');
        li.querySelector('.task-checkbox').classList.toggle('checked');
        const input = li.querySelector('.todo-text-edit');
        if(isChecked) { li.style.opacity='0.45'; input.style.textDecoration='line-through'; input.style.color='var(--text-muted)'; }
        else { li.style.opacity=''; input.style.textDecoration=''; input.style.color=''; }
        const idx = parseInt(li.dataset.todoIdx);
        if (ev && !isNaN(idx) && ev.todos[idx]) {
          ev.todos[idx].done = isChecked;
          const state = loadMktEventTodos();
          if (!state[evId]) state[evId] = {};
          state[evId][idx] = isChecked;
          saveMktEventTodos(state);
          syncCheckbox('mkt-'+evId+'-'+idx, isChecked);
        }
        updateTodoProgress(evId);
      });

      li.querySelector('.todo-delete').addEventListener('click', (e) => {
        e.stopPropagation();
        li.style.transition='opacity .2s,height .2s'; li.style.opacity='0'; li.style.height='0'; li.style.overflow='hidden'; li.style.padding='0'; li.style.margin='0';
        setTimeout(() => { li.remove(); updateTodoProgress(evId); }, 200);
      });

      const input = li.querySelector('.todo-text-edit');
      input.focus();

      updateTodoProgress(evId);
    });
  });

  // Prevent text input clicks from bubbling
  document.querySelectorAll('.todo-text-edit').forEach(input => {
    input.addEventListener('click', (e) => e.stopPropagation());
  });
}

function syncOffsiteToNotion() {
  const btn = document.getElementById('offsite-sync-btn');
  const o = DATA.leadershipOffsite;
  if(!o) return;

  const state = {};
  o.phases.forEach((p, pi) => {
    p.tasks.forEach((t, ti) => {
      state[pi + '-' + ti] = {text: t.text, done: t.done, phase: p.name};
    });
  });

  const payload = JSON.stringify({
    pageId: o.notionPageId,
    syncedAt: new Date().toISOString(),
    tasks: state
  }, null, 2);

  const blob = new Blob([payload], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'offsite-sync.json';
  a.click();
  URL.revokeObjectURL(url);

  btn.textContent = '* Synced';
  btn.style.background = 'var(--green)';
  btn.style.color = 'var(--bg)';
  btn.style.borderColor = 'var(--green)';
  setTimeout(() => {
    btn.textContent = 'Sync to Notion';
    btn.style.background = 'var(--green-soft)';
    btn.style.color = 'var(--green)';
    btn.style.borderColor = 'var(--leaf)';
  }, 2000);
}

function toggleOffsitePhase(head) {
  const body = head.nextElementSibling;
  const chevron = head.querySelector('.offsite-chevron');
  if(body.style.display === 'none') {
    body.style.display = 'block';
    chevron.style.transform = 'rotate(90deg)';
  } else {
    body.style.display = 'none';
    chevron.style.transform = 'rotate(0deg)';
  }
}

function toggleOffsiteTask(el) {
  const pi = parseInt(el.dataset.phase);
  const ti = parseInt(el.dataset.task);
  // Determine which offsite ID context we're in (standalone page vs overview card)
  const offsiteId = _activeOffsiteId || '2026-Q2';
  const task = DATA.leadershipOffsite.phases[pi].tasks[ti];
  task.done = !task.done;
  const isChecked = task.done;

  // Use offsite-ID-specific localStorage keys to avoid cross-offsite contamination
  const storageKey = 'sophie-dash-offsite-done-' + offsiteId;
  let doneKeys = [];
  try { doneKeys = JSON.parse(localStorage.getItem(storageKey)) || []; } catch(e) { doneKeys = []; }
  const key = pi + '-' + ti;
  if(isChecked) {
    if(!doneKeys.includes(key)) doneKeys.push(key);
  } else {
    const idx = doneKeys.indexOf(key);
    if(idx >= 0) doneKeys.splice(idx, 1);
  }
  try { localStorage.setItem(storageKey, JSON.stringify(doneKeys)); } catch(e) {}
  syncCheckbox('offsite-'+offsiteId+'-'+pi+'-'+ti, isChecked, DATA.leadershipOffsite?.notionPageId, task.text);

  const cb = el.querySelector('.task-checkbox');
  const textSpan = el.querySelector('span:last-child');
  if(isChecked) {
    el.classList.add('checked');
    cb.classList.add('checked');
    textSpan.style.textDecoration = 'line-through';
    textSpan.style.opacity = '.5';
    textSpan.style.color = 'var(--text-muted)';
  } else {
    el.classList.remove('checked');
    cb.classList.remove('checked');
    textSpan.style.textDecoration = '';
    textSpan.style.opacity = '';
    textSpan.style.color = 'var(--text-dim)';
  }

  const phaseEl = el.closest('.offsite-phase');
  const pTasks = DATA.leadershipOffsite.phases[pi].tasks;
  const pDone = pTasks.filter(t=>t.done).length;
  const pTotal = pTasks.length;
  const counter = phaseEl.querySelector('.offsite-phase-head span:last-child');
  if(counter) counter.textContent = pDone+'/'+pTotal;
  if(pDone === pTotal) {
    phaseEl.querySelector('.offsite-phase-head span:nth-child(2)').style.color = 'var(--green)';
    counter.style.background = 'var(--green-soft)';
    counter.style.color = 'var(--green)';
  } else {
    phaseEl.querySelector('.offsite-phase-head span:nth-child(2)').style.color = 'var(--text)';
    counter.style.background = 'var(--surface)';
    counter.style.color = 'var(--text-muted)';
  }

  const allPhases = DATA.leadershipOffsite.phases;
  const totalDone = allPhases.reduce((s,p) => s + p.tasks.filter(t=>t.done).length, 0);
  const totalAll = allPhases.reduce((s,p) => s + p.tasks.length, 0);
  const pct = Math.round((totalDone/totalAll)*100);
  const card = el.closest('.card');
  const progressBar = card.querySelector('div[style*="width:"][style*="border-radius:3px"]');
  if(progressBar) progressBar.style.width = pct+'%';
  const progressText = card.querySelector('.card-body > div:first-child > span:last-child');
  if(progressText) progressText.textContent = totalDone+'/'+totalAll+' tasks ('+pct+'%)';
}

// ── Standalone Offsite Page (Multi-Quarter) ──

var _activeOffsiteId = null; // Tracks which offsite detail view is open
var _activeOffsiteYear = '2026'; // Tracks which year tab is selected

function getOffsiteById(id) {
  if (!_offsiteApiData || !_offsiteApiData.offsites) return null;
  for (var yearArr of Object.values(_offsiteApiData.offsites)) {
    var found = yearArr.find(function(o) { return o.id === id; });
    if (found) return found;
  }
  return null;
}

function getNextUpcomingOffsite() {
  if (!_offsiteApiData || !_offsiteApiData.offsites) return null;
  var all = [];
  Object.values(_offsiteApiData.offsites).forEach(function(yr) { yr.forEach(function(o) { all.push(o); }); });
  var planning = all.filter(function(o) { return o.status === 'Planning'; });
  if (planning.length) return planning[0];
  var placeholders = all.filter(function(o) { return o.status === 'Placeholder'; });
  if (placeholders.length) return placeholders[0];
  return null;
}

async function renderOffsitePage() {
  const el = document.getElementById('page-offsite');
  el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:200px;color:var(--text-muted)">Loading offsite data...</div>';

  let ALLDATA = null;
  try {
    const res = await fetch('/api/offsite');
    if (res.ok) ALLDATA = await res.json();
  } catch(e) { console.warn('[Offsite] API fetch failed:', e.message); }
  if (!ALLDATA) ALLDATA = _offsiteApiData || { offsites: {} };
  _offsiteApiData = ALLDATA;

  // Update sidebar badge
  var nextUp = getNextUpcomingOffsite();
  var sidebarBadge = document.getElementById('offsite-sidebar-badge');
  if (sidebarBadge && nextUp && nextUp.dates && nextUp.dates !== 'TBD') {
    var dUntil = Math.ceil((new Date('2026-04-20') - new Date()) / 86400000);
    sidebarBadge.textContent = dUntil + 'd';
  }

  // If we have an active detail view, show that
  if (_activeOffsiteId) {
    var offsite = getOffsiteById(_activeOffsiteId);
    if (offsite) {
      if (offsite.status === 'Planning') {
        renderOffsiteDetailView(el, offsite, ALLDATA);
      } else if (offsite.status === 'Complete') {
        renderOffsitePastDetail(el, offsite, ALLDATA);
      } else {
        _activeOffsiteId = null;
        renderOffsiteGridView(el, ALLDATA);
      }
      return;
    }
    _activeOffsiteId = null;
  }

  renderOffsiteGridView(el, ALLDATA);
}

function renderOffsiteGridView(el, ALLDATA) {
  var offsites = ALLDATA.offsites || {};
  var years = Object.keys(offsites).sort().reverse();
  if (years.indexOf(_activeOffsiteYear) < 0 && years.length) _activeOffsiteYear = years[0];

  var yearTabsHtml = '<div class="offsite-year-tabs">' +
    years.map(function(y) {
      return '<button class="offsite-year-btn ' + (y === _activeOffsiteYear ? 'active' : '') + '" data-year="' + y + '">' + y + '</button>';
    }).join('') +
  '</div>';

  var yearPanelsHtml = '';
  years.forEach(function(y) {
    var quarters = offsites[y] || [];
    var cardsHtml = '';
    quarters.forEach(function(q) {
      var statusClass = 'status-' + q.status.toLowerCase();
      var badgeHtml = '';
      var actionHtml = '';
      var infoHtml = '';

      if (q.status === 'Complete') {
        badgeHtml = '<span class="offsite-q-badge tag-green">&#10003; Complete</span>';
        infoHtml = '<div class="offsite-q-city">' + (q.city || '') + '</div>' +
          '<div class="offsite-q-dates">' + (q.dates || '') + '</div>' +
          (q.rating ? '<div class="offsite-q-rating">Rating: <strong style="color:var(--green)">' + q.rating + '/10</strong></div>' : '') +
          (q.attendees ? '<div style="font-size:9px;color:var(--text-muted);margin-top:4px">' + (Array.isArray(q.attendees) ? q.attendees.length : 0) + ' attendees</div>' : '');
        actionHtml = '<div class="offsite-q-action">View Details &#8594;</div>';
      } else if (q.status === 'Planning') {
        var dLeft = Math.ceil((new Date('2026-04-20') - new Date()) / 86400000);
        badgeHtml = '<span class="offsite-q-badge tag-yellow">' + dLeft + 'd away</span>';
        infoHtml = '<div class="offsite-q-city">' + (q.city || '') + '</div>' +
          '<div class="offsite-q-dates">' + (q.dates || '') + '</div>';
        // Mini progress
        var tc = 0, td = 0;
        if (q.checklist) {
          (function walk(v) {
            if (Array.isArray(v)) v.forEach(function(i) { if (typeof i === 'object' && i.item !== undefined) { tc++; if (i.done) td++; } else walk(i); });
            else if (typeof v === 'object' && v !== null) Object.values(v).forEach(walk);
          })(q.checklist);
        }
        var pp = tc ? Math.round(td/tc*100) : 0;
        infoHtml += '<div style="margin-top:6px"><div style="height:4px;background:var(--surface);border-radius:2px;overflow:hidden"><div style="height:100%;width:' + pp + '%;background:var(--gold);border-radius:2px"></div></div><div style="font-size:9px;color:var(--text-muted);margin-top:2px">' + td + '/' + tc + ' tasks (' + pp + '%)</div></div>';
        actionHtml = '<div class="offsite-q-action">View Details &#8594;</div>';
      } else {
        badgeHtml = '<span class="offsite-q-badge tag-gray">Placeholder</span>';
        infoHtml = '<div class="offsite-q-city" style="color:var(--text-muted)">City TBD</div>' +
          '<div class="offsite-q-dates">Dates TBD</div>';
        actionHtml = '<div class="offsite-q-action">Set Up &#8594;</div>';
      }

      cardsHtml += '<div class="offsite-q-card ' + statusClass + '" data-offsite-id="' + q.id + '">' +
        badgeHtml +
        '<div class="offsite-q-label" style="color:' + (q.status === 'Complete' ? 'var(--green)' : q.status === 'Planning' ? 'var(--gold)' : 'var(--text-muted)') + '">' + q.quarter + '</div>' +
        infoHtml +
        actionHtml +
      '</div>';
    });

    yearPanelsHtml += '<div class="offsite-year-panel" data-year-panel="' + y + '" style="display:' + (y === _activeOffsiteYear ? 'block' : 'none') + '">' +
      '<div class="offsite-quarter-grid">' + cardsHtml + '</div>' +
    '</div>';
  });

  // Accumulated lessons section
  var allLessons = (ALLDATA.template && ALLDATA.template.lessonsLearned) || [];
  var lessonsHtml = allLessons.slice(0, 8).map(function(l) {
    var lesson = typeof l === 'string' ? l : l.lesson;
    var source = typeof l === 'object' ? l.source : '';
    return '<div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px;color:var(--text-dim);line-height:1.4">' +
      '<span style="color:var(--gold);font-weight:700;flex-shrink:0">&#8226;</span>' +
      '<span style="flex:1">' + lesson + '</span>' +
      (source ? '<span style="font-size:9px;color:var(--text-muted);flex-shrink:0">' + source + '</span>' : '') +
    '</div>';
  }).join('');

  // Rating history
  var allOffsites = [];
  Object.values(offsites).forEach(function(yr) { yr.forEach(function(o) { if (o.status === 'Complete' && o.rating) allOffsites.push(o); }); });
  allOffsites.sort(function(a,b) { return (a.year*10 + (a.quarter||'').charCodeAt(1)) - (b.year*10 + (b.quarter||'').charCodeAt(1)); });
  var ratingHtml = allOffsites.map(function(o) {
    var ratingColor = o.rating >= 8.5 ? 'var(--green)' : o.rating >= 7 ? 'var(--gold)' : 'var(--yellow)';
    return '<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--border)">' +
      '<span style="font-size:11px;font-weight:600;color:var(--text);min-width:60px">' + o.id + '</span>' +
      '<span style="font-size:10px;color:var(--text-muted);flex:1">' + (o.city || '') + '</span>' +
      '<span style="font-size:12px;font-weight:800;color:' + ratingColor + '">' + o.rating + '</span>' +
    '</div>';
  }).join('');

  el.innerHTML =
    '<div class="page-header"><div class="page-title">&#9992;&#65039; Leadership Offsites</div></div>' +
    yearTabsHtml +
    yearPanelsHtml +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px">' +
      '<div class="card">' +
        '<div class="card-head"><div class="card-title">Lessons Learned (All Offsites)</div></div>' +
        '<div class="card-body" style="padding:10px 14px;max-height:300px;overflow-y:auto">' + (lessonsHtml || '<div style="font-size:11px;color:var(--text-muted)">No lessons yet.</div>') + '</div>' +
      '</div>' +
      '<div class="card">' +
        '<div class="card-head"><div class="card-title">Rating History</div></div>' +
        '<div class="card-body" style="padding:10px 14px;max-height:300px;overflow-y:auto">' + (ratingHtml || '<div style="font-size:11px;color:var(--text-muted)">No ratings yet.</div>') + '</div>' +
      '</div>' +
    '</div>' +
    '<div style="text-align:center"><button class="offsite-add-btn" id="offsite-add-btn">+ Add Offsite</button></div>';

  // Wire year tabs
  el.querySelectorAll('.offsite-year-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      _activeOffsiteYear = btn.dataset.year;
      el.querySelectorAll('.offsite-year-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      el.querySelectorAll('.offsite-year-panel').forEach(function(p) { p.style.display = 'none'; });
      var panel = el.querySelector('[data-year-panel="' + _activeOffsiteYear + '"]');
      if (panel) panel.style.display = 'block';
    });
  });

  // Wire quarter cards
  el.querySelectorAll('.offsite-q-card').forEach(function(card) {
    card.addEventListener('click', function() {
      var id = card.dataset.offsiteId;
      var offsite = getOffsiteById(id);
      if (!offsite) return;
      if (offsite.status === 'Placeholder') {
        showOffsiteSetupForm(card, offsite);
      } else {
        _activeOffsiteId = id;
        renderOffsitePage();
      }
    });
  });

  // Wire add button
  var addBtn = document.getElementById('offsite-add-btn');
  if (addBtn) {
    addBtn.addEventListener('click', function() {
      var existing = document.getElementById('offsite-add-form');
      if (existing) { existing.remove(); return; }
      var form = document.createElement('div');
      form.id = 'offsite-add-form';
      form.className = 'offsite-setup-form';
      form.style.maxWidth = '400px';
      form.style.margin = '12px auto';
      form.innerHTML = '<div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px">Add New Offsite</div>' +
        '<input id="offsite-add-year" placeholder="Year (e.g. 2027)" type="number">' +
        '<input id="offsite-add-quarter" placeholder="Quarter (e.g. Q1)">' +
        '<input id="offsite-add-city" placeholder="City (optional)">' +
        '<input id="offsite-add-dates" placeholder="Dates (optional, e.g. Jan 15-16, 2027)">' +
        '<button onclick="createNewOffsite()">Create</button>';
      addBtn.parentElement.appendChild(form);
    });
  }
}

function showOffsiteSetupForm(card, offsite) {
  var existing = card.querySelector('.offsite-setup-form');
  if (existing) { existing.remove(); return; }
  var form = document.createElement('div');
  form.className = 'offsite-setup-form';
  form.innerHTML = '<div style="font-size:11px;font-weight:700;color:var(--text);margin-bottom:6px">Set up ' + offsite.quarter + ' ' + offsite.year + '</div>' +
    '<input id="setup-city-' + offsite.id + '" placeholder="City">' +
    '<input id="setup-dates-' + offsite.id + '" placeholder="Dates (e.g. Jul 15-16, 2026)">' +
    '<button onclick="event.stopPropagation();setupOffsite(\'' + offsite.id + '\')">Create</button>';
  form.addEventListener('click', function(e) { e.stopPropagation(); });
  card.appendChild(form);
}

function setupOffsite(id) {
  var offsite = getOffsiteById(id);
  if (!offsite) return;
  var city = document.getElementById('setup-city-' + id).value || 'TBD';
  var dates = document.getElementById('setup-dates-' + id).value || 'TBD';
  fetch('/api/offsite/create', {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer sophie-dashboard-secret-change-me'},
    body: JSON.stringify({ quarter: offsite.quarter, year: offsite.year, city: city, dates: dates })
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.ok) { renderOffsitePage(); }
    else { alert('Error: ' + (d.error || 'Unknown')); }
  }).catch(function(e) { alert('Error: ' + e.message); });
}

function createNewOffsite() {
  var year = document.getElementById('offsite-add-year').value;
  var quarter = document.getElementById('offsite-add-quarter').value;
  var city = document.getElementById('offsite-add-city').value || 'TBD';
  var dates = document.getElementById('offsite-add-dates').value || 'TBD';
  if (!year || !quarter) { alert('Year and Quarter are required.'); return; }
  fetch('/api/offsite/create', {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer sophie-dashboard-secret-change-me'},
    body: JSON.stringify({ quarter: quarter, year: year, city: city, dates: dates })
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.ok) { _activeOffsiteYear = String(year); renderOffsitePage(); }
    else { alert('Error: ' + (d.error || 'Unknown')); }
  }).catch(function(e) { alert('Error: ' + e.message); });
}

  var dinner = logistics.dinner || {};
  var activity = logistics.activity || {};
  var budget = logistics.budget || {};

  var weworkResearch = logistics.weworkResearch || [];
  var dinnerResearch = logistics.dinnerResearch || [];
