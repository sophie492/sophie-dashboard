<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sophie's Dashboard  -  Fermat</title>
<meta http-equiv="refresh" content="900">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fon.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;bo-sizing:border-box}
:root{
  --forest:#294339;--leaf:#566146;--creme:#D1CFC1;--gold:#DBCB77;
  --lavender:#C1B1D5;--cherry:#6C2B2F;--apple:#A4251D;--ochre:#CA983F;
  --bg:#060d0a;--surface:#0c1610;--card:#111d16;--card-hover:#172419;
  --accent:#C1B1D5;--accent-dim:#9b86b;--accent-soft:rgba(193,177,213,.12);
  --green:#48BB78;--green-soft:rgba(72,187,120,.12);
  --yellow:#ED8936;--yellow-soft:rgba(237,137,54,.12);
  --red:#E53E3E;--red-soft:rgba(229,62,62,.12);
  --blue:#4299E1;--blue-soft:rgba(66,153,225,.12);
  --orange:#CA983F;--orange-soft:rgba(202,152,63,.12);
  --gray:#7a8b7e;--gray-soft:rgba(86,97,70,.1);
  --gold-soft:rgba(219,203,119,.12);
  --text:#D1CFC1;--text-dim:#9fa89a;--text-muted:#5c6b5e;
  --border:#1a2b22;--border-light:#243830;
  --glow-gold:rgba(219,203,119,.06);
  --glow-green:rgba(72,187,120,.04);
}
body{font-family:'Hanken Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
a{color:var(--accent);text-decoration:none}

/* -- Header -- */
.header{padding:24px 40px 20px;max-width:1520px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-end}
.header-left h1{font-size:28px;font-weight:800;letter-spacing:-.5px;line-height:1.1}
.header-left h1 .hi{color:var(--gold)}
.header-left .sub{font-size:13px;color:var(--text-muted);margin-top:4px;display:flex;gap:12px;align-items:center}
.header-left .sub .dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.header-right{display:flex;gap:20px;align-items:center}
.kpi{text-align:center}
.kpi .num{font-size:24px;font-weight:800;letter-spacing:-1px}
.kpi .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted)}
.kpi.green .num{color:var(--green)}
.kpi.gold .num{color:var(--gold)}
.kpi.red .num{color:var(--red)}
.kpi.yellow .num{color:var(--yellow)}
.kpi.blue .num{color:var(--blue)}

/* -- Top Nav Tabs -- */
.top-nav{max-width:1520px;margin:0 auto;padding:0 40px;display:flex;gap:0;border-bottom:1px solid var(--border)}
.top-nav-tab{padding:12px 24px;font-size:14px;font-weight:700;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:-.2px}
.top-nav-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.top-nav-tab:hover{color:var(--text)}
.top-page{display:none}
.top-page.active{display:block}

/* -- Fermat Newsroom Sidebar -- */
.newsroom-sidebar{position:sticky;top:20px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:12px}
.newsroom-header{display:flex;justify-content:space-between;align-items:center;padding-bottom:10px;border-bottom:1px solid var(--border)}
.newsroom-item{display:block;padding:10px 0;border-bottom:1px solid var(--border);text-decoration:none;color:inherit;transition:opacity .15s}
.newsroom-item:last-child{border-bottom:none}
.newsroom-item:hover{opacity:.8}
.newsroom-cat{font-size:9px;text-transform:uppercase;letter-spacing:.8px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--gold-soft);color:var(--gold)}
.newsroom-title{font-size:13px;font-weight:700;color:var(--text);margin-top:6px;line-height:1.3}
.newsroom-summary{font-size:11px;color:var(--text-dim);margin-top:4px;line-height:1.4}
.newsroom-date{font-size:10px;color:var(--text-muted);margin-top:4px}
@media(max-width:1100px){.newsroom-sidebar{display:none}}

/* -- Bento Grid -- */
.bento{max-width:1520px;margin:0 auto;padding:8px 40px 60px;display:grid;grid-template-columns:repeat(12,1fr);gap:16px;grid-auto-rows:minmax(60px,auto)}
.bento>div:not(.bento-section){max-height:480px;display:flex;flex-direction:column}
@media(max-width:1100px){.bento{grid-template-columns:repeat(12,1fr);padding:12px 16px 40px}.bento>div[style*="span 5"],.bento>div[style*="span 7"],.bento>div[style*="span 4"]{grid-column:span 6!important}}
@media(max-width:700px){.bento{grid-template-columns:1fr;padding:12px 16px 40px}.bento>div{grid-column:span 1!important}.bento>.bento-section{grid-column:span 1!important}}

/* -- Card -- */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;transition:border-color .2s;height:100%}
.card:hover{border-color:var(--border-light)}
.card-head{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0}
.card-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px}
.card-badges{display:flex;gap:6px;align-items:center}
.badge{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600}
.card-body{padding:14px 18px;flex:1;overflow-y:auto;min-height:0}
.card-body::-webkit-scrollbar{width:3px}
.card-body::-webkit-scrollbar-track{background:transparent}
.card-body::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px}
.card-body.compact{padding:10px 14px}
.card-foot{padding:10px 18px;border-top:1px solid var(--border);font-size:11px;color:var(--text-muted);flex-shrink:0}

/* Featured card (My Tasks) */
.card.featured{border-color:rgba(219,203,119,.2);background:linear-gradient(165deg,var(--card) 0%,rgba(219,203,119,.03) 100%)}
.card.featured .card-head{background:linear-gradient(135deg,rgba(219,203,119,.06),transparent)}

/* -- Tags -- */
.tag-red{background:var(--red-soft);color:var(--red)}
.tag-yellow{background:var(--yellow-soft);color:var(--yellow)}
.tag-green{background:var(--green-soft);color:var(--green)}
.tag-blue{background:var(--blue-soft);color:var(--blue)}
.tag-accent{background:var(--gold-soft);color:var(--gold)}
.tag-gray{background:var(--gray-soft);color:var(--gray)}

/* -- Task Checklist -- */
.task-checklist{list-style:none}
.task-check-item{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border-radius:8px;margin-bottom:3px;transition:all .2s;cursor:pointer;user-select:none}
.task-check-item:hover{background:var(--surface)}
.task-check-item.checked{opacity:.45}
.task-check-item.checked .task-check-text{text-decoration:line-through;color:var(--text-muted)}
.task-checkbox{width:16px;height:16px;border-radius:4px;border:2px solid var(--border-light);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .2s;cursor:pointer}
.task-checkbox:hover{border-color:var(--leaf)}
.task-checkbox.checked{background:var(--forest);border-color:var(--leaf)}
.task-checkbox.checked::after{content:'*';color:#fff;font-size:10px;font-weight:700}
.task-check-text{font-size:12px;flex:1;line-height:1.4}
.task-check-meta{display:flex;gap:5px;margin-top:3px;align-items:center;flex-wrap:wrap}
.task-due{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600;cursor:pointer;transition:all .15s}
.task-due:hover{filter:brightness(1.2);outline:1px dashed currentColor;outline-offset:1px}
.task-due.overdue{background:var(--red-soft);color:var(--red)}
.task-due.today{background:var(--orange-soft);color:var(--orange)}
.task-due.upcoming{background:var(--blue-soft);color:var(--blue)}
.task-due.none{background:var(--gray-soft);color:var(--gray)}
.task-due-add{font-size:9px;padding:1px 5px;border-radius:3px;color:var(--text-muted);cursor:pointer;border:1px dashed var(--border-light);opacity:0;transition:opacity .15s}
.task-check-item:hover .task-due-add{opacity:1}
.task-due-add:hover{border-color:var(--gold);color:var(--gold)}
.task-due-input{font-size:9px;padding:1px 3px;border-radius:3px;border:1px solid var(--gold);background:var(--surface);color:var(--text);font-family:inherit;outline:none}
.task-add-row{display:flex;gap:5px;padding:8px 0 4px;border-top:1px solid var(--border);margin-top:4px;align-items:center}
.task-add-input{flex:1;font-size:11px;padding:5px 8px;border-radius:5px;border:1px solid var(--border-light);background:var(--surface);color:var(--text);font-family:inherit;outline:none;transition:border-color .15s}
.task-add-input:focus{border-color:var(--gold)}
.task-add-input::placeholder{color:var(--text-muted)}
.task-add-priority{font-size:10px;padding:4px 4px;border-radius:5px;border:1px solid var(--border-light);background:var(--surface);color:var(--text-dim);font-family:inherit;outline:none;cursor:pointer}
.task-add-btn{font-size:10px;padding:4px 10px;border-radius:5px;border:1px solid var(--gold);background:var(--gold-soft);color:var(--gold);font-family:inherit;font-weight:600;cursor:pointer;transition:all .15s}
.task-add-btn:hover{background:var(--gold);color:var(--bg)}
.task-done-divider{display:flex;align-items:center;gap:8px;padding:6px 0 4px;margin:4px 0 2px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted)}
.task-done-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.item-dismiss{font-size:10px;color:var(--text-muted);cursor:pointer;opacity:0;transition:all .15s;padding:2px 5px;border-radius:3px;flex-shrink:0;border:none;background:none;font-family:inherit}
.ai-row:hover .item-dismiss,.loop-row:hover .item-dismiss{opacity:1}
.item-dismiss:hover{color:var(--red);background:var(--red-soft)}
.item-add-row{display:flex;gap:5px;padding:8px 0 4px;border-top:1px solid var(--border);margin-top:4px;align-items:center}
.item-add-input{flex:1;font-size:11px;padding:5px 8px;border-radius:5px;border:1px solid var(--border-light);background:var(--surface);color:var(--text);font-family:inherit;outline:none;transition:border-color .15s}
.item-add-input:focus{border-color:var(--gold)}
.item-add-input::placeholder{color:var(--text-muted)}
.item-add-select{font-size:10px;padding:4px 4px;border-radius:5px;border:1px solid var(--border-light);background:var(--surface);color:var(--text-dim);font-family:inherit;outline:none;cursor:pointer}
.item-add-btn{font-size:10px;padding:4px 10px;border-radius:5px;border:1px solid var(--gold);background:var(--gold-soft);color:var(--gold);font-family:inherit;font-weight:600;cursor:pointer;transition:all .15s}
.item-add-btn:hover{background:var(--gold);color:var(--bg)}
.task-priority-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.task-owner{font-size:9px;color:var(--text-muted);background:var(--gray-soft);padding:1px 5px;border-radius:3px}
.notion-link{font-size:10px;color:var(--gold);text-decoration:none;opacity:0;transition:opacity .15s;margin-left:auto;flex-shrink:0;padding:2px 4px}
.task-check-item:hover .notion-link{opacity:1}

/* Date picker popup */
.date-picker-popup{position:absolute;z-index:100;background:var(--card);border:1px solid var(--border-light);border-radius:10px;padding:10px;box-shadow:0 8px 24px rgba(0,0,0,.4);display:flex;flex-direction:column;gap:6px;min-width:180px}
.date-picker-popup .dp-quick{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.date-picker-popup .dp-btn{font-size:11px;padding:6px 8px;border-radius:6px;border:1px solid var(--border-light);background:var(--surface);color:var(--text);font-family:inherit;cursor:pointer;transition:all .15s;text-align:left}
.date-picker-popup .dp-btn:hover{background:var(--gold-soft);border-color:var(--gold);color:var(--gold)}
.date-picker-popup .dp-btn.today{border-color:var(--gold);color:var(--gold)}
.date-picker-popup .dp-divider{height:1px;background:var(--border);margin:2px 0}
.date-picker-popup .dp-custom{display:flex;gap:4px;align-items:center}
.date-picker-popup .dp-custom input[type="date"]{flex:1;font-size:11px;padding:5px 6px;border-radius:6px;border:1px solid var(--border-light);background:var(--surface);color:var(--text);font-family:inherit;outline:none}
.date-picker-popup .dp-custom input[type="date"]:focus{border-color:var(--gold)}
.date-picker-popup .dp-clear{font-size:10px;color:var(--text-muted);cursor:pointer;text-align:center;padding:4px;border-radius:4px;transition:all .15s}
.date-picker-popup .dp-clear:hover{color:var(--red);background:var(--red-soft)}

/* Filter bar */
.filter-bar{display:flex;gap:5px;padding:0 0 10px;border-bottom:1px solid var(--border);margin-bottom:6px;flex-wrap:wrap}
.filter-btn{font-size:10px;padding:3px 8px;border-radius:5px;background:var(--surface);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;transition:all .15s;font-weight:600;font-family:inherit}
.filter-btn.active{background:var(--gold-soft);border-color:var(--gold);color:var(--gold)}
.filter-btn:hover{border-color:var(--gold)}
.task-counter{font-size:11px;color:var(--text-muted);padding:6px 0;text-align:right}

/* -- Calendar -- */
.cal-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:700px){.cal-grid{grid-template-columns:1fr}}
.cal-col-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;padding:6px 0 8px;border-bottom:1px solid var(--border);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.cal-col-head .cc-sub{font-size:9px;font-weight:600;color:var(--text-muted);text-transform:none;letter-spacing:0}
.cal-ev{display:flex;gap:7px;padding:4px 6px;border-radius:5px;margin-bottom:2px;font-size:11px;align-items:flex-start;transition:background .15s;text-decoration:none;color:inherit}
.cal-ev:hover{background:rgba(255,255,255,.05);cursor:pointer}
a.cal-ev:hover .cn{color:var(--gold)}
.cal-ev .ct{color:var(--text-muted);min-width:56px;flex-shrink:0;font-variant-numeric:tabular-nums;font-size:10px;line-height:1.6}
.cal-ev .cd{width:4px;height:4px;border-radius:50%;margin-top:5px;flex-shrink:0}
.cal-ev .cd.external{background:var(--red)}
.cal-ev .cd.internal{background:var(--leaf)}
.cal-ev .cd.one-on-one{background:var(--lavender)}
.cal-ev .cn{flex:1;color:var(--text-dim);line-height:1.35}
.cal-ev.tentative .cn{opacity:.6;font-style:italic}
.cal-ev.conflict{background:rgba(229,62,62,.06);border:1px solid rgba(229,62,62,.15)}

/* -- Action Items -- */
.ai-row{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;align-items:flex-start}
.ai-row:last-child{border-bottom:none}
.ai-dot{width:7px;height:7px;border-radius:50%;margin-top:4px;flex-shrink:0}
.ai-dot.red{background:var(--red)}.ai-dot.yellow{background:var(--yellow)}.ai-dot.green{background:var(--green)}

/* -- Spam -- */
.spam-row{display:flex;gap:6px;padding:6px 0;border-bottom:1px solid var(--border);font-size:11px;align-items:center}
.spam-row:last-child{border-bottom:none}
.spam-who{font-weight:600;color:var(--text);min-width:100px;font-size:11px}
.spam-why{color:var(--text-muted);flex:1;font-size:11px}
.spam-when{font-size:10px;color:var(--text-muted);white-space:nowrap}

/* -- Mini Stats -- */
.mstat{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.mstat:last-child{border-bottom:none}
.mstat .ml{color:var(--text-dim)}
.mstat .mv{font-weight:700}

/* -- Task Health Grid -- */
.health-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.health-pill{font-size:10px;padding:5px 8px;border-radius:6px;background:var(--surface);border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:3px}
.health-pill .hp-name{color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.health-pill .hp-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.hp-dot.ok{background:var(--green)}.hp-dot.warn{background:var(--yellow)}.hp-dot.err{background:var(--red)}.hp-dot.off{background:var(--gray)}

/* -- FPPC -- */
.fppc-ev{display:flex;gap:10px;padding:10px;border-radius:7px;background:var(--surface);border:1px solid var(--border);margin-bottom:6px;transition:all .2s;align-items:flex-start}
.fppc-ev:last-child{margin-bottom:0}
.fppc-ev:hover{border-color:var(--border-light);background:var(--card-hover)}
.fppc-ev .fv{font-size:18px;font-weight:800;color:var(--gold);min-width:32px;text-align:center;line-height:1}
.fppc-ev .fv small{font-size:8px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-top:2px}
.fppc-ev .fi{flex:1}
.fppc-ev .fn{font-size:12px;font-weight:600;color:var(--text)}
.fppc-ev .fm{font-size:10px;color:var(--text-muted);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap}
.fppc-ev .ft{font-size:9px;padding:2px 5px;border-radius:3px;font-weight:600;background:rgba(219,203,119,.1);color:var(--gold)}
.fppc-empty{text-align:center;padding:20px 12px;color:var(--text-muted);font-size:11px;line-height:1.6}

/* -- Divider line between header KPIs -- */
.kpi-divider{width:1px;height:28px;background:var(--border)}

/* Legend dots */
.legend{display:flex;gap:10px;align-items:center;font-size:10px;color:var(--text-muted)}
.legend .ld{width:5px;height:5px;border-radius:50%;display:inline-block;margin-right:3px}

/* Delivery row */
.del-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.del-row:last-child{border-bottom:none}
.del-icon{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.del-icon.on{background:var(--green-soft);color:var(--green)}
.del-icon.off{background:var(--gray-soft);color:var(--gray)}
.del-info{flex:1;min-width:0}
.del-name{font-size:12px;font-weight:600;color:var(--text)}
.del-sub{font-size:10px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.del-time{font-size:10px;color:var(--text-muted);text-align:right;flex-shrink:0}

/* Section tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border)}
.tab{padding:8px 14px;font-size:11px;font-weight:600;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab:hover{color:var(--text)}
.tab-pane{display:none}.tab-pane.active{display:block}

/* -- Marketing Tab -- */
.mkt-nav{display:flex;gap:8px;border-bottom:1px solid var(--border);margin-bottom:16px;flex-wrap:wrap}
.mkt-nav-btn{padding:10px 20px;font-size:13px;font-weight:700;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:-.2px;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.mkt-nav-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.mkt-nav-btn:hover{color:var(--text)}
.mkt-event-pane{display:none}
.mkt-event-pane.active{display:block}
.mkt-overview{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:900px){.mkt-overview{grid-template-columns:1fr}}
.mkt-detail{font-size:12px;color:var(--text-dim);line-height:1.6}
.mkt-detail strong{color:var(--text);font-weight:600}
.mkt-label{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted);font-weight:700;margin-bottom:6px}
.exec-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;margin-right:6px;margin-bottom:4px}
.exec-badge.rishabh{background:rgba(193,177,213,.12);color:var(--lavender)}
.exec-badge.shreyas{background:var(--gold-soft);color:var(--gold)}
.exec-badge.team{background:var(--blue-soft);color:var(--blue)}
.exec-dot{width:6px;height:6px;border-radius:50%}
.exec-dot.rishabh{background:var(--lavender)}
.exec-dot.shreyas{background:var(--gold)}
.mkt-stat{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.mkt-stat:last-child{border-bottom:none}
.mkt-stat .ms-l{color:var(--text-dim)}
.mkt-stat .ms-v{font-weight:700;color:var(--text)}
.mkt-todo-section{margin-top:16px}

const STORAGE_KEY_MANUAL = 'sophie-dash-manual-tasks';
const STORAGE_KEY_DONE = 'sophie-dash-done-ids';
const STORAGE_KEY_DONE_TITLES = 'sophie-dash-done-titles';
const STORAGE_KEY_OFFSITE = 'sophie-dash-offsite-done';
const STORAGE_KEY_MKT_TODOS = 'sophie-dash-mkt-event-todos';

function loadManualTasks() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY_MANUAL)) || []; } catch(e) { return []; }
}
function saveManualTasks(tasks) {
  try { localStorage.setItem(STORAGE_KEY_MANUAL, JSON.stringify(tasks)); } catch(e) {}
}
function loadDoneIds() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY_DONE)) || []; } catch(e) { return []; }
}
function saveDoneIds(ids) {
  try { localStorage.setItem(STORAGE_KEY_DONE, JSON.stringify(ids)); } catch(e) {}
}
function loadDoneTitles() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY_DONE_TITLES)) || []; } catch(e) { return []; }
}
function saveDoneTitles(titles) {
  try { localStorage.setItem(STORAGE_KEY_DONE_TITLES, JSON.stringify(titles)); } catch(e) {}
}
function loadOffsiteDone() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY_OFFSITE)) || []; } catch(e) { return []; }
}
function saveOffsiteDone(keys) {
  try { localStorage.setItem(STORAGE_KEY_OFFSITE, JSON.stringify(keys)); } catch(e) {}
}
function loadMktEventTodos() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY_MKT_TODOS)) || {}; } catch(e) { return {}; }
}
function saveMktEventTodos(data) {
  try { localStorage.setItem(STORAGE_KEY_MKT_TODOS, JSON.stringify(data)); } catch(e) {}
}

// Normalize title for fuzzy matching  -  lowercase, strip brackets/tags, collapse whitespace
function normalizeTitle(t) {
  return t.toLowerCase().replace(/\[.*?\]/g,'').replace(/\u2014/g,' ').replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ').trim();
}

// Merge persisted state into DATA before rendering
function applyPersistedState() {
  // 1. Add manual tasks that aren't already in DATA (match by ID and by title)
  const manual = loadManualTasks();
  const existingIds = new Set(DATA.myTasks.map(t => t.id));
  const existingNorm = new Set(DATA.myTasks.map(t => normalizeTitle(t.title)));
  manual.forEach(t => {
    if (!existingIds.has(t.id) && !existingNorm.has(normalizeTitle(t.title))) {
      DATA.myTasks.unshift(t);
    }
  });

  // 2. Apply done-state overrides
  // Notion-synced tasks: server done state is AUTHORITATIVE (don't let localStorage un-check them)
  // Manual/local tasks: localStorage done state applies as before
  const doneIds = loadDoneIds();
  const doneTitles = loadDoneTitles();
  const doneIdSet = new Set(doneIds);
  const doneTitleSet = new Set(doneTitles);
  DATA.myTasks.forEach(t => {
    const hasNotionId = t.notionPageId || (t.id && !t.id.startsWith('manual-'));
    if (hasNotionId && t.done) {
      // Notion says done — keep it done regardless of localStorage
      // Also sync to localStorage so UI stays consistent
      if (!doneIdSet.has(t.id)) { doneIds.push(t.id); doneIdSet.add(t.id); }
      const norm = normalizeTitle(t.title);
      if (norm && !doneTitleSet.has(norm)) { doneTitles.push(norm); doneTitleSet.add(norm); }
    } else if (doneIdSet.has(t.id) || doneTitleSet.has(normalizeTitle(t.title))) {
      // localStorage says done — apply (this covers manual tasks and optimistic UI)
      t.done = true;
    }
  });
  saveDoneIds(doneIds);
  saveDoneTitles(doneTitles);

  // 3. Apply marketing event todo done-states
  const mktTodoState = loadMktEventTodos();
  MKT_EVENTS.forEach(ev => {
    if (mktTodoState[ev.id]) {
      ev.todos.forEach((t, ti) => {
        if (mktTodoState[ev.id][ti] !== undefined) t.done = mktTodoState[ev.id][ti];
      });
    }
  });

  // 4. Apply offsite task done-states
  if (DATA.leadershipOffsite) {
    const offsiteDone = new Set(loadOffsiteDone());
    DATA.leadershipOffsite.phases.forEach((p, pi) => {
      p.tasks.forEach((t, ti) => {
        const key = pi + '-' + ti;
        if (offsiteDone.has(key)) t.done = true;
      });
    });
  }
  if (DATA.hackWeek) {
    const hwDone = new Set(loadHackWeekDone());
    DATA.hackWeek.phases.forEach((p, pi) => {
      p.tasks.forEach((t, ti) => {
        const key = pi + '-' + ti;
        if (hwDone.has(key)) t.done = true;
      });
    });
  }
}

// -- Fetch live news from /api/news (Daily Brief tab) --
async function fetchLiveNews() {
  try {
    const res = await fetch('/api/news');
    if (!res.ok) return;
    const data = await res.json();
    if (!data.lastUpdated) return;
    const apiTime = new Date(data.lastUpdated).getTime();
    const dataTime = DATA.refreshedAt ? new Date(DATA.refreshedAt).getTime() : 0;
    if (apiTime <= dataTime) return;
    if (data.newsFeed && data.newsFeed.length > 0) DATA.newsFeed = data.newsFeed;
    if (data.newsDigest) DATA.newsDigest = data.newsDigest;
    if (data.fermatNewsroom) DATA.fermatNewsroom = data.fermatNewsroom;
    document.getElementById('refresh-time').textContent =
      'Updated ' + new Date(data.lastUpdated).toLocaleString('en-US',{timeZone:'America/Los_Angeles',month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true}) + ' PT';
    renderNewsFeed();
    console.log('[Live] News updated from API:', data.lastUpdated);
  } catch (err) {
    console.warn('[Live] News fetch failed, using static data:', err.message);
  }
}

function fetchLiveCalendar() {
        fetch("/api/calendar", {
          headers: { "Authorization": "Bearer sophie-dashboard-secret-change-me" }
        })
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(data) {
          if (!data || !Array.isArray(data.calendarDays) || data.calendarDays.length === 0) return;
          // Normalize: if days have rishabh/shreyas arrays instead of events, merge them
          data.calendarDays.forEach(function(day) {
            if (!day.events && (day.rishabh || day.shreyas)) {
              var merged = [];
              (day.rishabh || []).forEach(function(e) { e.calendar = "rishabh"; merged.push(e); });
              (day.shreyas || []).forEach(function(e) {
                var isDup = merged.some(function(m) { return m.time === e.time && m.title === e.title; });
                if (!isDup) { e.calendar = "shreyas"; merged.push(e); }
              });
              // Sort by time
              merged.sort(function(a, b) {
                if (a.time === "All day") return -1;
                if (b.time === "All day") return 1;
                return a.time.localeCompare(b.time);
              });
              day.events = merged;
            }
          });
          // Get today in Pacific Time (not UTC)
          var ptNow = new Date(new Date().toLocaleString('en-US', {timeZone: 'America/Los_Angeles'}));
          var today = ptNow.getFullYear() + '-' + String(ptNow.getMonth()+1).padStart(2,'0') + '-' + String(ptNow.getDate()).padStart(2,'0');
          // Keep today's hardcoded data, merge API data for today and future
          var existing = (DATA.calendarDays || []).filter(function(d) { return d.date < today; });
          var fromApi = data.calendarDays.filter(function(d) { return d.date >= today; });
          DATA.calendarDays = existing.concat(fromApi).sort(function(a,b) { return a.date.localeCompare(b.date); });
          var todayIdx = DATA.calendarDays.findIndex(function(d) { return d.date >= today; });
          calDayIdx = todayIdx >= 0 ? todayIdx : 0;
          var container = document.getElementById("cal-card-container");
          if (container) container.innerHTML = renderCalendarInner();
        })
        .catch(function(e) { console.warn("Calendar fetch failed:", e); });
      }

    const pa = prioOrder[a.priority] ?? 1, pb = prioOrder[b.priority] ?? 1;
    if(pa !== pb) return pa - pb;
    if(a.due && b.due) return a.due.localeCompare(b.due);
    if(a.due) return -1;
    if(b.due) return 1;
    return 0;

function renderTaskItem(t, section) {

  const dueLabel = !t.due ? '' : t.due < today ? 'Overdue' : t.due === today ? 'Due today' : 'Due ' + new Date(t.due+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const prioColor = t.priority==='High' ? 'var(--red)' : t.priority==='Medium' ? 'var(--yellow)' : 'var(--green)';
  const ctx = t.context ? `<div style="font-size:10px;color:var(--text-muted);margin-top:2px;line-height:1.3">${t.context}</div>` : '';
  const ownerHtml = t.owner ? `<span class="task-owner">${t.owner}</span>` : '';
  const onclick = section === 'my' ? 'toggleMyTask(this)' : 'toggleTeamTask(this)';

  return `
    <li class="task-check-item ${t.done?'checked':''}" data-id="${t.id}" data-priority="${t.priority}" data-has-due="${t.due?'yes':'no'}" data-section="${section}" onclick="${onclick}">
      <div class="task-checkbox ${t.done?'checked':''}"></div>
      <div style="flex:1">
        <div class="task-check-text">${t.title}</div>
        <div class="task-check-meta">
          <span class="task-priority-dot" style="background:${prioColor}"></span>
          ${t.due ? `<span class="task-due ${dueClass}" data-due="${t.due}" onclick="event.stopPropagation();editDueDate(this)">${dueLabel}</span>` : `<span class="task-due-add" onclick="event.stopPropagation();editDueDate(this)">+ date</span>`}
          ${ownerHtml}

      ${t.sourceLink ? `<a class="source-link" href="${t.sourceLink}" target="_blank" onclick="event.stopPropagation()" title="View original source" style="font-size:10px;color:var(--text-muted);margin-right:6px;text-decoration:none;opacity:0.6">src</a>` : ''}

function toggleMyTask(el) {
  const isChecked = el.classList.toggle('checked');
  el.querySelector('.task-checkbox').classList.toggle('checked');
  const taskId = el.dataset.id;
  // Persist done-state by ID and by normalized title
  const doneIds = loadDoneIds();
  const doneTitles = loadDoneTitles();
  const titleText = el.querySelector('.task-check-text')?.textContent || '';
  const normTitle = normalizeTitle(titleText);
  if(isChecked) {
    if(!doneIds.includes(taskId)) doneIds.push(taskId);
    if(normTitle && !doneTitles.includes(normTitle)) doneTitles.push(normTitle);
  } else {
    const idx = doneIds.indexOf(taskId); if(idx>=0) doneIds.splice(idx,1);
    const tidx = doneTitles.indexOf(normTitle); if(tidx>=0) doneTitles.splice(tidx,1);
  }
  saveDoneIds(doneIds);
  saveDoneTitles(doneTitles);
  // Sync completion to server + Notion
  fetch('/api/tasks/complete', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ taskId, title: titleText, done: isChecked })
  }).catch(e => console.warn('Task completion sync failed:', e));

  const openList = document.getElementById('my-task-list');

function editDueDate(span) {
  // Close any existing popup
  const existing = document.querySelector('.date-picker-popup');
  if(existing) existing.remove();

  const li = span.closest('.task-check-item');
  const taskId = li.dataset.id;
  const currentDue = span.dataset && span.dataset.due ? span.dataset.due : '';

  // Helper: date offset from today
  function offsetDate(days) {
    const d = new Date(); d.setDate(d.getDate() + days);
    return d.toISOString().slice(0,10);
  }
  function nextWeekday(dow) {
    const d = new Date(); const curr = d.getDay();
    const diff = ((dow - curr) + 7) % 7 || 7;
    d.setDate(d.getDate() + diff);
    return d.toISOString().slice(0,10);
  }
  function friendlyLabel(dateStr) {
    return new Date(dateStr+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  }

  // Build popup
  const popup = document.createElement('div');
  popup.className = 'date-picker-popup';
  popup.onclick = function(e) { e.stopPropagation(); };

  const todayStr = offsetDate(0);
  const tomorrowStr = offsetDate(1);
  const nextMonStr = nextWeekday(1);
  const nextFriStr = nextWeekday(5);
  const nextWeekStr = offsetDate(7);

  popup.innerHTML = `
    <div class="dp-quick">
      <button class="dp-btn today" data-val="${todayStr}">Today</button>
      <button class="dp-btn" data-val="${tomorrowStr}">Tomorrow</button>
      <button class="dp-btn" data-val="${nextMonStr}">Next Mon <span style="color:var(--text-muted);font-size:9px">${friendlyLabel(nextMonStr)}</span></button>
      <button class="dp-btn" data-val="${nextFriStr}">Next Fri <span style="color:var(--text-muted);font-size:9px">${friendlyLabel(nextFriStr)}</span></button>
      <button class="dp-btn" data-val="${nextWeekStr}">+1 week <span style="color:var(--text-muted);font-size:9px">${friendlyLabel(nextWeekStr)}</span></button>
      <button class="dp-btn" data-val="${offsetDate(14)}">+2 weeks <span style="color:var(--text-muted);font-size:9px">${friendlyLabel(offsetDate(14))}</span></button>
    </div>
    <div class="dp-divider"></div>
    <div class="dp-custom">
      <input type="date" value="${currentDue}">
      <button class="dp-btn" style="flex-shrink:0;text-align:center" id="dp-apply">Set</button>
    </div>
    ${currentDue ? '<div class="dp-clear" id="dp-clear">Remove date</div>' : ''}
  `;

  // Position popup near the span
  const meta = span.closest('.task-check-meta') || span.parentElement;
  meta.style.position = 'relative';
  popup.style.position = 'absolute';
  popup.style.left = '0';
  popup.style.top = '100%';
  popup.style.marginTop = '4px';
  meta.appendChild(popup);

  function applyVal(val) {
    popup.remove();
    const task = DATA.myTasks.find(t => t.id === taskId);
    if (task) task.due = val || null;
    const todayISO = new Date().toISOString().slice(0,10);
    if (!val) {
      const addSpan = document.createElement('span');
      addSpan.className = 'task-due-add';
      addSpan.textContent = '+ date';
      addSpan.onclick = function(e) { e.stopPropagation(); editDueDate(addSpan); };
      span.replaceWith(addSpan);
      li.dataset.hasDue = 'no';
      return;
    }
    let dueClass, dueLabel;
    if (val < todayISO) { dueClass = 'overdue'; dueLabel = 'Overdue'; }
    else if (val === todayISO) { dueClass = 'today'; dueLabel = 'Due today'; }
    else { dueClass = 'upcoming'; dueLabel = 'Due ' + new Date(val+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
    const newSpan = document.createElement('span');
    newSpan.className = 'task-due ' + dueClass;
    newSpan.dataset.due = val;
    newSpan.textContent = dueLabel;
    newSpan.onclick = function(e) { e.stopPropagation(); editDueDate(newSpan); };
    span.replaceWith(newSpan);
    li.dataset.hasDue = 'yes';
  }

  // Quick buttons
  popup.querySelectorAll('.dp-quick .dp-btn').forEach(btn => {
    btn.addEventListener('click', function(e) { e.stopPropagation(); applyVal(this.dataset.val); });
  });
  // Custom date apply
  popup.querySelector('#dp-apply').addEventListener('click', function(e) {
    e.stopPropagation();
    applyVal(popup.querySelector('input[type="date"]').value);
  });
  // Clear
  const clearBtn = popup.querySelector('#dp-clear');
  if(clearBtn) clearBtn.addEventListener('click', function(e) { e.stopPropagation(); applyVal(''); });

  // Close on click outside
  setTimeout(() => {
    function closePopup(e) {
      if(!popup.contains(e.target)) { popup.remove(); document.removeEventListener('click', closePopup, true); }
    }
    document.addEventListener('click', closePopup, true);
  }, 10);
}

function findSimilarTask(newTitle) {
  const norm = normalizeTitle(newTitle);
  const words = norm.split(' ').filter(w => w.length > 2);
  // Extract likely names (capitalized words from original) and key verbs
  const actionVerbs = ['schedule','follow','reply','send','confirm','coordinate','reach','draft','check','fix','set','book','cancel','reschedule','prepare','review','update','create','organize','plan'];
  const newVerb = actionVerbs.find(v => norm.includes(v)) || '';
  // Check each existing task for overlap
  for (const t of DATA.myTasks) {
    if (t.done) continue;
    const existNorm = normalizeTitle(t.title);
    // Exact normalized match
    if (existNorm === norm) return t;
    // Check for shared words (at least 3 significant words in common)
    const existWords = existNorm.split(' ').filter(w => w.length > 2);
    const shared = words.filter(w => existWords.includes(w));
    if (shared.length >= 3) return t;
    // Check for shared name + same action verb
    const existVerb = actionVerbs.find(v => existNorm.includes(v)) || '';
    if (newVerb && existVerb && shared.length >= 1) {
      // At least one significant word in common + both have action verbs
      const verbMatch = newVerb === existVerb || (newVerb === 'follow' && existVerb === 'reply') || (newVerb === 'reply' && existVerb === 'follow') || (newVerb === 'schedule' && existVerb === 'book') || (newVerb === 'book' && existVerb === 'schedule');
      if (verbMatch && shared.length >= 2) return t;
    }
  }
  return null;
}

function addMyTask(forceAdd) {
  const input = document.getElementById('new-task-input');
  const prioSelect = document.getElementById('new-task-priority');
  const title = input.value.trim();
  if (!title) return;
  // Check for similar existing task (unless user already confirmed)
  if (!forceAdd) {
    const similar = findSimilarTask(title);
    if (similar) {
      const existingSnippet = similar.title.length > 60 ? similar.title.slice(0,57)+'...' : similar.title;
      const msg = `Similar task already exists:\n\n"${existingSnippet}"\n\nAdd anyway?`;
      if (!confirm(msg)) { input.focus(); return; }
    }
  }
  const priority = prioSelect.value;
  const id = 'manual-' + crypto.randomUUID();
  const task = {id, title, done:false, priority, due:null, context:'Added manually'};
  DATA.myTasks.unshift(task);
  // Persist manual task
  const manual = loadManualTasks();
  manual.unshift(task);
  saveManualTasks(manual);
  // Sync to server + Notion
  fetch('/api/tasks/add', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ title, priority })
  }).catch(e => console.warn('Task server sync failed:', e));
  const list = document.getElementById('my-task-list');
  const li = document.createElement('div');
  li.innerHTML = renderTaskItem(task, 'my');
  const newLi = li.firstElementChild;
  list.prepend(newLi);
  // Update counters
  const all = document.querySelectorAll('#my-task-list .task-check-item');
  const doneC = document.querySelectorAll('#my-task-list .task-check-item.checked').length;
  document.getElementById('my-task-counter').textContent = (all.length-doneC)+' open \u00b7 '+doneC+' done';
  // Update KPI
  const kpis = document.querySelectorAll('.kpi');
  if(kpis[0]) kpis[0].querySelector('.num').textContent = all.length-doneC;
  // Reset input
  input.value = '';
  prioSelect.value = 'Medium';
  // Flash the new item
  newLi.style.transition = 'background .3s';
  newLi.style.background = 'rgba(212,175,55,0.1)';
  setTimeout(() => { newLi.style.background = ''; }, 600);
}

// -- Calendar (multi-day) --
let calDayIdx = (function(){
  const today = new Date().toISOString().slice(0,10);
  const idx = (DATA.calendarDays||[]).findIndex(d=>d.date>=today);
  return idx >= 0 ? idx : 0;
})();

function calToMin(t){const m=t.match(/(\d+):(\d+)\s*(AM|PM)/i);if(!m)return 0;let h=parseInt(m[1]);const mn=parseInt(m[2]),ap=m[3].toUpperCase();if(ap==='PM'&&h!==12)h+=12;if(ap==='AM'&&h===12)h=0;return h*60+mn;}
const CAL_SKIP=/sitter|gym|standup/i, CAL_OPT=/\[optional\]/i;
function calSkip(e){return CAL_SKIP.test(e.title)||CAL_OPT.test(e.title)||e.rsvp==='declined';}
function findConflicts(events){const s=new Set();for(let i=0;i<events.length;i++){if(calSkip(events[i]))continue;for(let j=i+1;j<events.length;j++){if(calSkip(events[j]))continue;if(calToMin(events[i].time)<calToMin(events[j].end)&&calToMin(events[j].time)<calToMin(events[i].end)){s.add(i);s.add(j);}}}return s;}

function navigateCalDay(delta) {
  const days = DATA.calendarDays;
  if(!days || !days.length) return;
  calDayIdx = Math.max(0, Math.min(days.length - 1, calDayIdx + delta));
  const container = document.getElementById('cal-card-container');
  if(container) container.innerHTML = renderCalendarInner();
}

function renderCalendarInner() {
  const days = DATA.calendarDays;
  if(!days || !days.length) return '<div class="card"><div class="card-body" style="padding:20px;text-align:center;color:var(--text-muted)">No calendar data</div></div>';
  const cal = days[calDayIdx];

  const rC=findConflicts(cal.rishabh), sC=findConflicts(cal.shreyas);
  const rExt=cal.rishabh.filter(e=>e.type==='external').length;
  const sExt=cal.shreyas.filter(e=>e.type==='external').length;
  const totalC=Math.floor(rC.size/2)+Math.floor(sC.size/2);

  function ev(e,idx,cSet){
    const tc=e.type==='external'?'external':e.type==='1on1'?'one-on-one':'internal';
    const tent=e.rsvp==='tentative'?' tentative':'';
    const conf=cSet.has(idx)?' conflict':'';
    const confB=cSet.has(idx)?' <span style="font-size:8px;color:var(--red);font-weight:700">CONFLICT</span>':'';
    const tentB=e.rsvp==='tentative'?' <span style="font-size:9px;color:var(--yellow)">(tentative)</span>':'';
    const needsAction=e.rsvp==='needsAction'?' <span style="font-size:8px;color:var(--yellow);font-weight:600">NEEDS RSVP</span>':'';
    const href = e.link || ('https://calendar.google.com/calendar/r/search?q=' + encodeURIComponent(e.title) + '&date=' + cal.date.replace(/-/g,''));
    return `<a href="${href}" target="_blank" class="cal-ev${tent}${conf}" style="display:flex;text-decoration:none;color:inherit"><span class="ct">${e.time}</span><span class="cd ${tc}"></span><span class="cn">${e.title}${confB}${tentB}${needsAction}</span></a>`;
  }

  // Day indicator pills
  const pills = days.map((d, i) => {
    const short = new Date(d.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',day:'numeric'});
    const active = i === calDayIdx ? 'background:var(--accent);color:var(--bg)' : 'background:var(--surface-alt);color:var(--text-muted);cursor:pointer';
    // Check if this day has conflicts (skip weekends per calendar-conflict-monitor)
    const dayConf = d.isWeekend ? 0 : (Math.floor(findConflicts(d.rishabh).size/2) + Math.floor(findConflicts(d.shreyas).size/2));
    const dot = dayConf > 0 ? '<span style="width:5px;height:5px;border-radius:50%;background:var(--red);display:inline-block;margin-left:3px"></span>' : '';
    return `<span onclick="calDayIdx=${i};navigateCalDay(0)" style="padding:3px 8px;border-radius:10px;font-size:10px;font-weight:600;${active};transition:all .15s">${short}${dot}</span>`;
  }).join('');

  return `
    <div class="card-head">
      <div class="card-title" style="display:flex;align-items:center;gap:8px">
        <span style="cursor:pointer;opacity:${calDayIdx>0?'1':'0.3'};font-size:14px" onclick="navigateCalDay(-1)">&larr;</span>
        &#128197; ${cal.label}
        <span style="cursor:pointer;opacity:${calDayIdx<days.length-1?'1':'0.3'};font-size:14px" onclick="navigateCalDay(1)">&rarr;</span>
      </div>
      <div class="card-badges">
        ${totalC>0?`<span class="badge tag-red">${totalC} conflict${totalC>1?'s':''}</span>`:''}
        <div class="legend">
          <span><span class="ld" style="background:var(--red)"></span>External</span>
          <span><span class="ld" style="background:var(--lavender)"></span>1:1</span>
          <span><span class="ld" style="background:var(--leaf)"></span>Internal</span>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:5px;padding:6px 14px 2px;flex-wrap:wrap">${pills}</div>
    <div class="card-body" style="padding:10px 14px">
      <div class="cal-grid">
        <div>
          <div class="cal-col-head"><span style="color:var(--accent)">Rishabh</span><span class="cc-sub">${cal.rishabh.length} mtgs &middot; ${rExt} ext${rC.size>0?' &middot; <span style=color:var(--red)>'+Math.floor(rC.size/2)+' overlap</span>':''}</span></div>
          <div>${cal.rishabh.map((e,i)=>ev(e,i,rC)).join('')}</div>
        </div>
        <div>
          <div class="cal-col-head"><span style="color:var(--gold)">Shreyas</span><span class="cc-sub">${cal.shreyas.length} mtgs &middot; ${sExt} ext${sC.size>0?' &middot; <span style=color:var(--red)>'+Math.floor(sC.size/2)+' overlap</span>':''}</span></div>
          <div>${cal.shreyas.map((e,i)=>ev(e,i,sC)).join('')}</div>
        </div>
      </div>
    </div>`;
}

// -- Upcoming Conflicts --
function renderUpcomingConflicts() {
  const days = DATA.calendarDays;
  if(!days || !days.length) return '';

  // Uses same filter rules as calendar-conflict-monitor skill:
  // Skip all-day events, standup/sitter/gym, weekends, [optional], declined
  const allConflicts = [];
  days.forEach(day => {
    // Skip weekends (matches calendar-conflict-monitor)
    if(day.isWeekend) return;
    ['rishabh','shreyas'].forEach(who => {
      const events = day[who];
      for(let i=0;i<events.length;i++){
        if(calSkip(events[i])) continue;
        for(let j=i+1;j<events.length;j++){
          if(calSkip(events[j])) continue;
          if(calToMin(events[i].time)<calToMin(events[j].end)&&calToMin(events[j].time)<calToMin(events[i].end)){
            // Signature matches calendar-conflict-monitor format: "{Name}|{ev1}|{ev2}"
            const ev1 = events[i], ev2 = events[j];
            const sig = who.charAt(0).toUpperCase()+who.slice(1)+'|'+ev1.title.trim()+'|'+ev2.title.trim();
            allConflicts.push({
              key: sig,
              date: day.date,
              dateLabel: day.label,
              who: who.charAt(0).toUpperCase()+who.slice(1),
              ev1: ev1,
              ev2: ev2
            });
          }
        }
      }
    });
  });

  if(allConflicts.length === 0) {
    return `
    <div class="card" style="height:100%">
      <div class="card-head">
        <div class="card-title">&#9888;&#65039; Upcoming Conflicts</div>
        <span class="badge tag-green">All clear</span>
      </div>
      <div class="card-body" style="padding:20px;text-align:center;color:var(--text-muted);font-size:12px">
        No scheduling conflicts in the next week
      </div>
    </div>`;
  }

  // Group by date
  const byDate = {};
  allConflicts.forEach(c => {
    if(!byDate[c.date]) byDate[c.date] = {label:c.dateLabel, items:[]};
    byDate[c.date].items.push(c);
  });

  let html = '';
  Object.keys(byDate).sort().forEach(date => {
    const group = byDate[date];
    const shortDate = new Date(date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    html += `<div style="margin-bottom:10px">
      <div style="font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">${shortDate}</div>`;
    group.items.forEach(c => {
      const whoColor = c.who==='Rishabh' ? 'var(--accent)' : 'var(--gold)';
      html += `<div style="background:rgba(232,78,68,0.06);border-left:3px solid var(--red);padding:6px 10px;border-radius:0 6px 6px 0;margin-bottom:4px">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
          <span style="font-size:10px;font-weight:700;color:${whoColor}">${c.who}</span>
          <span style="font-size:9px;color:var(--red);font-weight:600">OVERLAP</span>
        </div>
        <div style="font-size:11px;color:var(--text)">
          <span style="color:var(--text-muted)">${c.ev1.time}-${c.ev1.end}</span> ${c.ev1.title}
        </div>
        <div style="font-size:11px;color:var(--text)">
          <span style="color:var(--text-muted)">${c.ev2.time}-${c.ev2.end}</span> ${c.ev2.title}
        </div>
      </div>`;
    });
    html += '</div>';
  });

  return `
  <div class="card" style="height:100%">
    <div class="card-head">
      <div class="card-title">&#9888;&#65039; Upcoming Conflicts</div>

function syncOffsiteToNotion() {
  const btn = document.getElementById('offsite-sync-btn');
  const o = DATA.leadershipOffsite;
  if(!o) return;

  // Build sync payload  -  JSON file with current states
  const state = {};
  o.phases.forEach((p, pi) => {
    p.tasks.forEach((t, ti) => {
      state[pi + '-' + ti] = {text: t.text, done: t.done, phase: p.name};
    });
  });

  const payload = JSON.stringify({
    pageId: o.notionPageId,
    syncedAt: new Date().toISOString(),
    tasks: state
  }, null, 2);

  // Save as a downloadable file to the workspace folder
  const blob = new Blob([payload], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'offsite-sync.json';
  a.click();
  URL.revokeObjectURL(url);

  // Visual feedback
  btn.textContent = '* Synced';
  btn.style.background = 'var(--green)';
  btn.style.color = 'var(--bg)';
  btn.style.borderColor = 'var(--green)';
  setTimeout(() => {
    btn.textContent = 'Sync to Notion';
    btn.style.background = 'var(--green-soft)';
    btn.style.color = 'var(--green)';
    btn.style.borderColor = 'var(--leaf)';
  }, 2000);
}

function toggleOffsitePhase(head) {

}

function toggleOffsiteTask(el) {
  const pi = parseInt(el.dataset.phase);
  const ti = parseInt(el.dataset.task);
  const task = DATA.leadershipOffsite.phases[pi].tasks[ti];
  task.done = !task.done;
  const isChecked = task.done;

  // Persist to localStorage
  const doneKeys = loadOffsiteDone();
  const key = pi + '-' + ti;
  if(isChecked) {
    if(!doneKeys.includes(key)) doneKeys.push(key);
  } else {
    const idx = doneKeys.indexOf(key);
    if(idx >= 0) doneKeys.splice(idx, 1);
  }
  saveOffsiteDone(doneKeys);

  // Update checkbox visual
  const cb = el.querySelector('.task-checkbox');
  const textSpan = el.querySelector('span:last-child');
  if(isChecked) {
    el.classList.add('checked');
    cb.classList.add('checked');
    cb.style.borderColor = 'var(--leaf)';
    cb.style.background = 'var(--forest)';
    cb.querySelector('span').textContent = '*';
    textSpan.style.textDecoration = 'line-through';
    textSpan.style.opacity = '.5';
    textSpan.style.color = 'var(--text-muted)';
  } else {
    el.classList.remove('checked');
    cb.classList.remove('checked');
    cb.style.borderColor = 'var(--border-light)';
    cb.style.background = '';
    cb.querySelector('span').textContent = '';
    textSpan.style.textDecoration = '';
    textSpan.style.opacity = '';
    textSpan.style.color = 'var(--text-dim)';
  }

  // Update phase counter
  const phaseEl = el.closest('.offsite-phase');
  const pTasks = DATA.leadershipOffsite.phases[pi].tasks;
  const pDone = pTasks.filter(t=>t.done).length;
  const pTotal = pTasks.length;
  const counter = phaseEl.querySelector('.offsite-phase-head span:last-child');
  if(counter) counter.textContent = pDone+'/'+pTotal;
  if(pDone === pTotal) {
    phaseEl.querySelector('.offsite-phase-head span:nth-child(2)').style.color = 'var(--green)';
    counter.style.background = 'var(--green-soft)';
    counter.style.color = 'var(--green)';
  } else {
    phaseEl.querySelector('.offsite-phase-head span:nth-child(2)').style.color = 'var(--text)';
    counter.style.background = 'var(--surface)';
    counter.style.color = 'var(--text-muted)';
  }

  // Update overall progress bar
  const allPhases = DATA.leadershipOffsite.phases;
  const totalDone = allPhases.reduce((s,p) => s + p.tasks.filter(t=>t.done).length, 0);
  const totalAll = allPhases.reduce((s,p) => s + p.tasks.length, 0);
  const pct = Math.round((totalDone/totalAll)*100);
  const card = el.closest('.card');
  const progressBar = card.querySelector('div[style*="width:"][style*="border-radius:3px"]');
  if(progressBar) progressBar.style.width = pct+'%';
  const progressText = card.querySelector('.card-body > div:first-child > span:last-child');
  if(progressText) progressText.textContent = totalDone+'/'+totalAll+' tasks ('+pct+'%)';
}

  const open = body.style.display === 'none';
  body.style.display = open ? 'block' : 'none';
  chevron.style.transform = open ? 'rotate(90deg)' : 'rotate(0deg)';
}

function toggleHWTask(el) {
  const pi = +el.dataset.hwphase;
  const ti = +el.dataset.hwtask;
  const task = DATA.hackWeek.phases[pi].tasks[ti];
  task.done = !task.done;
  const isChecked = task.done;

  // Persist
  const doneKeys = loadHackWeekDone();
  const key = pi + '-' + ti;
  if(isChecked) {
    if(!doneKeys.includes(key)) doneKeys.push(key);
  } else {
    const idx = doneKeys.indexOf(key);
    if(idx >= 0) doneKeys.splice(idx, 1);
  }
  saveHackWeekDone(doneKeys);

  // Visual update
  const cb = el.querySelector('.task-checkbox');
  const label = el.querySelector('span:last-child');
  if(isChecked) {
    el.classList.add('checked');
    cb.classList.add('checked');
    cb.style.border = '2px solid var(--leaf)';
    cb.style.background = 'var(--forest)';
    cb.querySelector('span').textContent = '*';
    label.style.textDecoration = 'line-through';
    label.style.opacity = '.5';
    label.style.color = 'var(--text-muted)';
  } else {
    el.classList.remove('checked');
    cb.classList.remove('checked');
    cb.style.border = '2px solid var(--border-light)';
    cb.style.background = '';
    cb.querySelector('span').textContent = '';
    label.style.textDecoration = '';
    label.style.opacity = '';
    label.style.color = 'var(--text-dim)';
  }

  // Update phase counter
  const pTasks = DATA.hackWeek.phases[pi].tasks;
  const pDone = pTasks.filter(t=>t.done).length;
  const pTotal = pTasks.length;
  const phaseEl = el.closest('[data-hwphase]');
  const counter = phaseEl.querySelector('.hw-phase-head span:last-child');
  if(counter) counter.textContent = pDone + '/' + pTotal;

  // Update overall progress
  const allPhases = DATA.hackWeek.phases;
  const totalDone = allPhases.reduce((s,p) => s + p.tasks.filter(t=>t.done).length, 0);
  const totalAll = allPhases.reduce((s,p) => s + p.tasks.length, 0);
  const newPct = totalAll ? Math.round((totalDone/totalAll)*100) : 0;
  const card = el.closest('.card');
  const pctLabel = card.querySelector('.card-body > div:first-child > span:last-child');
  if(pctLabel) pctLabel.textContent = totalDone + '/' + totalAll + ' tasks (' + newPct + '%)';
  const bar = card.querySelector('.card-body > div:nth-child(2) > div');
  if(bar) {
    bar.style.width = newPct + '%';
    bar.style.background = newPct >= 75 ? 'var(--green)' : newPct >= 40 ? 'var(--yellow)' : 'var(--accent)';
  }
}

      ${visibleEvents.map((ev, i) => `
        <button class="mkt-nav-btn ${i===0?'active':''}" data-event="${ev.id}">
          ${ev.rishabh || ev.shreyas ? '<span style="margin-right:3px">' + (ev.rishabh ? '<span class="exec-dot rishabh" style="display:inline-block"></span>' : '') + (ev.shreyas ? '<span class="exec-dot shreyas" style="display:inline-block;margin-left:2px"></span>' : '') + '</span>' : ''}
          ${ev.shortName}
          <span style="font-size:10px;color:var(--text-muted);font-weight:500;margin-left:4px">${ev.dates.split(',')[0]}</span>
        </button>
      `).join('')}
    </div>

    <!-- Event panes -->
    ${visibleEvents.length === 0 ? '<div style="padding:40px;text-align:center;color:var(--text-muted)">No upcoming events in the next 6 months</div>' : ''}
    ${visibleEvents.map((ev, i) => `
      <div class="mkt-event-pane ${i===0?'active':''}" id="mkt-${ev.id}">
        ${renderEventPane(ev)}
      </div>
    `).join('')}
  `;

  // Event tab switching
  document.querySelectorAll('.mkt-nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mkt-nav-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.mkt-event-pane').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('mkt-' + btn.dataset.event).classList.add('active');
    });
  });

  // Marketing todo: checkbox toggle (click on checkbox only) — persists to localStorage
  document.querySelectorAll('.mkt-todo-item .task-checkbox').forEach(cb => {
    cb.addEventListener('click', (e) => {
      e.stopPropagation();
      const item = cb.closest('.task-check-item');
      const isChecked = item.classList.toggle('checked');
      cb.classList.toggle('checked');
      const input = item.querySelector('.todo-text-edit');
      if(isChecked) {
        item.style.opacity = '0.45';
        input.style.textDecoration = 'line-through';
        input.style.color = 'var(--text-muted)';
      } else {
        item.style.opacity = '';
        input.style.textDecoration = '';
        input.style.color = '';
      }
      const evId = item.closest('[data-event-id]').dataset.eventId;
      const todoIdx = parseInt(item.dataset.todoIdx);
      // Persist to MKT_EVENTS model + localStorage
      const ev = MKT_EVENTS.find(e => e.id === evId);
      if (ev && !isNaN(todoIdx) && ev.todos[todoIdx]) {
        ev.todos[todoIdx].done = isChecked;
        const state = loadMktEventTodos();
        if (!state[evId]) state[evId] = {};
        state[evId][todoIdx] = isChecked;
        saveMktEventTodos(state);
      }
      updateTodoProgress(evId);
    });
  });

  // Marketing todo: delete
  document.querySelectorAll('.todo-delete').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const item = btn.closest('.task-check-item');
      const evId = item.closest('[data-event-id]').dataset.eventId;
      item.style.transition = 'opacity .2s, height .2s';
      item.style.opacity = '0';
      item.style.height = '0';
      item.style.overflow = 'hidden';
      item.style.padding = '0';
      item.style.margin = '0';
      setTimeout(() => { item.remove(); updateTodoProgress(evId); }, 200);
    });
  });

  // Marketing todo: add new
  document.querySelectorAll('.todo-add-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const evId = btn.dataset.eventId;
      const list = btn.previousElementSibling;
      const li = document.createElement('li');
      li.className = 'task-check-item mkt-todo-item';
      li.innerHTML = `
        <div class="task-checkbox"></div>
        <div style="flex:1">
          <input class="todo-text-edit" placeholder="New task..." value="" />
        </div>
        <button class="todo-delete" title="Remove">&times;</button>
      `;
      list.appendChild(li);

      // Wire up checkbox with persistence
      const newTodoIdx = list.querySelectorAll('.mkt-todo-item').length - 1;
      li.dataset.todoIdx = newTodoIdx;
      // Add to MKT_EVENTS model
      const ev = MKT_EVENTS.find(e => e.id === evId);
      if (ev) ev.todos.push({text: '', done: false});
      li.querySelector('.task-checkbox').addEventListener('click', (e) => {
        e.stopPropagation();
        const isChecked = li.classList.toggle('checked');
        li.querySelector('.task-checkbox').classList.toggle('checked');
        const input = li.querySelector('.todo-text-edit');
        if(isChecked) { li.style.opacity='0.45'; input.style.textDecoration='line-through'; input.style.color='var(--text-muted)'; }
        else { li.style.opacity=''; input.style.textDecoration=''; input.style.color=''; }
        const idx = parseInt(li.dataset.todoIdx);
        if (ev && !isNaN(idx) && ev.todos[idx]) {
          ev.todos[idx].done = isChecked;
          const state = loadMktEventTodos();
          if (!state[evId]) state[evId] = {};
          state[evId][idx] = isChecked;
          saveMktEventTodos(state);
        }
        updateTodoProgress(evId);
      });

      // Wire up delete
      li.querySelector('.todo-delete').addEventListener('click', (e) => {
        e.stopPropagation();
        li.style.transition='opacity .2s,height .2s'; li.style.opacity='0'; li.style.height='0'; li.style.overflow='hidden'; li.style.padding='0'; li.style.margin='0';
        setTimeout(() => { li.remove(); updateTodoProgress(evId); }, 200);
      });

      // Focus the input
      const input = li.querySelector('.todo-text-edit');
      input.focus();

      updateTodoProgress(evId);
    });
  });

  // Prevent text input clicks from bubbling
  document.querySelectorAll('.todo-text-edit').forEach(input => {
    input.addEventListener('click', (e) => e.stopPropagation());
  });
}

// Update progress bar + badge for an event
function updateTodoProgress(evId) {
  const pane = document.getElementById('mkt-' + evId);
  if(!pane) return;
  const items = pane.querySelectorAll('.mkt-todo-item');
  const total = items.length;
  const done = pane.querySelectorAll('.mkt-todo-item.checked').length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;

  // Update progress bar
  const bar = pane.querySelector('[style*="height:6px"]');
  if(bar) {
    const fill = bar.querySelector('div');
    fill.style.width = pct + '%';
    fill.style.background = pct >= 75 ? 'var(--green)' : pct >= 40 ? 'var(--yellow)' : 'var(--red)';
  }

  // Update progress badge
  const progBadge = pane.querySelector('.card-head .badge[class*="tag-"]');

  // Update counter text
  const counter = pane.querySelector('[style*="font-size:11px"][style*="color:var(--text-muted)"]');
  if(counter && counter.textContent.includes('of')) {
    counter.textContent = done + ' of ' + total + ' tasks done';
  }

  // Update the todo count badge
  const todoCard = pane.querySelector('.task-checklist').closest('.card');
  const todoBadge = todoCard ? todoCard.querySelector('.badge') : null;
  if(todoBadge) {
    todoBadge.textContent = done + '/' + total;
    todoBadge.className = 'badge ' + (done === total ? 'tag-green' : 'tag-yellow');
  }
}

function renderEventPane(ev) {
  const isPast = new Date(ev.startDate) < new Date();
  const doneTodos = ev.todos.filter(t => t.done).length;
  const todoPercent = ev.todos.length > 0 ? Math.round((doneTodos / ev.todos.length) * 100) : 0;

  return `
    <div class="mkt-overview">
      <!-- Left: Event details -->
      <div class="card">
        <div class="card-head">
          <div class="card-title">${ev.name}</div>
          <div class="card-badges">
            <span class="badge ${isPast ? 'tag-gray' : 'tag-green'}">${isPast ? 'Past' : ev.startDate}</span>
            <span class="badge tag-accent">${ev.status}</span>
            ${ev.calendarLink ? `<a href="${ev.calendarLink}" target="_blank" style="font-size:10px;color:var(--gold)">&#128197; Cal &#8599;</a>` : ''}
            ${ev.notionLink ? `<a href="${ev.notionLink}" target="_blank" style="font-size:10px;color:var(--accent)">Notion &#8599;</a>` : ''}
          </div>
        </div>
        <div class="card-body">
          <div class="mkt-detail">
            <div class="mkt-stat"><span class="ms-l">&#128197; Dates</span><span class="ms-v">${ev.dates}</span></div>
            <div class="mkt-stat"><span class="ms-l">&#128205; Location</span><span class="ms-v">${ev.location}</span></div>
            <div class="mkt-stat"><span class="ms-l">&#127970; Venue</span><span class="ms-v">${ev.venue}</span></div>
            <div class="mkt-stat"><span class="ms-l">&#127991; Type</span><span class="ms-v">${ev.type}</span></div>
            ${ev.details.attendees ? `<div class="mkt-stat"><span class="ms-l">&#128101; Attendees</span><span class="ms-v">${ev.details.attendees}</span></div>` : ''}
            ${ev.details.sponsorLevel ? `<div class="mkt-stat"><span class="ms-l">&#128176; Sponsorship</span><span class="ms-v">${ev.details.sponsorLevel}</span></div>` : ''}
            ${ev.details.contact ? `<div class="mkt-stat"><span class="ms-l">&#128222; Contact</span><span class="ms-v">${ev.details.contact}</span></div>` : ''}
            ${ev.details.airlineCode ? `<div class="mkt-stat"><span class="ms-l">&#9992; Airline Code</span><span class="ms-v" style="font-family:monospace">${ev.details.airlineCode}</span></div>` : ''}
            ${ev.details.villa ? `<div class="mkt-stat"><span class="ms-l">&#127968; Villa</span><span class="ms-v">${ev.details.villa}</span></div>` : ''}
            ${ev.details.capacity ? `<div class="mkt-stat"><span class="ms-l">&#128716; Capacity</span><span class="ms-v">${ev.details.capacity}</span></div>` : ''}
          </div>
          <div style="margin-top:12px">
            <div class="mkt-label">Description</div>
            <div style="font-size:12px;color:var(--text-dim);line-height:1.6">${ev.description}</div>
          </div>
          ${ev.targets ? `
            <div style="margin-top:12px">
              <div class="mkt-label">Target Accounts</div>
              <div class="mkt-targets">${ev.targets.map(t => `<span class="mkt-target">${t}</span>`).join('')}</div>
            </div>
          ` : ''}
          ${ev.subEvents ? `
            <div style="margin-top:12px">
              <div class="mkt-label">Schedule</div>
              ${ev.subEvents.map(se => `
                <div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px">
                  <span style="color:var(--text-dim);flex:1">${se.name}</span>
                  <span style="color:var(--text-muted)">${se.date}</span>
                  <a href="${se.link}" target="_blank" style="color:var(--gold);font-size:10px">Cal &#8599;</a>
                </div>
              `).join('')}
            </div>
          ` : ''}
          ${ev.lumaLink ? `
            <div style="margin-top:10px">
              <a href="${ev.lumaLink}" target="_blank" style="font-size:11px;color:var(--gold);font-weight:600">&#127881; Luma Event Page &#8599;</a>
            </div>
          ` : ''}
        </div>
      </div>

      <!-- Right: Attendance + Travel -->
      <div style="display:flex;flex-direction:column;gap:16px">
        <!-- Who's going -->
        <div class="card">
          <div class="card-head">
            <div class="card-title">&#128100; Attendance</div>
            ${ev.calendarLink ? `<a href="${ev.calendarLink}" target="_blank" style="font-size:10px;color:var(--gold)">View in Calendar &#8599;</a>` : ''}
          </div>
          <div class="card-body">
            <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px">
              ${ev.rishabh ? '<span class="exec-badge rishabh"><span class="exec-dot rishabh"></span> Rishabh</span>' : ''}
              ${ev.shreyas ? '<span class="exec-badge shreyas"><span class="exec-dot shreyas"></span> Shreyas</span>' : ''}
              ${ev.team.map(t => `<span class="exec-badge team">${t}</span>`).join('')}
              ${!ev.rishabh && !ev.shreyas && ev.team.length === 0 ? '<span style="font-size:12px;color:var(--text-muted)">TBD  -  no attendees confirmed</span>' : ''}
            </div>
            ${!ev.rishabh && !ev.shreyas ? `
              <div style="font-size:11px;padding:8px 10px;border-radius:6px;background:var(--surface);border:1px solid var(--border);color:var(--text-muted)">
                Neither Rishabh nor Shreyas on this event
              </div>
            ` : `
              <div style="font-size:11px;padding:8px 10px;border-radius:6px;background:rgba(219,203,119,.06);border:1px solid rgba(219,203,119,.15);color:var(--gold)">
                &#9888; Exec travel required  -  ${ev.rishabh && ev.shreyas ? 'both founders' : ev.rishabh ? 'Rishabh' : 'Shreyas'} attending
              </div>
            `}
            ${ev.details.travelIn ? `
              <div style="margin-top:10px">
                <div class="mkt-stat"><span class="ms-l">&#9992; Travel In</span><span class="ms-v">${ev.details.travelIn}</span></div>
                <div class="mkt-stat"><span class="ms-l">&#9992; Travel Out</span><span class="ms-v">${ev.details.travelOut}</span></div>
                ${ev.details.hotel ? `<div class="mkt-stat"><span class="ms-l">&#127976; Hotel</span><span class="ms-v">${ev.details.hotel}</span></div>` : ''}
              </div>
            ` : ''}
            ${ev.details.rooms ? `
              <div style="margin-top:10px">
                <div class="mkt-stat"><span class="ms-l">&#128716; Room Assignments</span><span class="ms-v">${ev.details.rooms}</span></div>
              </div>
            ` : ''}
          </div>
        </div>

        <!-- Progress -->
        <div class="card">
          <div class="card-head">
            <div class="card-title">&#128200; Progress</div>
            <span class="badge ${todoPercent >= 75 ? 'tag-green' : todoPercent >= 40 ? 'tag-yellow' : 'tag-red'}">${todoPercent}%</span>
          </div>
          <div class="card-body compact">
            <div style="height:6px;background:var(--surface);border-radius:3px;overflow:hidden;margin-bottom:10px">
              <div style="height:100%;width:${todoPercent}%;background:${todoPercent >= 75 ? 'var(--green)' : todoPercent >= 40 ? 'var(--yellow)' : 'var(--red)'};border-radius:3px;transition:width .3s"></div>
            </div>
            <div style="font-size:11px;color:var(--text-muted)">${doneTodos} of ${ev.todos.length} tasks done</div>
          </div>
        </div>
      </div>
    </div>

    <!-- To-Do List -->
    <div class="card" style="margin-top:0;height:auto">
      <div class="card-head">
        <div class="card-title">&#9745; EA To-Dos</div>
        <div class="card-badges">
          <span class="badge ${doneTodos === ev.todos.length ? 'tag-green' : 'tag-yellow'}">${doneTodos}/${ev.todos.length}</span>
        </div>
      </div>
      <div class="card-body" style="padding:10px 14px">
        <ul class="task-checklist" data-event-id="${ev.id}">
          ${ev.todos.map((t, i) => `
            <li class="task-check-item mkt-todo-item ${t.done ? 'checked' : ''}" style="${t.done ? 'opacity:0.45' : ''}" data-todo-idx="${i}">
              <div class="task-checkbox ${t.done ? 'checked' : ''}"></div>
              <div style="flex:1">
                <input class="todo-text-edit" value="${t.text.replace(/"/g,'&quot;')}" style="${t.done ? 'text-decoration:line-through;color:var(--text-muted)' : ''}" />
              </div>
              <button class="todo-delete" title="Remove">&times;</button>
            </li>
          `).join('')}
        </ul>
        <button class="todo-add-btn" data-event-id="${ev.id}">+ Add task</button>
      </div>
    </div>
  `;
}

init();
</script>
</body>
</html>
